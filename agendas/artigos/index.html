ome. J. Urol. 182, \n1744–1749 (2009).\n53. Weber, D. M., Schonbucher, V. B., Gobet, R., \nGerber, A. & Landolt, M. A. Is there an ideal age \nfor hypospadias repair? A pilot study. J. Pediatr. \nUrol. 5, 345–350 (2009).\n54. Hayashi, Y. et al. Scrotal dartos flap for the \nprevention of the urethrocutaneous fistula on \nhypospadias urethroplasty. Int. J. Urol. 12, \n280–283 (2005).\n55. Telfer, J. R., Quaba, A. A., Kwai Ben, I. & \nPeddi, N. C. An investigation into the role of \nwaterproofing in a two-stage hypospadias repair. \nBr. J. Plast. Surg. 51, 542–546 (1998).\n56. Chuang, J. H. & Shieh, C. S. Two-layer versus \none-layer closure in transverse island flap repair \nof posterior hypospadias. J. Pediatr. Surg. 30, \n739–742 (1995).\n57. Gopal, S. C. et al. Use of fibrin glue in preventing \nurethrocutaneous fistula after hypospadias \nrepair. J. Pediatr. Surg. 43, 1869–1872 (2008).\n58. Savanelli, A., Esposito, C. & Settimi, A. A \nprospective randomized comparative study on \nthe use of ventral subcutaneous flap to prevent \nfistulas in the Snodgrass repair for distal \nhypospadias. World J. Urol. 25, 641–645 (2007).\n59. Demirbilek, S., Kanmaz, T., Aydin, G. & \nYücesan, S. Outcomes of one-stage techniques \nfor proximal hypospadias repair. Urology 58, \n267–270 (2001).\n60. Sugita, Y., Tanikaze, S., Yoshino, K. & \nYamamichi, F. Severe hypospadias repair with \nmeatal based paracoronal skin flap: the modified \nKoyanagi repair. J. Urol. 166, 1051–1053 (2001).\n61. Sugar, E. C. & Firlit, C. F. Urinary prophylaxis and \npostoperative care of children at home with an \nindwelling catheter after hypospadias repair. \nUrology 32, 418–420 (1988).\n62. Montagnino, B. A., Gonzales, E. T. Jr & Roth, D. R. \nOpen catheter drainage after urethral surgery. \nJ. Urol. 140, 1250–1252 (1988).\n63. Ben Meir, D. & Livne, P. M. Is prophylactic \nantimicrobial treatment necessary after \nhypospadias repair? J. Urol. 171, 2621–2622 \n(2004).\n64. Demirbilek, S. & Atayurt, H. F. One-stage \nhypospadias repair with stent or suprapubic \ndiversion: which is better? J. Pediatr. Surg. 32, \n1711–1712 (1997).\n65. Cilento, B. G. Jr, Stock, J. A. & Kaplan, G. W. \nPantaloon spica cast: an effective method for \npostoperative immobilization after free graft \nhypospadias repair. J. Urol. 157, 1882–1883 \n(1997).\n66. McLorie, G. et al. A prospective randomized \nclinical trial to evaluate methods of postoperative \ncare of hypospadias. J. Urol. 165, 1669–1672 \n(2001).\n67. Van Savage, J. G., Palanca, L. G. & \nSlaughenhoupt, B. L. A prospective randomized \ntrial of dressings versus no dressings for \nhypospadias repair. J. Urol. 164, 981–983 \n(2000).\nAuthor contributions\nM. Castagnetti and A. El-Ghoneimi contributed equally \nto the researching of data, discussion of content, \nwriting the article and reviewing the manuscript \nbefore submission \nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved"}, {"message_id": "1870539618674640618", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f57ddf656586ea", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-12T16:46:08", "subject": "At esofago: panorama", "original_title": "VACTERL association in screened patients with esophageal atresia: A retrospective cohort study", "smart_title": "Estudo de coorte retrospetivo — rastreio VACTERL na atresia do esófago · Amsterdam UMC (Emma Children's Hospital), 2026", "email_summary": "Lisieux partilhou este artigo no grupo Uroped sem comentário próprio no corpo do e-mail além da assinatura habitual.", "abstract_text": "", "bullets_summary": "Coorte retrospetiva unicêntrica, Amsterdam UMC, 240 neonatos com atresia do esófago (AE) nascidos entre 2000-2024\nRastreio VACTERL completo (Rx vertebral, ecografia cardíaca e renal, exame físico de membros e região anorretal) foi feito em 75% dos casos — mas atingiu 100% consistentemente nos últimos 4 anos (2020-2024)\nUsa pela primeira vez a classificação EUROCAT de 2020 (4 categorias: NO-VACTERL, VACTERL-LIKE, STRICT-VACTERL, VACTERL-PLUS) especificamente em doentes com AE\nEntre os rastreados de forma completa: 28% tinham associação VACTERL (14% VACTERL-LIKE, 11% STRICT-VACTERL, 3% VACTERL-PLUS); anomalias vertebrais (32%) e cardíacas (28%) foram as mais comuns, renais as menos comuns (9%)\nAssociação genética identificada em 13% dos rastreados — mais comummente trissomia 21\nMensagem central dos autores: rastreio VACTERL sistemático e completo deve ser perseguido globalmente, com protocolo estandardizado segundo os critérios EUROCAT, para permitir comparação entre centros", "long_summary": "Este estudo de coorte retrospetivo, conduzido no Emma Children's Hospital (Amsterdam UMC), aborda uma questão prática recorrente no seguimento de recém-nascidos com atresia do esófago (AE): até que ponto o rastreio de anomalias associadas (a chamada associação VACTERL — anomalias Vertebrais, Anorretais, Cardíacas, Tráqueo-Esofágicas, Renais e de membros/Limb) está a ser feito de forma completa e consistente, e qual a prevalência real dessas anomalias quando se usa uma definição estandardizada e recente.\n\nA AE tem incidência de cerca de 1 em 3500 nados-vivos, e pode surgir isolada ou como parte da associação VACTERL — cuja definição, histórica e heterogénea na literatura (prevalências reportadas entre 15% e 60%), foi recentemente clarificada pelo estudo populacional EUROCAT (2020), que criou 4 subcategorias com critérios explícitos de anomalias \"major\" e \"minor\": NO-VACTERL (<3 anomalias), VACTERL-LIKE (<3 major mas ≥3 no total), STRICT-VACTERL (≥3 anomalias major em sistemas diferentes) e VACTERL-PLUS (STRICT ou LIKE mais anomalias adicionais fora do espectro). Este é o primeiro estudo a aplicar esta classificação especificamente a doentes com AE.\n\nDos 240 doentes incluídos (nascidos entre 2000-2024), 75% foram submetidos a rastreio VACTERL completo (Rx vertebral, ecografia cardíaca, ecografia renal, e exame físico de membros e região anorretal) em algum momento — mas o dado mais encorajador é a evolução temporal: nos últimos 4 anos do período estudado (2020-2024), a cobertura de rastreio completo atingiu e manteve-se em 100%, refletindo a introdução de protocolos estandardizados e reuniões multidisciplinares mensais desde 2018.\n\nEntre os doentes rastreados de forma completa, as anomalias vertebrais foram as mais comuns (32%, a maioria classificada como major), seguidas das cardíacas (28%, também predominantemente major) — consistente com a literatura prévia, embora com prevalências mais baixas do que outros estudos (69% e 66%, respetivamente), atribuível aos critérios mais estritos do EUROCAT. As anomalias renais foram as menos frequentes (9%). Aplicando a classificação EUROCAT, 59% dos doentes rastreados não tinham associação VACTERL; 14% eram VACTERL-LIKE; 11% STRICT-VACTERL; e 3% VACTERL-PLUS. Foi identificada uma associação genética em 13% dos doentes rastreados (a maioria consulta com geneticista clínico foi feita em 62% do total da coorte) — trissomia 21 foi a mais comum (4%), seguida de síndrome CHARGE (2%) e trissomia 18 (1%).\n\nOs autores argumentam, com base nestes dados, que o rastreio cardíaco pré-operatório é particularmente crítico — porque anomalias cardíacas, combinadas com prematuridade e baixo peso à nascença, aumentam o risco de mortalidade nesta população — e que a deteção tardia de anomalias vertebrais (a mais comum no seu estudo) pode ter implicações a longo prazo, incluindo escoliose e limitações funcionais. O estudo também nota, como limitação importante, que 11 doentes adicionais poderiam ter cumprido critérios de associação VACTERL mesmo sem rastreio completo (por exemplo, quando apenas uma anomalia não foi avaliada mas três outras já tinham sido identificadas) — o que sugere que a prevalência real de associação VACTERL pode estar subestimada no grupo não totalmente rastreado.\n\nAs principais limitações reconhecidas são o desenho retrospetivo (risco de subnotificação em registos mais antigos e incompletos), a inconsistência de documentação ao longo de 25 anos, e o facto de o estudo não ter sido desenhado para avaliar desfechos clínicos a longo prazo — apenas a extensão do rastreio e a prevalência de anomalias detetadas. Os autores também não avaliaram sistematicamente outras anomalias frequentemente associadas à AE (traqueais, vasculares, oculares, cerebrais, intestinais) por falta de definições diagnósticas claras e consistentes para essas categorias. A conclusão prática é um apelo à implementação global de um protocolo de rastreio VACTERL estandardizado segundo os critérios EUROCAT, para permitir comparação real entre centros e países — este estudo é apresentado como um primeiro passo nessa direção.", "full_text_formatted": "Clinical Research Paper\nVACTERL association in screened patients with esophageal atresia: \nA retrospective cohort study\nRolf B. Schwarz a, b, c, * , Adinda G.H. Pijpers a, b, c , Cunera M.C. De Beaufort a, b, c,\nClaire P.M. Van Helsdingen a, b , Michiel P. van Wijk b, d , Carlijn E.L. Hoekstra e ,\nSuzanne W.J. Terheggen-Lagro f , Chantal J.M. Broers g , Petra J.G. Zwijnenburg h, \nBart Straver i , Matthijs W.N. Oomen a , Ramon R. Gorter a, b, c , Amsterdam Pediatric \nAbdominal Center Research Group\na Department of Pediatric Surgery, Emma Children's Hospital, Amsterdam UMC, Location University of Amsterdam, Meibergdreef 9, Amsterdam, the \nNetherlands\nb Amsterdam Gastroenterology Endocrinology Metabolism Research Institute, 1105 AZ, Amsterdam, the Netherlands\nc Amsterdam Reproduction & Development Research Institute, 1105 AZ, Amsterdam, the Netherlands\nd Department of Pediatric Gastroenterology and Nutrition, Emma Children's Hospital, Amsterdam UMC, Vrije Universiteit Amsterdam, the Netherlands \ne Department of Otorhinolaryngology, Amsterdam University Medical Center, Amsterdam, the Netherlands\nf Department of Pediatric Pulmonology and Allergy, Emma Children's Hospital, Amsterdam UMC, University of Amsterdam, the Netherlands\ng Department of Pediatrics, Emma Children's Hospital, Amsterdam UMC, Location University of Amsterdam, Meibergdreef 9, Amsterdam, the Netherlands \nh Department of Clinical Genetics, Emma Children's Hospital, Amsterdam UMC, Location University of Amsterdam, Meibergdreef 9, Amsterdam, the \nNetherlands\ni Department of Pediatric Cardiology, Emma Children's Hospital, Amsterdam UMC, Location University of Amsterdam, Meibergdreef 9, Amsterdam, the \nNetherlands\na r t i c l e i n f o\nArticle history:\nReceived 4 August 2025 \nReceived in revised form \n16 March 2026 \nAccepted 18 March 2026\n\nKeywords:\nNeonatal\nThoracic\nAnomaly\nAbnormality\nCongenital\nSurgery\na b s t r a c t\nBackground: Comprehensive VACTERL screening is crucial in children with esophageal atresia (EA), as \nundetected anomalies can delay diagnosis and treatments for these problems. Screening practices vary \nwidely in the literature, however. This study aimed to assess the proportion of EA patients receiving \ncomprehensive VACTERL screening, examine screening changes over time and determine the prevalence \nof additional anomalies, VACTERL association and genetic diagnoses.\nMethods: A retrospective cohort study was conducted at a single center, including all neonates born \nwith EA between 2000 and 2024. Comprehensive VACTERL screening included vertebral x-ray, cardiac \nand renal ultrasound, and physical examination for limb deformities and anorectal malformation. \nVACTERL classification was based on EUROCAT definitions.\nResults: A total of 240 patients were included. Comprehensive VACTERL screening was conducted in 180 \n(75%) patients, improving to 100% in the past four years (i.e. 2020-2024). In screened patients, vertebral \n(32%) and cardiac (28%) anomalies were most commonly identified. VACTERL association was present in \n28% of comprehensive screened EA patients: 14% VACTERL-LIKE, 11% STRICT-VACTERL and 3% VACTERL-\nPLUS. A genetic association was identified in 13% of patients, most commonly trisomy 21.\nConclusions: While 75% of EA patients underwent comprehensive VACTERL screening, a fourth of the \npatients were not fully assessed, potentially leading to unrecognized anomalies with possible clinical \nimplications. Over the last four years 100% screening rate has successfully been attained. VACTERL \nassociation was identified in 28% of patients and a genetic diagnosis was established in 13%. These \nfindings emphasize the importance to pursue systematic and comprehensive VACTERL screening for \npatients with EA to detect these anomalies.\n© 2026 The Authors. Published by Elsevier Inc. This is an open access article under the CC BY license \n(http://creativecommons.org/licenses/by/4.0/).\n* Corresponding author.\nE-mail address: r.schwarz@amsterdamumc.nl (R.B. Schwarz).\nContents lists available at ScienceDirect\nJournal of Pediatric Surgery\njournal homepage: www.sciencedirect.com/journal/ \njournal-of-pediatric-surgery\nhttps://doi.org/10.1016/j.jpedsurg.2026.163103\n0022-3468/© 2026 The Authors. Published by Elsevier Inc. This is an open access article under the CC BY license (http://creativecommons.org/licenses/by/4.0/).\nJournal of Pediatric Surgery 61 (2026) 163103\n\n1. Introduction\nEsophageal atresia (EA) is a congenital malformation charac-\nterized by an interruption in the continuity of the esophagus, \nfrequently accompanied by a tracheoesophageal fistula (TEF). The \nincidence of EA is approximately 1 in 3500 live births [1]. Ac-\ncording to the Gross classification, there are five types of EA, with \ntype C being the most common (well over 90%) [2]. The condition \narises during embryogenesis (week 4—6 of gestation) due to de-\nfects in tracheoesophageal septum formation, likely resulting from \na multifactorial interplay of genetic and environmental factors [3].\nEA can manifest as an isolated defect, but may also be part of \nthe VACTERL association. This association includes vertebral \nanomalies (V), ano-rectal malformations (A), cardiac anomalies \n(C), trachea-esophageal anomalies (TE), renal anomalies (R) and \nlimb malformations (L) [4,5]. In 2020, EUROCAT refined the VAC-\nTERL association into four categories: NO-VACTERL (<3 anoma-\nlies), VACTERL-LIKE (<3 major but ≥3 total anomalies), STRICT-\nVACTERL (≥3 major anomalies in different systems, no extraneous \ndefects), and VACTERL-PLUS (VACTERL-STRICT or VACTERL-LIKE \nwith additional anomalies outside the spectrum).\nMinor and major criteria were established for each VACTERL \nanomaly [6]. Previous studies have reported associated anomalies \nin 42—56% of patients with EA [7—10]. The prevalence of VACTERL \nassociation in EA patients has been estimated to range between \n10% and 33% [7,8,11—13].\nComprehensive VACTERL screening is essential as missed \nmanifestations can complicate diagnosis and delay necessary in-\nterventions [14,15]. Cardiac screening is crucial to perform pre-\noperatively to the EA correction as cardiac defects can significantly \nimpact surgical outcomes and overall prognosis [16]. Additionally, \ncardiac anomalies, along with prematurity and low birth weight, \ncan increase mortality risk in patients with EA [17,18]. Despite its \nimportance, there is considerable inconsistency in the application \nof VACTERL definitions and diagnostic practices, leading to vari-\nable screening approaches. Similar challenges have been observed \nin patients with anorectal malformations (ARM). A recent study \nconducted at our medical center using the EUROCAT criteria \nrevealed that 77% of ARM patients underwent comprehensive \nVACTERL screening, with 16% meeting the criteria for VACTERL \nassociation [19]. However, there is no evidence in current litera-\nture for comprehensive VACTERL screening in patients with EA \nand the VACTERL association based on the newly developed \nEUROCAT definitions.\nTherefore, the aim of this study was to evaluate the number of \nEA patients that received comprehensive VACTERL screening \nduring the neonatal phase. Additionally, we aimed to provide an \noverview of the comprehensive VACTERL screening over time. \nLastly, we aimed to determine the number of EA patients with \nadditional anomalies within VACTERL and the VACTERL-associa-\ntion (using EUROCAT definitions) or other underlying genetic \nassociations.\n2. Methods\n2.1. Study design and patient population\nA retrospective mono-center cohort study was performed at \nthe pediatric surgery department of the Emma children's hos-\npital, Amsterdam University Medical Centers (AUMC). The AUMC \nis a tertiary referral institution accredited by the national au-\nthority as a center of expertise for Esophageal Atresia and part of \nthe European Reference Network for rare Inherited and \nCongenital (digestive and gastrointestinal) Anomalies (ERNICA). \nThe criteria for Strengthening the Reporting of observational\nStudies in Epidemiology (STROBE) were followed in the design of \nthis study [20].\nThe study included all patients born with EA between January \n2000 and December 2024. Patients who presented to our center at \na later age for EA-related care (e.g. those born and surgically \ntreated outside our centre) were excluded from the study.\n2.2. Ethics\nAs this retrospective study was not subject to the Dutch Med-\nical Research Involving Human Subjects Act, research ethics \napproval was not required (W18_233#18.278). In the AUMC, a \ngeneral consent opt-out approach was used. This approach as-\nsumes that individuals agree to participate unless they explicitly \nstate otherwise, ensuring broad inclusion while maintaining the \nright to opt-out if they do not wish to contribute.\n2.3. Data extraction\nThe following data were extracted by three researchers (RS, RJ, \nand AGHP): patient characteristics (i.e. sex, preterm, amenorrhea \nduration, age of mother at birth, birth route, birth weight, multiple \nbirth, antenatal diagnosis, type of surgery, death and follow-up \ntime), the type of EA (according to Gross classification) [2] and \nVACTERL screening (over time) for additional anomalies (classified \ninto major and mild anomalies based on EUROCAT guidelines) [6]. \nFor example, Tetralogy of Fallot or transposition of the great ar-\nteries are major cardiac anomalies and ventricular or atrial septal \ndefects are classified as minor anomalies. Furthermore, data on \ngenetic counseling and testing was also extracted from the med-\nical records. In order to enhance data validation, one author (RG) \nverified about 20% of the records that were entered. If a record \ncontained more than 1% of discrepancies, the entire record was re-\nexamined.\n2.4. Comprehensive screening\nScreening to identify additional anomalies besides EA, con-\nsisted of vertebral (V) screening (i.e. vertebral x-ray), anorectal (A) \nmalformation screening (i.e. physical examination), cardiac (C) \nscreening (i.e. cardiac US), renal (R) screening (i.e. renal US) and \nlimb (L) screening (i.e. physical examination). Comprehensive \nVACTERL screening requires the combined systematic evaluation \nof all anomalies within the VACTERL spectrum. The comprehen-\nsive screening assessment is also reported annually over the \ncourse of the study period.\nA clinical geneticist conducted genetic counseling at the \ntreating physician's discretion. It involved a thorough review of the \npatient's medical history, family history, and physical examination. \nAt the clinical geneticist's discretion, further genetic testing was \nconducted. Most genetic testing was carried out using next-gen-\neration sequencing, Sanger sequencing, array analysis, or kar-\nyotyping. Variants that lacked significance were excluded from the \ncausal analysis. Since the end of 2017, consultation with a clinical \ngeneticist has been incorporated as a standard component of the \nclinical care pathway for patients with esophageal atresia at \nAmsterdam UMC.\n2.5. VACTERL-association and CHARGE association\nVACTERL association was evaluated by classifying each addi-\ntional anomaly according to minor and major criteria as pre-\ndefined by the EUROCAT study [6]. Major VACTERL features consist \nof the congenital anomalies that characterize the classical VAC-\nTERL association, whereas minor features are atypical anomalies\nR.B. Schwarz, A.G.H. Pijpers, C.M.C. De Beaufort et al. / Journal of Pediatric Surgery 61 (2026) 163103\n2\n\nthat occur within the same organ systems but are not consistently \nobserved in VACTERL cases. Based on this classification, four \nsubcategories of VACTERL association were established, as detailed \nin Table 1. CHARGE association was defined as a non-random \ncluster of congenital anomalies including Coloboma, Heart defects, \nAtresia choanae, Retardation of growth and/or development, \nGenitourinary malformations, and Ear anomalies [21]. CHARGE \nassociation is generally considered when at least four of these \nfeatures are present, including either coloboma or choanal atresia.\n2.6. Outcomes\nPrimary outcome was the number of EA patients who under-\nwent comprehensive screening to identify additional anomalies \nwithin the VACTERL framework of the total included EA patients. \nIn addition, the screening data were analyzed longitudinally to \nassess changes in the extent of comprehensive screening for \nadditional anomalies over the database period (i.e. 2000—2024).\nSecondary outcomes encompassed the number of EA patients \nwith additional anomalies, the number of EA patients diagnosed \nwith a VACTERL association (STRICT-VACTERL, VACTERL-LIKE, \nVACTERL-PLUS, or NO-VACTERL), and the number of patients with \nany other identified genetic etiology or syndrome among all \nscreened patients.\n2.7. Statistical analysis\nDescriptive statistics were used to analyze patient character-\nistics, with categorical variables presented as frequencies and \npercentages, and continuous variables as medians with inter-\nquartile ranges (IQR). Comprehensive screening was similarly \nevaluated using descriptive statistics and visualized over time \nthrough graphical representation. Both primary and secondary \noutcomes were reported as proportions of a total (percentages), \nwith missing data explicitly described. All analyses were per-\nformed using IBM SPSS Statistics for Windows, Version 28.0 (IBM \nCorp., Armonk, NY, USA).\n3. Results\n3.1. Patient characteristics\nA total of 240 patients were included in the study, comprising \n153 male (64%). Of these 240 patients, 82 were born preterm (34%) \nand 144 were born vaginally (60%) with a median birth weight of \n2660 g (IQR 2010—3193). Multiple births occurred in 18 patients \n(8%). As shown in Table 2, the most common type of EA was type C, \nwith an occurrence of 205 (85%). Antenatal diagnosis of EA was \nmade in 37 patients (15%). Regarding the applied surgical \napproach, 194 of the patients (81%) underwent open repair.\nOf all EA patients included, 21 died (9%) with a median age at \ndeath of four weeks (IQR 0—48). In 6 of those patients (3%), no \nsurgical intervention was performed for the EA due to severe co-\nmorbidity, in which comfort care was provided. In those who did \nreceive surgery, 6 died within 30 days postoperatively (3%). Sup-\nplement 1demonstrates all fatal patients, including causes of \ndeath.\n3.2. Comprehensive VACTERL screening (over time)\nIn total, 180 of the EA-patients (75%) underwent comprehen-\nsive VACTERL screening at any moment in time, as shown in \nTable 3. Figure 1 and Supplement 2 demonstrate the comprehen-\nsive screening throughout the years. The extent of comprehensive \nVACTERL screening has increased over time, and over the past four \nyears (i.e. 2020-2024), comprehensive screening coverage (i.e. \n100%) has been consistently maintained.\nConsultation of a clinical geneticist was performed in 148 of all \nthe patients (62%).\n3.3. Prevalence of additional anomalies in screened patients\nThe two most common additional anomalies observed were \nvertebral anomalies, present in 70/219 (32%) screened patients, \nand cardiac anomalies, found in 59/214 (28%) patients as is shown \nin Table 3. Among those with vertebral anomalies, 40/219 (18%) \nwere classified as major, while the remaining 30/219 (14%) were \nconsidered minor. Cardiac anomalies showed a similar pattern, but \nwith an even higher proportion of major anomalies, namely 47/214\nTable 1\nVACTERL-association based on the EUROCAT classification (11).\nVACTERL-association\nDefinition\nNO-VACTERL\n<3 anomalies\nVACTERL-like\n<3 major anomalies plus minor anomalies adding up to\n≥3 anomalies\nSTRICT-VACTERL\n≥3 major anomalies (in different organ systems) \nwithout other anomalies outside of the VACTERL-\nassociation\nVACTERL-plus\nPatients who fulfilled the strict-VACTERL or the \nVACTERL-like group, with additional anomalies outside \nof the VACTERL-association\nTable 2\nPatient cohort. b\nCharacteristics a\nEA patients \nN = 240 (%)\nSex\nFemale\n87 (36)\nMale\n153 (64)\nPreterm\n82 (34)\nMedian amenorrhea duration (IQR) -.w.d \n37.5 (35.0—39.3)\nMedian age mother at birth (IQR) — years \n31.5 (27—35)\nBirth route\nVaginal\n144 (60)\nCaesarean section\n73 (30)\nUnknown\n23 (10)\nMedian birth weight (IQR) — grams \n2660 (2010—3193)\nMultiple birth\n18 (8)\nType of EA\nType A\n21 (9)\nType B\n4 (2)\nType C\n205 (85)\nType D\n1 (0)\nType E\n8 (3)\nUnknown\n1 (0)\nEA diagnosed antenatal\n37 (15)\nType of surgery\nOpen\n194 (81)\nScopic\n33 (14)\nConverted\n5 (2)\nUnknown\n2 (1)\nNo surgery c\n6 (3)\nDeath d\n21 (9)\nMedian age at death (IQR) - weeks\n4 (0—48)\nNo surgery performed due to comorbidity \n6 (3)\nSurgery, death <30 days after\n6 (3)\nMedian age at latest follow up (IQR) — y.m.\n4.2 (1.3—10.3)\na Data presented as number (%) or median (interquartile range). N: number, EA: \nesophageal atresia, IQR inter quartile range.\nb Percentages may not total 100 because of rounding.\nc No surgery performed due to comorbidity as mentioned underneath death.\nd Supplement 1 demonstrates all fatal cases, including causes of death.\nR.B. Schwarz, A.G.H. Pijpers, C.M.C. De Beaufort et al. / Journal of Pediatric Surgery 61 (2026) 163103 \n3\n\n(22%) in cardiac screened patients. The least common anomaly \nwas renal, observed in only 20/225 (9%) of screened patients, with \na near-equal distribution of major (5%) and minor (4%) anomalies.\n3.4. Genetic anomalies and VACTERL-association in comprehensive \nscreened patients\nOf the 180 patients who underwent comprehensive screening, \n106 (59%) showed no evidence of VACTERL association. VACTERL-\nLIKE subcategory was identified in 25 patients (14%), STRICT-\nVACTERL in 20 patients (11%), and VACTERL-PLUS in 5 patients \n(3%).\nA genetic association was identified in 24 (13%) comprehensive \nscreened patients, as shown in Table 4. Among these, trisomy 21 \nwas the most common, represented in 8 (4%) patients, followed by \nCHARGE syndrome with 3 (2%), and trisomy 18 with 2 (1%). The \neleven remaining patients (6%) had other genetic anomalies.\n4. Discussion\nThis retrospective mono-center cohort study showed that 75% \nof the EA patients underwent comprehensive VACTERL screening. \nOver the research period (i.e. 2000-2024), screening has improved\nsignificantly, with a maximum comprehensive screening in the \nlast four years (i.e. 2020-2024). The most common additional \nanomalies that occurred in screened EA patients were vertebral \nanomalies and cardiac anomalies. In both cases the majority was a \nmajor anomaly. Least common anomaly found was renal. Ac-\ncording to the EUROCAT classification, VACTERL-LIKE was identi-\nfied in 14% of the patients, STRICT-VACTERL in 11%, and VACTERL-\nPLUS in 3%. A genetic association was found in 13%, with trisomy \n21 being the most common.\nOur study is unique as it is the first study to describe VACTERL \nassociation in screened EA patients, according to the recently \ndeveloped EUROCAT definitions [6]. It was therefore difficult to \ndirectly compare our findings with the existing literature. Previous \nstudies have reported a prevalence of VACTERL association in EA \npatients ranging from 15% to 60% [7,12,13,22,23]. This large range \ncould be explained by the heterogeneity of VACTERL definition \nbefore the development of the EUROCAT definition. This variation \nhighlights the worth of using VACTERL definitions as outlined by \nthe EUROCAT study, to enhance reproducibility and ensure con-\nsistency. In addition, to being the first study to employ these \ncriteria in EA patients, this study also evaluates the presence of \nVACTERL association only when comprehensive screening was \nconducted. This criterion was not consistently applied in previous \nstudies, which underscores the robustness of the current research.\nThe reported proportion of EA patients with a genetic associ-\nation in the literature is 8%, which is slightly lower than the 13% \nobserved in our study [7]. The primary reason for this is that our \nstudy includes only the proportion of EA patients who have un-\ndergone a consultation with a clinical geneticist, ensuring the most \naccurate representation. Additionally, this trend may be influenced \nby the increasing referral to geneticists over the years and the\nTable 3\nVACTERL screening and additional anomalies found in screened EA patients.\nVACTERL screening\nEA patients \nN = 240 (%)\nMissing \nN (%)\nVertebral screening\n219 (91)\nAnomaly found\n70 (32)\n21 (9)\nMinor\n30 (14)\nMajor\n40 (18)\nAnal screening\n206 (86)\nAnomaly found\n19 (9)\n34 (14)\nMinor\n0 (0)\nMajor\n19 (9)\nCardiac screening\n214 (89)\nAnomaly found\n59 (28)\n26 (11)\nMinor\n12 (6)\nMajor\n47 (22)\nRenal screening\n225 (94)\nAnomaly found\n20 (9)\n15 (6)\nMinor\n9 (4)\nMajor\n11 (5)\nLimb screening\n203 (85)\nAnomaly found\n21 (10)\n37 (15)\nMinor\n7 (3)\nMajor\n14 (7)\nComprehensive VACTERL-screening \n180 (75)\nConsultation clinical genetics\n148 (62)\nN: number, EA: esophageal atresia.\nFig. 1. Comprehensive screening over time in EA-patients.\nTable 4\nGenetic anomalies and VACTERL association in comprehensive screened EA \npatients. a\nOutcome\nEA-patients \nN = 240 (%)\nMissing \nN (%)\nComprehensive VACTERL screening \n180 (75)\n60 (25)**\nNO-VACTERL\n106 (59)\nVACTERL-LIKE\n25 (14)\nSTRICT-VACTERL\n20 (11)\nVACTERL-PLUS\n5 (3)\nGenetic anomalies found \n24 (13)\nTrisomy 21\n8 (4)\nTrisomy 18\n2 (1)\nCHARGE syndrome\n3 (2)\nOther\n11 (6)\nN: number, EA: esophageal atresia.\n**Insufficient information to make any statement on VACTERL association. \na Percentages may not total 100 because of rounding.\nR.B. Schwarz, A.G.H. Pijpers, C.M.C. De Beaufort et al. / Journal of Pediatric Surgery 61 (2026) 163103\n4 \n\nhigher frequency of genetic testing when additional anomalies are \nidentified in EA patients. With regard to the most common genetic \nanomaly, this is either trisomy 21 or trisomy 18, in line with our \nresearch [7,12,23].\nThe findings regarding the most commonly observed additional \nanomalies in EA align with those reported in the existing literature, \nwhich documents that vertebral and cardiac anomalies are the \nmost frequently identified anomalies, occurring in respectively \n69% and 66% of patients [24]. In our study, the prevalence rates \nwere 32% for vertebral anomalies and 28% for cardiac anomalies. \nThe lower rates observed can be attributed to the more stringent \ninclusion criteria for additional anomalies based on the minor and \nmajor criteria established by EUROCAT.\nIn our view, and in accordance with previous research, preop-\nerative VACTERL screening is imperative for the early identifica-\ntion of cardiac defects, as these anomalies can significantly \ninfluence surgical outcomes and overall prognosis in patients with \nEA [16]. The presence of cardiac anomalies, when combined with \nfactors such as prematurity and low birth weight, has been \ndemonstrated to elevate mortality risk within this patient cohort \n[17,18]. Furthermore, comprehensive VACTERL screening is \nessential, as the failure to detect associated anomalies can \ncomplicate diagnosis and delay critical interventions, potentially \nresulting in adverse health consequences [14,15]. For example, \nfailure to conduct timely screening for our most common addi-\ntional anomaly (i.e. vertebral) might result in long-term compli-\ncations such as persistent musculoskeletal deformities, functional \nimpairments, and an increased risk of surgical interventions due to \nconditions like scoliosis, ultimately compromising the quality of \nlife and overall health outcomes [8,25,26]. Therefore, the imple-\nmentation of thorough VACTERL screening protocols is crucial for \noptimizing patient management and enhancing long-term results.\nThe results of this study should be interpreted in the light of some \nstrengths and limitations. A major strength of this study is the large \ncohort we gathered over the past 25 years, allowing us to provide a \nreliable estimate of the percentage of VACTERL associations in our \ngroup and a comprehensive overview of screening practices over \nthis period. Additionally, we used the standardized criteria of the \nrecently published EUROCAT definition, making our results gener-\nalizable and more comparable with studies worldwide. Further-\nmore, over the past four years (i.e. 2020-2024), comprehensive \nscreening has been achieved in our hospital due to the development \nof standardized protocols for identifying additional anomalies in EA \npatients, coupled with a monthly multidisciplinary meeting (since \n2018). This serves as a strong indicator for the potential future \nimplementation of similar practices globally.\nThe main limitation of this study is its retrospective design. \nMissing or incomplete data in patient records, especially from \nearlier years, may lead to underreporting of anomalies. Addition-\nally, inconsistencies in documentation practices over time and \npotential biases further limit the accuracy and comprehensiveness \nof the findings. Lastly, VACTERL association was assessed exclu-\nsively in EA patients who underwent comprehensive screening to \nensure the most unconfounded results. Nonetheless, it is possible \nto meet the criteria for VACTERL association even without \ncomprehensive screening. For instance, this may occur when only \none additional anomaly was not evaluated while three others were \nidentified. Consequently, eleven additional patients, eight classi-\nfied as VACTERL-like and three as STRICT-VACTERL, may have \nfulfilled the criteria, potentially leading to underrepresentation. \nAnother important limitation of this study is that it was not \ndesigned to evaluate the long-term clinical outcomes of compre-\nhensive VACTERL screening. The primary aim was to describe \nscreening over time and to assess the prevalence of additional \nanomalies detected through screening. As a result, this study does\nnot compare long-term outcomes between screened and non-\nscreened patients. Future studies specifically designed to evaluate \nwhether comprehensive screening influences clinically relevant \noutcomes would provide important additional insight. Finally, \nother anomalies frequently associated with EA―such as tracheal, \nvascular, ocular, cerebral, and intestinal anomalies, were not sys-\ntematically evaluated. Although inclusion of these anomalies \nwould provide a more complete picture, systematic assessment is \ncomplicated by the lack of clear diagnostic definitions, severity \ngrading, and classification as minor or major anomalies, which \nshould be addressed in future studies.\nIn the future, it would be advantageous to further enhance \nscreening protocols by incorporating specifications based on the \nsubtype of EA. Certain additional anomalies within the VACTERL \nassociation may demonstrate varying prevalence rates depending \non the EA subtype, thereby facilitating a more targeted screening \napproach. However, our study did not employ further subdivision \naccording to the Gross classification due to the major over-\nrepresentation of Type C (85%), which precluded meaningful \ncomparisons, particularly for rare subtypes such as Type D which \nwas represented by only one case. Consequently, larger studies \nwith a more balanced distribution of EA subtypes are essential to \nrefine the screening protocol effectively.\n5. Conclusion\nIn conclusion, we found that 75% of the patients with EA received \ncomprehensive VACTERL screening, improving to 100% over the last \nfour years (i.e. 2020-2024). The most frequent additional anomalies \nin screened EA patients were vertebral and cardiac, predominantly \nmajor. Renal anomalies were least common. Based on EUROCAT \ndefinitions, 14% were classified as VACTERL-LIKE, 11% as STRICT-\nVACTERL, and 3% as VACTERL-PLUS. A genetic association was \nidentified in 13% of patients, most commonly trisomy 21. In detecting \nadditional anomalies and determining a VACTERL association, a \ncomprehensive VACTERL screening should be pursued. Therefore, a \nglobal implementation of a standardized VACTERL screening pro-\ntocol is needed for EA patients, which operates according to the \nEUROCAT definitions to ensure homogeneity and reproducibility. \nOur research represents an initial step toward this goal.\n\nFunding\nNo funding was received.\n\nConflicts of interest\nThe authors declare that they have no competing interests.\n\nAcknowledgments\nNot applicable.\nAppendix A. Supplementary data\nSupplementary data to this article can be found online at \nhttps://doi.org/10.1016/j.jpedsurg.2026.163103.\n\nReferences\n[1] Depaepe A, Dolk H, Lechat MF. The epidemiology of tracheo-oesophageal \nfistula and oesophageal atresia in Europe. EUROCAT working group. Arch Dis \nChild 1993;68(6):743—8.\n[2] The Surgery of Infancy and Childhood. Its principles and cases of \nesophageal atresia. Am J Med Genet A 2023;191(1):77—83.\n[24] de Jong EM, Felix JF, Deurloo JA, van Dooren MF, Aronson DC, Torfs CP, et al.\nNon-VACTERL-type anomalies are frequent in patients with esophageal \natresia/tracheo-esophageal fistula and full or partial VACTERL association. \nBirth Defects Res A Clin Mol Teratol 2008;82(2):92—7.\n[25] Sistonen SJ, Helenius I, Peltonen J, Sarna S, Rintala RJ, Pakarinen MP. Natural \nhistory of spinal anomalies and scoliosis associated with esophageal atresia. \nPediatrics 2009;124(6):e1198—204.\n[26] Okuyama H, Tazuke Y, Uenoa T, Yamanaka H, Takama Y, Saka R, et al. Long-\nterm morbidity in adolescents and young adults with surgically treated \nesophageal atresia. Surg Today 2017;47(7):872—6.\nR.B. Schwarz, A.G.H. Pijpers, C.M.C. De Beaufort et al. / Journal of Pediatric Surgery 61 (2026) 163103\n6"}, {"message_id": "1869872061689763622", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f31ebbac721726", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-05T07:55:42", "subject": "há nuances....", "original_title": "Intraoperative ultrasound in nephron-sparing surgery for paediatric renal tumours: A single-centre cohort study", "smart_title": "Estudo de coorte unicêntrico — ultrassom intraoperatório em cirurgia poupadora de néfrons para tumor de Wilms · Great Ormond Street Hospital, Londres, 2026", "email_summary": "Lisieux partilhou este artigo no grupo Uroped com o assunto \"há nuances....\", sem desenvolver o comentário no corpo da mensagem — sugerindo que via nuances importantes no estudo, sem as detalhar por escrito.", "abstract_text": "", "bullets_summary": "Coorte unicêntrica (Great Ormond Street Hospital, Londres), comparando cirurgia poupadora de néfrons (NSS) com e sem ultrassom intraoperatório (EIOUS) feito por radiologista consultor dedicado\n71 doentes: 51 (72%) sem EIOUS (coorte histórica, 2000-2016) vs 20 (28%) com EIOUS (2016-2025) — 103 unidades renais, 167 espécimes de resseção no total\nAchado central: margens cirúrgicas positivas em lesões malignas caíram de 36% (sem EIOUS) para 0% (com EIOUS), p<0,001 — sem sacrificar parênquima preservado (84,6% vs 90,7%, sem diferença estatística)\nModelo distintivo: radiologista consultor dedicado a operar em conjunto com o cirurgião (não o próprio cirurgião a manusear a sonda, como na maioria dos estudos prévios em adultos)\nUso de sonda linear \"hockey stick\" de 24MHz colocada diretamente na cápsula renal, com soro fisiológico para otimizar o acoplamento acústico; permite delinear o tumor, verificar a resseção proposta e confirmar excisão completa em tempo real\nTambém reduziu resseções adicionais desnecessárias de margem renal \"de segurança\" (17 casos na coorte histórica vs 2 na coorte com EIOUS) — nenhuma continha tumor, logo eram perda de tecido saudável evitável", "long_summary": "Este estudo de coorte unicêntrico do Great Ormond Street Hospital (Londres) avalia o impacto de uma colaboração intraoperatória incomum — um radiologista consultor a fazer ecografia diretamente na cápsula renal, ao lado do cirurgião, durante toda a cirurgia poupadora de néfrons (nephron-sparing surgery, NSS) para tumores renais pediátricos, principalmente tumor de Wilms.\n\nO contexto clínico é bem definido: a NSS procura excisão completa do tumor preservando o máximo de parênquima renal saudável, mas é tecnicamente mais exigente do que a nefrectomia total e carrega maior risco de margens cirúrgicas positivas (historicamente 20-30%), o que classifica o doente em estádio local III e implica escalada terapêutica — quimioterapia intensificada, radioterapia e, nalguns casos, nefrectomia de finalização — com impacto direto na função renal a longo prazo, particularmente crítico em tumor de Wilms bilateral, onde preservar tecido renal é essencial para evitar hipertensão, doença renal terminal e morbilidade cardiovascular futuras.\n\nA equipa de Londres estabeleceu, há uma década, uma colaboração intraoperatória entre o cirurgião consultor e um radiologista consultor dedicado, que se junta ao campo estéril e realiza ecografia em tempo real diretamente sobre a cápsula renal (sonda linear \"hockey stick\" de 24MHz, com soro fisiológico para melhorar o acoplamento acústico). Isto distingue este estudo de praticamente toda a literatura prévia sobre ultrassom intraoperatório (IOUS) em cirurgia renal — que é maioritariamente de adultos, e onde tipicamente é o próprio cirurgião a manusear a sonda, não um radiologista dedicado. A ecografia é usada em três momentos: para delinear a lesão antes da incisão, para verificar a proposta de resseção do cirurgião durante a dissecação, e para confirmar a excisão completa depois de removido o tumor (inclusivamente escaneando o espécime numa cuba de soro, quando possível).\n\nO estudo compara uma coorte histórica de 2000-2016 sem esta técnica (51 doentes, 77 unidades renais, 128 espécimes de resseção) com uma coorte prospetiva de 2016-2025 com a técnica (EIOUS — 20 doentes, 26 unidades renais, 39 espécimes). Note-se que a coorte com EIOUS tinha diagnósticos mais heterogéneos (incluindo carcinoma de células renais e um caso associado a síndrome de Beckwith-Wiedemann), refletindo critérios de elegibilidade para NSS que se expandiram ao longo do tempo.\n\nO resultado central é notável: margens histologicamente positivas em lesões malignas ocorreram em 36% (27/75) dos casos na coorte sem EIOUS, e em 0% (0/18) na coorte com EIOUS (p<0,001) — uma eliminação completa das margens positivas. Crucialmente, isto não foi conseguido à custa de remover mais tecido saudável: a percentagem de parênquima preservado foi semelhante entre os grupos (84,6% sem EIOUS vs. 90,7% com EIOUS, sem diferença estatística significativa), e o número de resseções adicionais de \"margem de segurança\" (tecido extra removido por precaução, para além do espécime principal) caiu de 17 casos na coorte histórica para apenas 2 na coorte com EIOUS — sendo que, em nenhum dos casos, essas margens adicionais continham realmente tumor, confirmando que eram perda desnecessária de tecido saudável, agora evitável com maior confiança intraoperatória guiada por imagem.\n\nOs autores comparam o seu modelo com outros relatos de IOUS em cirurgia renal pediátrica (nomeadamente Aldrink et al., com 22,5% de margens positivas apesar de usar IOUS, mas maioritariamente manuseado pelo próprio cirurgião), argumentando que a perícia subespecializada de um radiologista dedicado — em identificar os limites subtis do tumor (sobretudo quando embutido em restos nefrogénicos, um cenário particularmente complexo no tumor de Wilms bilateral), avaliar proximidade a vasos e sistema pielocalicial, e confirmar excisão completa em tempo real — ultrapassa a capacidade do cirurgião a operar sozinho a sonda.\n\nAs limitações reconhecidas são relevantes: desenho retrospetivo e não-randomizado (a coorte \"controlo\" é histórica, não contemporânea), ausência de dados de função renal a longo prazo (não é possível confirmar se margens negativas se traduzem diretamente em melhores desfechos renais/oncológicos a longo prazo), e tratar-se de experiência de um único centro altamente especializado — os próprios autores pedem estudos multi-institucionais para validar estes achados antes de recomendar adoção mais ampla desta configuração específica (radiologista dedicado, não o cirurgião a operar a própria sonda).", "full_text_formatted": "Clinical Research Paper\nIntraoperative ultrasound in nephron-sparing surgery for paediatric \nrenal tumours: A single-centre cohort study\nCarolina Bebi a, * , Tom Watson b , Alberto Mantovani a , Jesper Brok c , Riwa Meshaka b,\nEmily Ashworth b , Tanzina Chowdhury c , Catriona Duncan c , Neil Sebire d ,\nJ. Ciaran Hutchinson d , Abraham Cherian a , Imran Mushtaq a , Alexander Cho a ,\nNaima Smeulders a\na Department of Paediatric Urology, Great Ormond Street Hospital for Children, London, United Kingdom\nb Department of Paediatric Radiology, Great Ormond Street Hospital for Children, London, United Kingdom\nc Department of Paediatric Oncology, Great Ormond Street Hospital for Children, London, United Kingdom\nd Department of Paediatric Histopathology, Great Ormond Street Hospital for Children, London, United Kingdom\na r t i c l e i n f o\nArticle history: \nReceived 14 April 2026 \nAccepted 20 April 2026\n\nKeywords:\nPaediatric\nRenal tumours\nNephron-sparing surgery (NSS) \nIntraoperative ultrasound (IOUS)\na b s t r a c t\nBackground: Nephron-sparing surgery (NSS) for paediatric renal tumours seeks maximal parenchymal \npreservation. However, incomplete tumour excision often requires additional therapy impacting renal \nfunction. We evaluate the impact of intraoperative ultrasound on histological margins during NSS (US-\nNNS).\nMethods: All patients offered US-NSS (2016—2025) were recorded prospectively and compared to all \nhistorical NSS cases (2000—2016) undertaken without ultrasound (non-US-NSS). On-table US was \nperformed by a consultant radiologist using a linear-array transducer on the renal capsule. NSS sought a \nrim of normal parenchyma and was used for multiple lesions when needed. Data included de-\nmographics, histology, surgical margins, and kidney/specimen volumes. Using the formula \nd1 × d2 × d3 × 0.523, pathological specimen volumes were subtracted from the pre-operative MRI \nrenal unit volumes to determine the percentage of preserved parenchyma. Fisher's exact test compared \nmargin positivity for malignant lesions.\nResults: The cohorts comprised 128 non-US-NSS in 51 patients (median age 28 months) and 39 US-NSS \nin 20 patients (median age 15.5 months). Histology for the 128 non-US-NSS were 64 Wilms tumours \n(WT), 13 equivocal WT, 51 non-malignant lesions, and for the 39 US-NSS 14 WT, 1 equivocal WT, 3 renal \ncell carcinoma (RCC), and 21 non-malignant lesions. The median specimen volumes per renal unit was \n12.00 cm 3 (IQR 4.01—28.5 cm 3 ) vs 8.93 cm 3 (IQR 3.34—17.89 cm 3 ), and median preserved parenchyma \nper renal unit was 84.56% (IQR 62.71%—97.17%) vs 90.74% (IQR 74.20%—96.67%) in non-US-NSS vs US-\nNSS. Positive margins for malignant lesions occurred in 27/75 (36%) non-US-NSS, and in 0/18 US-NSS \n(p < 0.001).\nConclusion: Intraoperative ultrasound for NSS eliminated positive margins for malignant lesions while \nmaintaining high parenchymal preservation.\n© 2026 Published by Elsevier Inc.\nh i g h l i g h t s\n• Positive surgical margins after nephron-sparing surgery resulted in an increased burden of therapy for children with malignant renal tumours.\n• Intraoperative ultrasound by a consultant radiologist significantly improved the accuracy of nephron-sparing surgery.\n• Histologically positive surgical resection margins were eliminated while preserving high levels of normal renal parenchyma.\n1. Introduction\nRenal tumours in children are a heterogeneous entity, though \nWilms tumours (WT) account for almost 90% of cases [1]. Rising \nsurvival rates are spurring greater consideration of the long-term\n* Corresponding author. Great Ormond Street Hospital for Children, Guilford St, \nLondon, WC1N 3BH, United Kingdom.\nE-mail address: carolina.bebi@gosh.nhs.uk (C. Bebi).\nContents lists available at ScienceDirect\nJournal of Pediatric Surgery\njournal homepage: www.sciencedirect.com/journal/ \njournal-of-pediatric-surgery\nhttps://doi.org/10.1016/j.jpedsurg.2026.163163 \n0022-3468/© 2026 Published by Elsevier Inc.\nJournal of Pediatric Surgery 61 (2026) 163163\n\ntreatment-related side effects [2]. Cozzi et al. observed 42% of \npatients, who underwent a unilateral nephrectomy in childhood, \nto show signs of mild to moderate renal dysfunction by early \nadulthood, increasing to 78% of those followed up into their fifth \ndecade of life [3]. Hypertension, another important long-term \ncomplication, affected 66.7% of patients with bilateral Wilms \ntumour who underwent a total nephrectomy on one side, \ncompared to 20% of those offered bilateral nephron-sparing sur-\ngery (NSS) [4]. In this context, the accepted eligibility criteria for \nNSS have been expanding [5].\nIn NSS, the surgeon seeks to achieve a complete tumour exci-\nsion while maximising the preservation of healthy renal paren-\nchyma. NSS is technically more challenging than nephrectomy and \ncarries a higher risk of surgical complications [5]. The major \nconcern for NSS is the risk of incomplete tumour resection, with \nthe reported incidence of a histological positive margin typically at \naround 20%—30% [6—8]. This classifies the patient as local stage III \nand leads to additional post-operative treatment or completion \nnephrectomy [9], with implications for the patient's quality of life \nand renal function. With a view to reducing incomplete surgical \nresections, referral to highly-specialised centres experienced in \nNSS is recommended [5]. However, positive margins still occa-\nsionally occur even in a nationalised service [10].\nIntraoperative ultrasound (IOUS) has long been a feature of \nadult renal tumour surgery, particularly in the context of robotic-\nassisted partial nephrectomy [11,12]. While the use of IOUS has \nbeen reported in paediatric NSS, outcome data remains ambivalent \n[13]. We established an intraoperative collaboration between the \nconsultant surgeon undertaking NSS and the consultant radiolo-\ngist scanning directly on the renal capsule a decade ago [14]. This \nstudy evaluates the impact of expert IOUS (EIOUS) on the accuracy \nof surgical margins at NSS.\n2. Materials and methods\nWith institutional approval, all NSS procedures carried out \nbetween January 2000 and April 2025 were reviewed (retrospec-\ntive cohort 2000—2016, prospective cohort 2016—2025). Patients \nwere treated according the SIOP/CCLG guidelines [5] and their \neligibility for NSS approved by the multi-disciplinary team for \nPaediatric renal tumours at the Hospital's weekly Paediatric Solid \nTumour meeting. Patient demographics, clinical features, imaging \ndata, perioperative characteristics, histological diagnoses and \nmargin status were collected.\n2.1. NSS technique\nAll NSS were performed by surgeons expert in uro-oncology at \nour tertiary/quaternary referral centre using a standardised \napproach. Where tumour characteristics precluded NSS for one \nrenal unit, necessitating a unilateral total radical nephrectomy, \nNSS for the contra-lateral renal unit was offered synchronously, \nunless additional pre-operative chemotherapy was considered \nimportant ahead of NSS. Patients received broad-spectrum anti-\nbiotic on induction of general anaesthesia. The patient was placed \nsupine and a balloon catheter placed per urethra. A transverse \nabdominal incision afforded access to the retroperitoneum. The \nlength of the incision was adjusted to the size of the renal tu-\nmour(s) and its/their extent; malignancies with tumour thrombus \nreaching to the proximal inferior vena cava were managed through \na combined thoraco-abdominal incision.\nThe renal unit for NSS was mobilised. Where feasible, Gerota's \nfascia was maintained over the surface of the lesion(s). Depending \non the size and locations of the tumours, vessel loops were loosely \nplaced around the vascular pedicle in case of haemorrhage.\nHowever, most NSS could be performed without occlusion of the \nvessels at the hilum, with bleeding controlled by direct compres-\nsion of the kidney around the site of the resection by the surgical \nassistant.\nOnce the site and depth of the tumour was determined, \nresection by cutting diathermy was undertaken swiftly to mini-\nmise thermal injury to the resection margin. Feeding interpolar/ \nsegmental vessels were oversewn and bipolar haemostasis applied \nto the edge of the resection bed. Breaches into the pelvicalyceal \nsystem were sought and repaired with dissolvable sutures. Place-\nment of nephro-stents and/or a peri-nephric drain was at the \ndiscretion of the operating surgeon. Absorbable haemostatic \nagents were placed onto/into the tumour bed. Lymph node sam-\npling was performed as per protocol.\n2.2. EIOUS technique\nAs previously described [14], the surgeon and radiologist jointly \nreviewed the imaging ahead of the procedure to formulate the \noperative plan. The radiology team for EIOUS consisted of the \nconsultant radiologist and an assistant to optimise and capture \nimages on the GE Logiq E10® (Boston, MA, USA) machine with a \n24 MHz ‘hockey stick’ probe (GE L6-24-D®). Once the surgeon had \nexposed the kidney, the consultant radiologist scrubbed to join the \nsterile field. The ultrasound probe, covered by a sterile drape, was \nplaced directly onto the renal capsule/Gerota's. To enhance \nacoustic coupling, sterile saline was applied to the renal surface. \nContinuous real-time imaging and communication allowed the \nexact superficial and deep anatomy of the tumour to be clarified. \nProximity to vessels and the pelvicalyceal system was determined. \nUsing monopolar diathermy on the renal capsule, incisions for the \nresection(s) could be proposed by the surgeon and checked by the \nconsultant radiologist, aiming to maximise parenchymal preser-\nvation while ensuring complete excision. For large tumours, EIOUS \nalso guided the deep resection during the excision.\nThe radiologist must be aware of the appearance of diathermy \nburn on ultrasound, which appears as areas of linear echogenicity \nsimilar to the appearance of gas, because the tissues are burned \nthe artefact can be more extensive than a thin linear line. The \nbenefit of a small footplate transducer such as the ‘hockey-stick’ \nprobe is the ability to get the end of the probe into small spaces \nsuch as a dissection plane where appropriate and as guided by the \noperating surgeon. This can be used to assess the current depth of \nthe dissection relative to the tumour. If feasible, sterile saline can \nbe used to fill the dissection space to optimise acoustic coupling \nand improve image quality. Alternatively, the radiologist can use \nthe tumour itself as the acoustic window and the depth of \ndissection can be defined using a metal probe as a marker at the \nlimit of dissection margin. We have not tried smaller probes such \nas endoscopic probes or laparoscopic probes which have a smaller \nfootplate but are capable of much lower frequency imaging \n(typically 3—15 MHz) and therefore cannot achieve the image \nresolution of a conventional diagnostic probe. Complete macro-\nscopic resection can be confirmed by scanning the specimen in a \nsaline bath ex vivo if this does not affect the preparation necessary \nfor transport to histopathology. Once the targeted lesion was \nremoved, the surgical bed and/or specimen were scanned to \nconfirm complete radiological excision. Finally, EIOUS on the \ntumour bed facilitated identification of breaches into the pelvi-\ncalyceal system. Fig. 1 depicts the key steps of the EIOUS technique. \nFor the intricacy of the imaging technique, please refer to Apple-\nyard et al. [14].\nFor the purposes of this study, no distinction was made be-\ntween NSS by enucleation or partial nephrectomy [15]. NSS was for \none or more lesions within the kidney(s), as clinically indicated. A\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163\n2 \n\nlesion was defined as any tissue submitted in a distinct container \nfor histopathological evaluation. Except where the surgeon \nexplicitly recorded a deliberate intra-lesional biopsy for purely \ndiagnostic purposes alone, all tissue resections were considered to \nhave been undertaken with the intent of achieving a negative \nmargin, i.e. to remove the lesion with a rim of normal parenchyma. \nWhere additional parenchyma (e.g. “cut edge” or “tissue from \npreserved kidney”) was sampled, this was recorded as ‘renal \nmargin’ and included in the total volume of resection.\nRenal unit volumes were determined from the preoperative \nMRI scan and specimen volumes from the histopathology mea-\nsurements using the ellipsoid formula d1×d2×d3× 0.523. As not \nall histopathology reports included all three dimensions, missing \nvalues were estimated as follows: if one diameter was missing, it \nwas calculated as the mean of the other two measurements; if only \none diameter was available, it was cubed to approximate volume. \nIf more than one NSS was performed on the same renal unit, the \ntotal specimen's volume was calculated by summing all resected \nspecimens for that unit, including those labelled as ‘biopsy’ or \n‘margin,’ as this also represented removal of renal parenchyma. \nThe total specimen volume was subtracted from the correspond-\ning preoperative MRI renal unit volume to calculate the percentage \nof preserved renal parenchyma for each renal unit.\n2.3. Statistical analysis\nData were collected following the principles outlined in the \nDeclaration of Helsinki. Data are presented as medians (range) or \nfrequencies (proportions). Cases were grouped according to the \nuse of intraoperative ultrasound (EIOUS) performed by the \nconsultant radiologist, resulting in two cohorts: NSS guided by \nEIOUS (US-NSS) and without (non-US-NSS). Variables between the \ntwo groups were compared by the Mann—Whitney and Fisher's \nexact tests. Time of surgery and tumour features are presented \ndescriptively. Due to the multi-focal and bilateral nature of many \npaediatric renal tumours offered NSS, multiple resections could be \nperformed during a single operation. Each NSS was defined as a \ndiscrete tumour resection specimen and was labelled individually \nin the pathology report. Margin status was assessed exclusively for \nmalignant lesions. Specimens diagnosed as nephrogenic rests (NR) \nor described as renal tissue, scarring, or necrotic tissue were \nexcluded from the analysis. All statistical analyses were performed \nusing R version 4.3.2 (R Core Team, 2023) within RStudio version \n2025.05.1 Build 513® (RStudio, PBC, Boston, MA, USA). All tests \nwere two-sided and statistical significance level was considered at \np < 0.05 [16].\n3. Results\nDuring the study period 71 patients (35 males, 36 females) \nwere offered NSS. Patients received neo-adjuvant chemotherapy\nas per the SIOP/CCLG protocols. Pre-operative characteristics of \npatients undergoing nephron-sparing surgery (NSS) are summa-\nrized in Table 1, stratified by the application of EIOUS for NSS: 51 \n(72%) underwent non-US-NSS, while 20 (28%) were performed \nwith EIOUS (US-NSS). The non-US-NSS group represents a histor-\nical cohort, with EIOUS introduced to NSS in 2016. The two groups \nwere comparable in terms of age at surgery (median 28 months vs. \n15.5 months, p= 0.502) and gender distribution, with an equal \nmale-to-female ratio in both groups (50% each, p= 1.0). However, \nin view of the expanded eligibility criteria for NSS over time, the \ndistribution of diagnoses differed significantly (p = 0.005). While \nall patients in the non-US-NSS group had bilateral WT (88% syn-\nchronous, 12% metachronous), the US-NSS group included a \nbroader diagnostic spectrum: 16 (80%) bilateral WT (94% syn-\nchronous, 6% metachronous), one unilateral WT associated with \nBeckwith-Wiedemann syndrome, two renal cell carcinoma (RCC), \nand one equivocal partly cystic, partly solid lesion.\nThe surgical characteristics of NSS for the 71 patients is sum-\nmarised in Table 2. Overall, 103 renal units received NSS: 77 (74.8%) \nnon-US-NSS and 26 (25.2%) US-NSS. As many patients presented \nwith bilateral or multifocal disease, multiple lesions were resected \nduring a single surgery. Each lesion submitted separately to pa-\nthology was considered a distinct NSS. Malignant diag-\nnoses―including Wilms tumour (WT), equivocal WT (when \ndistinction between nephrogenic rests or nephroblastoma was not \npossible with absolute certainty), and renal cell carcinoma \n(RCC)―accounted for 77 (60.2%) resections in the non-US-NSS\nFig. 1. Expert Intraoperative US (EIOUS) steps. Expert Intraoperative US (EIOUS) is used to delineate the lesion (A), check the proposed resection (B) and check completeness of \nexcision following tumour removal (C).\nTable 1\nPatients’ pre-operative characteristics, stratified by use of intraoperative US for \nNSS (n = 71).\nNon-US-guided\nUS-guided\np value a\nNo. of patients [n (%)] \n51 (72%)\n20 (28%)\nAge at first surgery \n(months)\nMedian (range) \n28 (5—128)\n15.5 (5—141)\n0.502\nGender [n (%)]\n1\nMales\n25 (49%)\n10 (50%)\nFemales\n26 (51%)\n10 (50%)\nDiagnosis [n (%)] \n0.005\nBilateral WT \n51 (100%)\n16 (80%)\nSynchronous \n45 (88%)\n15 (94%)\nMetachronous\n6 (12%)\n1 (6%)\nUnilateral WT associated\nwith syndrome \n0\n1 (5%)\nRCC\n0 \n2 (10%)\nPart cystic, part solid\nlesion\n0 \n1 (5%)\nAbbreviations: NSS = Nephron-sparing surgery; WT = Wilms tumour; RCC = \nRenal cell carcinoma.\na P value according to unpaired Mann—Whitney U test for continuous data \nand Fisher's Exact test for categorical variables.\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163 \n3\n\ngroup and 18 (46.2%) in the US-NSS group (p= 0.142). The \nremaining resections included nephrogenic rests (NR), cystic le-\nsions, and non-neoplastic parenchymal changes such as scarring \nor necrosis. No statistically significant differences were observed \nbetween groups in terms of type of resection specimen submitted \nto pathology (p= 0.167) or histological diagnosis (p= 0.142), \ndespite the broader diagnostic heterogeneity in the US-NSS group.\nTable 3 presents the histological characteristics of malignant \nresection specimens. Two biopsies in the non-US-NSS group were \nconfirmed as Wilms tumour (WT) but were excluded from the \nmargin analysis, as they were performed as a purely diagnostic \nincision biopsy without the intent to achieve a negative margin. \nThe remaining 75 resections of malignant lesions in the non-US-\nNSS group and 18 in the US-NSS group were all undertaken with \ncurative intent. Histological positive surgical margins were \nobserved in 27 of the 75 non-US-NSS resections (36%), whereas no \npositive surgical margins were reported in the US-NSS group \n(p< 0.001). The 27 positive surgical margins occurred in 11 pa-\ntients, all of whom received an escalation of chemotherapy, five \nreceived radiotherapy and one patient, with anaplastic histology, \nboth radiotherapy and completion nephrectomy. Additionally, one \npatient (non-US-NSS) showed extension of the tumour (interme-\ndiate-risk) to the renal capsule and was considered local stage 3. In \nthe US-NSS group, one patient with a high-risk blastemal tumour \nshowed extension through the renal capsule, making him local \nstage 3, although the margins to the renal parenchyma were free of \ntumour. While the former received escalated chemotherapy alone,\nthe latter received high-risk chemotherapy as well as flank \nradiotherapy and subsequently a completion nephrectomy for \nacute loss of renal function after radiotherapy. Six patients in the \nnon-USS-NSS died.\nImportantly, no significant difference was observed in the pre-\noperative renal unit volume on pre-operative MRI (p = 0.586), the \nvolume of resected specimen (p = 0.347) or the percentage of \npreserved parenchyma, with a median volume of 84.6% (IQR \n62.7%—97.2%) preserved by non-US-NSS and 91% (IQR \n74.2%—96.7%) by USS-NSS (p = 0.424) (Table 4).\n4. Discussion\nHaving established an intraoperative collaboration between \nthe consultant surgeon undertaking NSS and the consultant radi-\nologist scanning directly on the renal capsule a decade ago, we\nTable 2\nSurgical data of NSS stratified by the use of intraoperative US.\nNon-US-guided\nUS-guided\np value a\nNumber of renal units \noffered NSS [n] \n77 (74.8%)\n26 (25.2%)\nNumber of operations [n] \n61 (73.5%) \n22 (26.5%) \nYear of NSS sur staging system, triggering \ntreatment escalation including prolonged and/or intensified \nchemotherapy, postoperative radiotherapy, and, in some cases, \ncompletion nephrectomy [18]. Although Kieran et al. [6] observed \nmargin status not to correlate with local recurrence, all patients \nwith positive margins were treated with radiotherapy. In our \nstudy, similarly, all patients with positive margins received an \nincreased burden of post-operative therapy. Treatment escalation \nfor positive margins can significantly impact long-term organ \nfunctions including the kidney, whether by chemotherapy, radio-\ntherapy or completion nephrectomy. These effects are particularly \nsignificant in bilateral WT, where preserving renal tissue is critical \nto avoiding long-term complications such as end-stage renal dis-\nease (ESRD), hypertension, and cardiovascular morbidity [19]. A \nreliable method to eliminate positive margins is hence a central \ngoal in NSS, thereby minimising treatment burden and protecting \nlong-term renal function. Centralising NSS to tertiary/quaternary \ncentres has reduced although not eliminated positive margins [10].\nOur surgical approach to reducing the incidence of positive \nmargins is based on two key strategies: (1) EIOUS performed by a \nconsultant radiologist within a multidisciplinary team at a high-\nvolume centre, and (2) tumour resection with a rim of normal \nparenchyma. Although Aldrink et al. [13] used IOUS for most NSS, \nmany were undertaken by the operating surgeon, and micro-\nscopically positive surgical margins occurred in 22.5% in their se-\nries. A consultant radiologist can contribute subspecialist imaging \nexpertise to the operating team. Particularly for tumours arising in \nnephrogenic rests that merge into neighbouring normal paren-\nchyma, imaging delineation is far from straightforward. The \nconsultant radiologist's skill in defining the subtleties of tumour \nboundaries, identifying optimal resection planes, assessing prox-\nimity to vessels and the collecting system, and confirming com-\nplete excision in real time, using a refined ultrasound technique \nspecifically adapted for paediatric urological surgery, surpasses \nthat of the surgeon [14]. Previous reports of IOUS in renal surgery \nhave largely focused on adult cases, where tumours are not typi-\ncally embedded in nephrogenic rests, in contrast to the complex \nlandscape usually encountered in bilateral Wilms tumours. In the \nadult settings, IOUS is typically performed by the surgeon, with \ntechniques that are not standardised, either in vivo to assess \nmargins [20] or ex vivo after tumour removal [21]. In the paediatric \npopulation, Fitski et al. [2] reported IOUS for paediatric cases \nalongside the use of 3D models for preoperative surgical planning; \nhowever, this was also performed by the surgeon. Our model,\ninvolving a dedicated radiologist working in tandem with the uro-\noncology surgeon, is distinct and offers continuous, high-level \nimaging support throughout the procedure.\nA further important factor is how resection margins are \naddressed surgically. The SIOP-RTSG [9] guidelines permit tumour \nresection either with a rim of normal parenchyma or directly along \nthe tumour capsule. However, no studies to date have compared \nnephron-sparing surgery (NSS) performed with versus without a \nparenchymal rim in paediatric renal tumours. Given our finding of \n0% positive margins when NSS was carried out with EIOUS to \nachieve a deliberate narrow rim of normal parenchyma, we \nadvocate this approach to minimise the risk of residual disease and \nburden of post-operative treatment. To ensure this reduction in \nmargin positivity was not at the expense of additional resection of \nhealthy renal tissue, we calculated the volume of parenchyma \npreserved. Importantly, the use of EIOUS did not lead to increased \nremoval of normal tissue, with a median 90% of renal parenchyma \npreserved. Finally, we recorded the number of additional renal \nmargin resections performed intraoperatively (17 in the historical \nnon-US-NSS cohort vs 2 in the US-NSS cohort). Notably, none of \nthese margin specimens contained tumour, and their removal \ntherefore represented unnecessary loss of normal renal tissue. \nSince 2016, the frequency of additional margin resections has \ndecreased notably suggesting that EIOUS can increases intra-\noperative confidence and reduce unnecessary tissue loss.\nHistorically, margin positivity rates in NSS have been around \n30%, consistent with our non-US-NSS cohort. Following the intro-\nduction of radiologist-performed EIOUS, we have achieved a sig-\nnificant reduction in margin positivity rates. The clinical \nimplications of our study are significant. This is the first study to \nevaluate margin outcomes using intraoperative ultrasound in pae-\ndiatric renal tumour resection performed by an expert radiologist \nactively guiding the surgeon during the procedure. We demonstrate \nthat this approach has the potential to eliminate positive resection \nmargins without sacrificing additional normal parenchyma. Our \nstudy has limitations. It is retrospective and non-randomised. In \naddition, long-term renal function data were not collected, hence \nwe cannot confirm whether negative margins directly translate into \nbetter long-term renal and oncological outcomes. Finally, this is a \nsingle-centre experience, and further multi-institutional studies \nwill be required to validate our findings.\n5. Conclusions\nIn summary, our findings support the integration of a consul-\ntant radiologists into the surgical team for expert intraoperative \nultrasound as a critical strategy for improving the accuracy of NSS \nfor paediatric renal tumours.\nRole of Funder/Sponsor\nNone.\nClinical trial registration\nNone.\nThis research did not receive any specific grant from funding \nagencies in the public, commercial or not-for-profit sectors.\nFunding/Support\nNo <style>
  :root{
    --bg:#0C1E2A; --bg-2:#0A1822; --navy:#1A3D52; --navy-2:#102B3A;
    --card:#16303F; --border:#28495C;
    --ink:#F3EDE0; --ink-strong:#FFFFFF; --muted:#9FB4C2;
    --terracotta:#E07A4B; --gold:#E3B858; --sage:#8FBE95; --teal:#2CC7B4;
    --red:#E36A5A; --blue:#7FAFD9;
    --radius:16px; --radius-sm:12px;
    --shadow:0 1px 3px rgba(0,0,0,.35), 0 6px 16px rgba(0,0,0,.30);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:linear-gradient(180deg, var(--bg), var(--bg-2));
    color:var(--ink); font-family:'DM Sans', sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  h1,h2,h3{ font-family:'Fraunces', serif; margin:0; }
  a{ text-decoration:none; color:inherit; }
  .wrap{ max-width:720px; margin:0 auto; padding:0 14px 40px; }

  .topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg, var(--navy), var(--navy-2));
    padding:14px 14px 12px; border-bottom:1px solid var(--border);
  }
  .topbar-inner{ max-width:720px; margin:0 auto; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .back{ font-size:13px; color:var(--muted); font-weight:700; }
  .title{ font-family:'Fraunces', serif; font-size:19px; font-weight:700; color:var(--ink-strong); }
  .meta{ font-size:11.5px; color:var(--muted); width:100%; }
  .btn{
    border:none; border-radius:999px; font-family:'DM Sans', sans-serif;
    font-weight:700; cursor:pointer; padding:7px 13px; font-size:12.5px;
  }
  .btn-export{ background:var(--gold); color:#102B3A; margin-left:auto; }
  .btn-export:active{ transform:scale(.96); }

  .content{ padding-top:16px; }

  details.card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:12px; overflow:hidden;
  }
  details.card[data-status="guardar"]{ border-color:var(--sage); }
  details.card[data-status="excluir"]{ opacity:.45; }
  details.card summary{
    list-style:none; cursor:pointer; padding:14px 15px;
    display:flex; flex-direction:column; gap:3px;
  }
  details.card summary::-webkit-details-marker{ display:none; }
  .smart-title{
    font-family:'Fraunces', serif; font-size:15px; font-weight:600; color:var(--ink-strong);
    display:flex; align-items:center; gap:7px;
  }
  .smart-title .stripe{ width:4px; height:15px; border-radius:3px; background:var(--gold); display:inline-block; flex:0 0 4px; }
  .smart-title .chev{ margin-left:auto; font-size:12px; color:var(--muted); transition:transform .15s; }
  details.card[open] .chev{ transform:rotate(180deg); }
  .orig-title{ font-size:12px; color:var(--muted); padding-left:11px; }
  .read-badge{ font-size:10.5px; color:var(--sage); font-weight:700; padding-left:11px; }

  .body{ padding:0 15px 15px; }
  .head-line{ font-size:12px; color:var(--muted); margin:0 0 10px; line-height:1.5; }
  .head-line b{ color:var(--ink); }

  .body ul{ margin:4px 0 6px; padding-left:18px; }
  .body li{ font-size:13.5px; line-height:1.55; color:var(--ink); margin-bottom:4px; }
  .abstract-box{

  }

  .actions{ display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }

    border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--ink);
    border-radius:999px; font-size:12px; font-weight:700; padding:6px 11px; cursor:pointer;
    font-family:'DM Sans', sans-serif;
  }

  .act[data-action="lido"].on{ background:var(--sage); color:#0C1E2A; border-color:var(--sage); }
  .act[data-action="guardar"].on{ background:var(--teal); color:#0C1E2A; border-color:var(--teal); }
  .act[data-action="excluir"].on{ background:var(--red); color:#0C1E2A; border-color:var(--red); }
