ue not reported since AE type is not a mutually exclusive outcome.\nL. Mayon, Y.-J. Chiang, A. Lee et al. / Journal of Pediatric Surgery 61 (2026) 163138\n4 \n\nNone of the authors have any financial or personal relationships \nwith other people or organizations that could inappropriately in-\nfluence or bias their work.\nAppendix A. Supplementary data\nSupplementary data to this article can be found online at \nhttps://doi.org/10.1016/j.jpedsurg.2026.163138.\nReferences\n[1] American College of Surgeons. Revised statement on recommendations for \nuse of real-time ultrasound guidance for placement of central venous cath-\neters. 2011 Feb 1.\n[2] Araújo C, Silva JP, Antunes P, Fernandes JM, Dias C, Pereira H, et al. A \ncomparative study between two central veins for the", "bullets_summary": "Estudo observacional prospetivo, MD Anderson Cancer Center, 713 pacientes ≤26 anos com cancro, colocação de CVAD entre 2015-2023\nDesafia a recomendação do American College of Surgeons (2011) de usar sempre ecoguiagem (US) para acesso venoso central — aqui, a via subclávia SEM ecoguiagem foi a escolha em 83% dos casos (590/713)\nTaxa de eventos adversos (EA) global: 25,7%; mas pneumotórax e hemorragia pós-operatória foram extremamente baixos na via subclávia sem US (0,3% e 0,7%)\nVia jugular interna (IJ, com US) teve mais trombose de cateter (16,8% vs 8,9%) e mais infeção de corrente sanguínea associada a cateter/CLABSI (8,4% vs 3,5%) do que a subclávia sem US\nObesidade (IMC≥30) e uso de esteroides pré-operatórios foram preditores independentes de EA (p<0,001 e p=0,003) — sugerindo grupos que podem beneficiar de abordagem alternativa\nFatores do sucesso do centro: todos os procedimentos por/sob supervisão direta de cirurgião sénior, com fluoroscopia, num centro de alto volume (~85 CVADs/ano) e protocolo padronizado", "long_summary": "Este estudo de coorte prospetivo observacional, conduzido no MD Anderson Cancer Center (Houston), questiona diretamente uma recomendação de referência: desde 2011, o American College of Surgeons (ACS) recomenda o uso sistemático de ecoguiagem (ultrassom, US) para colocação de todos os dispositivos de acesso venoso central (CVADs), com base em ensaios em adultos que mostraram menos eventos adversos e maior sucesso à primeira tentativa. Na prática pediátrica oncológica, contudo, a via jugular interna (IJ) — mais associada ao uso de US — pode ser subótima em crianças, com maior propensão a dobras do cateter e dificuldade em manter penso oclusivo estéril.\n\nO grupo de Houston usa rotineiramente a via subclávia SEM ecoguiagem como primeira escolha em crianças e adultos jovens (AYA, até 26 anos) com cancro, e este estudo avalia prospectivamente a segurança dessa prática num centro de alto volume, entre janeiro de 2015 e setembro de 2023. Foram incluídos 713 doentes, com um protocolo perioperatório estandardizado (hemoglobina ≥8g/dL, plaquetas ≥50 mil, ausência de febre/bacteriémia, todos os procedimentos sob supervisão direta de cirurgião sénior, com fluoroscopia e Rx de tórax pós-operatório imediato). A escolha entre subclávia e IJ ficou ao critério do cirurgião, mas 590 dos 713 acessos (83%) foram subclávios sem US, e 97 (13,6%) foram IJ com US.\n\nA taxa global de eventos adversos (EA) em 180 dias foi de 25,7% — números aparentemente elevados, mas concentrados em complicações \"menores\" e recuperáveis: trombose de cateter (7,9%), migração (6,5%) e mau funcionamento mecânico (6,9%). Os EA verdadeiramente graves, pneumotórax e hemorragia pós-operatória com necessidade de intervenção, foram extraordinariamente raros na via subclávia sem US: 0,3% e 0,7%, respetivamente — desafiando diretamente a lógica por trás da recomendação de 2011 de que a ecoguiagem seria necessária para evitar exatamente estas complicações.\n\nComparando as duas vias, a subclávia sem US teve, na verdade, MENOS complicações tardias do que a IJ com US: CLABSI 3,5% vs 8,4%, e trombose de cateter 8,9% vs 16,8%. Não foram identificados fatores relacionados com o doente que explicassem viés na escolha do local de acesso (i.e., a diferença não parece dever-se a que casos \"mais difíceis\" fossem sistematicamente encaminhados para IJ). Os autores especulam que a dificuldade em manter um penso oclusivo estéril em cateteres IJ não tunelizados, e o ângulo agudo de inserção nesta via, possam explicar parte da diferença.\n\nUm achado clinicamente relevante e talvez mais acionável do que a comparação de vias: obesidade (IMC≥30) e uso pré-operatório de esteroides foram preditores independentes e estatisticamente robustos de eventos adversos (odds ratio 4,55 e 2,32, respetivamente, para qualquer EA) — sugerindo que estes dois subgrupos de doentes podem beneficiar de técnicas alternativas de fixação (os autores citam uma técnica de ancoragem dérmica desenvolvida em São Francisco especificamente para doentes obesos) ou de vigilância mais próxima, independentemente da via de acesso escolhida.\n\nOs autores concluem que o sucesso do seu centro assenta em três pilares replicáveis: colocação sempre por ou sob supervisão direta de cirurgião sénior com fluoroscopia; volume elevado (cerca de 85 CVADs/ano); e um protocolo perioperatório estruturado e baseado em dados (incluído como material suplementar no artigo original). As limitações reconhecidas incluem o desenho retrospetivo/observacional de parte dos dados mais antigos (antes da estandardização da nota operatória em 2020) e o facto de o IMC bruto, em vez de percentis por idade, não ser o ideal para avaliar obesidade em doentes pediátricos — uma limitação que os próprios autores assumem.", "full_text_formatted": "Clinical Research Paper\nSubclavian approach without ultrasound guidance is safe and \neffective for pediatric central venous access\nLauren Mayon a, d, * , Yi-Ju Chiang b , Alexander Lee c , Kumail Mahesri c , Kuojen Tsao a, d ,\nAllison L. Speer a, d , Kevin P. Lally a, d , Mary T. Austin a, d\na Department of Pediatric Surgical Oncology, UT MD Anderson Cancer Center, Houston, TX, USA \nb Department of Surgical Oncology, UT MD Anderson Cancer Center, Houston, TX, USA\nc UTHealth McGovern Medical School, Houston, TX, USA\nd Department of Pediatric Surgery, McGovern Medical School at UTHealth, Houston, TX, USA\na r t i c l e i n f o\nArticle history:\nReceived 19 November 2025 \nReceived in revised form\n6 February 2026\nAccepted 8 April 2026\n\nKeywords:\nSubclavian\nUltrasound\nPediatric\nCentral\nVenous\nAccess\na b s t r a c t\nBackground: The American College of Surgeons (ACS) recommends US guided internal jugular (IJ) \napproach for central venous access devices (CVADs); however, this is suboptimal in children. We use the \nsubclavian without US guidance for access in children and adolescents and young adults (AYAs) at a \nhigh-volume oncology center.\nStudy design: We undertook a prospective observational study of patients ≤ 26 years undergoing CVAD \nplacement between 1/1/15—9/30/23. US guidance was used in IJ but not in subclavian CVADs, and all \nprocedures were performed by or under direct attending supervision following a standardized protocol. \nAdverse events (AEs) within 180 days were collected. Multivariate logistic regression model was applied \nto determine risk factors for predicting AEs.\nResults: Seven hundred and thirteen patients were included. Overall AE rate was 25.7%. Ninety-nine \npatients had early AEs, and 84 had late AEs. Most common AEs included thrombosis (7.9%), migration \n(6.5%) and mechanical malfunction (6.9%). Central line-associated blood stream infection (CLABSI) rate \nwas 4.1%. Most (83%, n = 590) CVADs were subclavian without US guidance, and pneumothorax and \nbleeding rates were extremely low (0.3% and 0.7%). IJ CVADs had increased CLABSI and thrombosis rates \ncompared to subclavian (8.4% vs 3.5% and 16.8% vs 8.9%, p< 0.05). BMI ≥ 30 and steroid use were \nassociated with all AEs (p< 0.001 and p= 0.003).\nConclusion: Our results suggest utilizing the subclavian without US guidance is safe and effective for \nchildren and AYAs with cancer. This challenges the 2011 ACS recommendation for the use of US guid-\nance in all CVAD placements.\n© 2026 Elsevier Inc. All rights are reserved, including those for text and data mining, AI training, and \nsimilar technologies.\nh i g h l i g h t s\n• Central venous access devices (CVADs) utilize the internal jugular (IJ) or subclavian vein.\n• Ultrasound (US) guided IJ approach is common but may be suboptimal in children.\n• In this cohort study including 713 pediatric and adolescent/young adult (AYA) cancer patients undergoing CVAD placement following a stan-\ndardized protocol for subclavian access without US, postoperative pneumothorax and bleeding rates were exceedingly low (0.3% and 0.7%).\n• Obesity and steroid use increase adverse events (AEs) (p < 0.001 and p = 0.003) following CVAD placement.\n1. Introduction\nCentral venous access devices (CVADs) are integral in the \ntreatment of pediatric oncology patients. The most common\naccess veins are the internal jugular (IJ) and subclavian via either \nlandmark or ultrasound (US) guidance. In 2011 the American \nCollege of Surgeons (ACS) issued a statement recommending the \nuse of US guidance in all CVAD placement [1]. This recommen-\ndation was based on prospective randomized trials and meta-an-\nalyses showing decreased rate of adverse events (AEs) and \nimproved procedural first-pass success. The ACS cites the Agency \nfor Healthcare Research and Quality's (AHRQ) identification of US\n* Corresponding author. 6431 Fannin St, MSB 5.258, Houston, TX 77030, USA.\nE-mail address: Lauren.K.Mayon@uth.tmc.edu (L. Mayon).\nContents lists available at ScienceDirect\nJournal of Pediatric Surgery\njournal homepage: www.sciencedirect.com/journal/ \njournal-of-pediatric-surgery\nhttps://doi.org/10.1016/j.jpedsurg.2026.163138\n0022-3468/© 2026 Elsevier Inc. All rights are reserved, including those for text and data mining, AI training, and similar technologies.\nJournal of Pediatric Surgery 61 (2026) 163138\n\nguidance for CVAD placement as one of the top evidence-based \npractices for improving patient care and safety in 2001. Most \ncenters prefer the IJ approach due to previous work suggesting a \ndecrease in rates of pneumothorax and arterial puncture with \npostoperative bleeding [2,3]. However, most of these studies were \nin adults, lack of clarity about the operator performing the pro-\ncedure, and were not done at a high-volume cancer center. In \npediatric patients, the IJ approach may be suboptimal, especially \nfor external short-term catheter placement, given the higher \nincidence of kinking and difficulty maintaining an occlusive sterile \ndressing. Our group has routinely used the subclavian vein without \nUS guidance as our site of choice for access in children and ado-\nlescents and young adults (AYAs) with cancer. However, there are \nlittle to no studies published showing a similar standardized \napproach and high case volumes. Therefore, the purpose of the \ncurrent study was to assess the safety of the subclavian vein \napproach without US guidance for CVAD placement in children \nand AYAs at a high-volume cancer center.\n2. Methods\nAfter IRB approval (protocols 2019-1007 and DR08-0053), a \nprospective observational study of all patients age ≤ 26 years old \nundergoing CVAD placement between January 1, 2015—September \n30, 2023 was performed. Patients were excluded if they had non-\ncancerous diagnoses, underwent placement of peripherally \ninserted central catheters (PICCs) or over-wire CVAD exchanges.\nA standardized perioperative CVAD protocol was developed \nbased on evidence-based guidelines and implemented for every \ncase beginning January 2015. This protocol was reviewed by all \npediatric surgeons and multiple institutional multidisciplinary \ncommittees (Pediatric Division of Surgery Continuous Quality \nImprovement Committee, Pediatric Clinical Practice Committee, \nand Children's Cancer Hospital Executive Leadership Committee). \nAll patients were assessed preoperatively and had confirmed he-\nmoglobin levels of ≥ 8 g/dL and platelet count of ≥ 50K/μL. Labs for \nleukemia patients, stem cell transplant patients, and any patient at \nrisk for pancytopenia were obtained 24 h prior to surgery. Labs for \nall other patents were obtained at least 14 days prior to surgery. \nNeutropenia, defined as an absolute neutrophil count (ANC) of \n<500K/μL, was not a contraindication to CVAD placement. How-\never, fever (>38.5 ◦ C) and/or bacteremia were contraindications to \nCVAD placement. CVADs were not placed in febrile patients until \nthey remained afebrile with negative blood cultures for at least \n48 h. The subclavian was chosen as the primary access vein choice \nwith IJ as the second choice, ultimately per attending surgeon \ndiscretion. Factors affecting this decision included location of \ncurrent and prior CVADs, known thrombosis, and cancer related \nnecessity (i.e. tumor or treatment location). US guidance was used \nduring the placement of IJ but not subclavian CVADs, and all \nprocedures were performed in the operating room (OR) by or \nunder direct attending surgeon supervision following a stan-\ndardized protocol. In November 2022, the use of preoperative \nprophylactic antibiotics was stopped, and CVAD flush was \nswitched from heparinized saline to normal saline. These changes \nwere based on data showing no decrease in early CLABSI rates and \nnon-inferiority of saline compared to heparin flush [4,5]. All sub-\nclavian and IJ CVADs were inserted under fluoroscopic guidance, \nand postoperative chest X-rays were obtained in the OR to verify \nappropriate catheter tip placement and rule out pneumothorax/ \nhemothorax prior to the patient awaking from anesthesia.\nPatient demographics, diagnosis, body-mass index (BMI), \nperioperative steroid use, perioperative hemoglobin, platelet, and \nabsolute neutrophil count (ANC) values, CVAD type, access vein, \nuse of US, number of access attempts, and AEs occurring within\n180 days of CVAD placement were collected. AEs included local \nport infection, central line associated blood stream infection \n(CLABSI), wound dehiscence, postoperative bleeding, catheter \nthrombosis, catheter migration, pneumothorax, and other me-\nchanical catheter malfunction. Local port infection was defined as \nan infection occurring at the port or tunnel site of a CVAD and is \ncharacterized by erythema, induration, pain, purulent drainage \nfrom the port pocket, or skin necrosis. CLABSI was defined as a \nblood culture positive for a pathogen in a patient who had a central \nline at the time of infection or within 48 h before the development \nof the infection. Wound dehiscence was defined as skin dehiscence \nof the surgical incision or port hub site. Postoperative bleeding was \ndefined as bleeding requiring excessive local hemostatic efforts \n(frequent pressure dressing changes, topical hemostatic agents, \netc.) or need for transfusion. Catheter thrombosis was defined by \nthe need for alteplase to clear the clot from the lumen of the CVAD. \nCatheter migration was defined as movement of the catheter tip \nout of an acceptable position (superior vena cava, cavoatrial \njunction, or right atrium) requiring revision. Other mechanical \ncatheter malfunction examples include catheter fracture, precipi-\ntate within catheter lumen, and chronically difficult/traumatic \nport access. Early AEs were defined as occurring within 30 days of \nplacement and late AEs between 31 and 180 days.\nA multivariable logistic regression model was applied to \ndetermine risk factors (i.e., age, sex, BMI, steroids, diagnosis) for \npredicting the AEs. Statistical analysis was performed using the \nSAS Enterprise Guide 7.15 (SAS Inc., Cary, NC). All tests were 2-\nsided. Statistical significance was defined as p < 0.05.\n3. Results\nSeven hundred and thirteen patients were included (Table 1). \nThe overall AE rate was 25.7%. Ninety-nine patients had early AEs \nand 84 had late AEs. The most common AEs included catheter \nthrombosis (7.9%), catheter migration (6.5%) and other mechanical \ncatheter malfunction (6.9%). The CLABSI rate was 4.1%. Most (83%, \nn = 590) CVADs were inserted into the subclavian vein without US \nguidance (Table 2), and the pneumothorax and postoperative \nbleeding rates were extremely low (0.3% and 0.7%, respectively). IJ \nCVADs had a higher incidence of CLABSI (8.4% vs 3.5%), catheter \nthrombosis (16.8% vs 8.9%), catheter migration (8.2% vs 6.4%), and \nother catheter malfunction (8.2% vs 5.3%) compared to that in\nTable 1\nDemographics (N = 713).\nGender\nN\nPercentage\nFemale\n314\n44.0%\nMale\n399\n56.0%\nAge\n<6 years\n208\n29.2%\n6—12 years\n179\n25.1%\n>12 years\n326\n45.7%\nRace\nWhite\n264\n37.0%\nBlack\n82\n11.5%\nHispanic\n255\n35.8%\nOther\n91\n12.8%\nUnknown\n21\n2.9%\nBMI\n<30\n651\n91.3%\n>30\n62\n8.7%\nDiagnosis \nHematologic disorder \n22\n3.1%\nLeukemia \n198\n27.8%\nLymphoma\n38\n5.3%\nSolid tumor\n455\n63.8%\nL. Mayon, Y.-J. Chiang, A. Lee et al. / Journal of Pediatric Surgery 61 (2026) 163138\n2 \n\nsubclavian CVADs (Table 4). No patient-related factors were \nidentified for site selection bias. BMI of ≥ 30 and preoperative \nsteroid use were independently associated with any AEs, early AEs, \nand late AEs (BMI all p < 0.001, steroids all p = 0.003) (Table 3). \nNumber of prior lines >1 had a higher incidence of AEs (p < 0.001). \nANC of <500 was not associated with increased AE rate (p = 0.428). \nNo significant change in CLABSI or catheter thrombosis AE rates \nwere seen after stopping the use of prophylactic antibiotics and \nchanging CVAD flush from heparinized saline to normal saline \n(p = 0.565 and p = 0.096, respectively).\n4. Discussion\nOur study shows that utilizing the subclavian vein without US \nguidance by or in the presence of surgical attending is safe and \neffective for CVAD placement in children and AYAs with cancer. \nWhile our AE rate is higher with morbid obesity and preoperative \nsteroid use, the rates of pneumothorax and postoperative bleeding \nare exceedingly low.\nGiven the 2011 ACS guidelines recommending the use of US \nguidance in all CVAD placement, most centers default to US guided \nIJ approach. US guidance is touted as identifying anatomic abnor-\nmalities or thromboses that are unidentifiable by using landmark \nguidance. For the IJ, US use has been shown to decrease rates of \narterial puncture, hematoma formation, number of attempts, and \ncase duration as compared to landmark guidance [6]. Some centers \nhave also incorporated US for subclavian approach, although \nvisualizing the vessel course under the clavicle is more technically \nchallenging and thus requires more training to achieve comfort\nwith this approach. While decreased rates of arterial puncture and \nhematoma formation have been reported, no difference was seen in \noverall complication rate, number of attempts, or case duration as \ncompared to landmark guidance [7]. In contrast, our data shows \nthat subclavian access without US guidance has exceptionally low \nrates of early AEs, including pneumothorax and arterial puncture \nwith subsequent postoperative bleeding.\nRegardless of US guidance, several institutions prefer to access \nthe IJ to the subclavian vein. One study compared IJ to subclavian \naccess in adult oncology patients and found subclavian approach \nhad higher rates of immediate and long-term complications [2]. \nHowever, a study from St. Jude Children's Research Hospital \ndirectly compared outcomes of subclavian vs IJ access in pediatric \noncology patients and showed no significant difference in overall \ncomplication rates but higher rates of catheter migration with IJ \naccess [8]. Similarly, a study of pediatric burn patients at Shriners \nHospital showed no significant difference in infectious or acute \nmechanical complication rates comparing subclavian vs IJ access \nsites [9]. When comparing our subclavian to IJ data, we saw lower \nrates of late AEs including CLABSI and catheter thrombosis in \nsubclavian access. No patient related factors were identified for \nsite selection bias using multivariate logistic regression model. \nThis could be related to difficulty maintain a sterile dressing in \nnon-tunneled IJ CVADs and the acute catheter angle necessitated \nby accessing the IJ. Taken together, these data support subclavian \naccess without US guidance as safe and effective in pediatric \noncology patients.\nWhile we found AEs are common following CVAD placement, \nour center had more favorable outcomes compared to others \n[10—12]. One long term follow-up study of pediatric cystic fibrosis \npatients showed comparatively higher CVAD AE rates including \ncatheter thrombosis (21% vs 7.9%), local infection (9.3% vs 1.4%), \nand CLABSI (7.3% vs 4.1%) [10]. The authors combined both IJ and \nsubclavian approaches but did not compare outcomes between \nthe two sites. Another study of pediatric cancer patients who \nunderwent subclavian CVAD insertion showed comparatively \nincreased AE rates including overall (30.6% vs 25.9%), catheter \nthrombosis (23.1% vs 7.9%), CLABSI (30.8% vs 4.1%), and wound \ndehiscence (19.2% vs 1.1%) [11]. A third pediatric oncology study of \nsubclavian CVAD insertion showed mixed outcomes compared to \nour center's study including catheter thrombosis (2.9% vs 7.9%), \nlocal infection (2.9% vs 1.4%), CLABSI (18.9% vs 4.1%), and catheter \nmigration (1.1% vs 6.5%) [12].\nOur study showed significantly higher AE rates in obese chil-\ndren and AYAs compared to their healthy weight peers, specifically \nhigher rates of catheter migration, catheter thrombosis, and other \nmechanical catheter malfunction related to the deep location in \nthe chest wall. However, a study of adult cancer patients from \nMemorial Sloan Kettering Cancer Center showed no significant \nincrease in AE rate for obese patients >100 kg [13]. This suggests \nthat perhaps the anatomy of obese pediatric patients hinders \nsuccessful CVAD placement and long-term maintenance. Sup-\nporting this interpretation, a study of pediatric leukemia patients \nat UT Southwestern showed that obesity was a significant pre-\ndictor of early CVAD removal due to complications [14]. To combat \nthis increased risk of premature CVAD removal, the team at Uni-\nversity of California in San Francisco developed an approach for \nCVAD placement in obese pediatric oncology patients [15]: the \nport is anchored to the dermis in a fashion that creates skin \ndimpling, which both raises the port anteriorly in the chest and \ncreates a visual guide for access. While this study was limited to \nonly three patients, it supports the need for alternative techniques \nto achieve successful CVAD placement in obese pediatric patients.\nSteroids have been shown to have negative impacts on post-\noperative recovery by disrupting the inflammatory and local\nTable 2\nCase variables (N = 713).\nSteroids\nN\nPercentage\nNo\n633\n88.8%\nYes\n80\n11.2%\nPuncture attempts \n1\n243\n34.0%\n>1\n210\n29.5%\nUnknown a\n260\n36.5%\nCVAD type \nNon-tunneled CVC \n167\n23.4%\nTunneled CVC \n22\n3.1%\nTunneled port \n524\n73.5%\nAccess vein \nSubclavian\n590\n82.7%\nIJ\n97\n13.6%\nFemoral\n24\n3.4%\nOther\n2\n0.3%\nUS use\nNo\n571\n80.1%\nYes\n142\n19.9%\na Unknown puncture attempts were prior to use of a standardized operative note \ntemplate beginning in November 2020.\nTable 3\nBMI and steroid AEs.\nN = 713\nAny AEs\nEarly AEs\nLate AEs\nBMI≥30 \nOr\n4.55\n5.02\n3.95\n95% CI \n2.43—8.50\n2.37—10.64\n1.72—9.08\np-value \n<0.001\n<0.001\n0.001\nSteroids \nOr\n2.32\n2.46\n2.18\n95% CI \n1.34—4.02\n1.22—4.97\n1.05—4.50\np-value\n0.003\n0.012\n0.036\nL. Mayon, Y.-J. Chiang, A. Lee et al. / Journal of Pediatric Surgery 61 (2026) 163138 \n3\n\nimmune responses critical for wound healing. Specifically, steroids \ninhibit cytokine release, chemotaxis, collagen production, angio-\ngenesis, and re-epithelialization, translating to decreased wound \ntensile strength and higher risk of wound dehiscence and infection \n[16]. A study of pediatric CVAD insertion in cancer and other \nchronic disease states showed excess BMI and preoperative steroid \nuse were both associated with higher complication rates; children \nwith excess BMI had higher infectious complication rates while \nchildren on steroids had higher non-infectious complication rates \nsuch as wound dehiscence, extravasation, catheter thrombosis, \nand mechanical issues [17]. To combat the higher rates of wound \ndehiscence noted in patients on steroids, our group utilizes simple \ninterrupted nylon sutures for skin closure and removes these 3—4 \nweeks postoperatively, which has resulted in far fewer dehisced \nwounds (unpublished).\nThere are several factors contributing to our group's outcomes. \nFirst, every CVAD is inserted by or under direct attending surgeon \nsupervision with fluoroscopic guidance in the operating room. \nSecond, this standardized approach is done in a high-volume pe-\ndiatric cancer center averaging 85 CVAD insertions annually. Third, \nour group has developed a data-based protocol including preop-\nerative, intraoperative, and postoperative guidelines to promote \noptimal outcomes. This protocol is submitted as supplemental \nmaterial.\nOne limitation of this study is the lack of streamlined data prior \nto implementing a standardized operative note. Some variables \nwere not routinely reported on each operative note. Some of the \nolder data is located in a prior electronic health record (EHR) \nsystem, which is challenging to access. Lastly, while BMI is \nappropriate to apply to patients >18 years old, it is not optimal for \nthe study of children <18 years old. Instead, BMI percentiles are\nmore appropriate for this younger group as they control for age \nand gender. Since our population includes both children <18 years \nold and AYAs 18—26 years old, we chose to report in standard BMI.\n5. Conclusions\nOur results suggest the subclavian vein is a safe and effective \naccess site for children and AYAs with cancer. These findings \nchallenge the 2011 ACS recommendation for the use of US guid-\nance in all CVAD placement. While AEs are common, the pneu-\nmothorax and postoperative bleeding rates are exceedingly low \neven for subclavian vein access without US guidance. Morbid \nobesity and preoperative steroid use are independent predictors of \nAEs following CVAD placement prompting consideration of alter-\nnative access options for these patients.\nThis research did not receive any specific grant from funding \nagencies in the public, commercial, or not-for-profit sectors.\n\nConflict of interest\n• The work described has not been published previously except \nin the form of a preprint, an abstract, a published lecture, ac-\nademic thesis or registered report\n• The article is not under consideration for publication elsewhere\n• The article's publication is approved by all authors and tacitly \nor explicitly by the responsible authorities where the work was \ncarried out\n• If accepted, the article will not be published elsewhere in the \nsame form, in English or in any other language, including \nelectronically, without the written consent of the copyright-\nholder\nTable 4\nDemographics, case variables, and AEs per access vein.\nSubclavian (N = 590)\nIJ (N = 97)\np\nVariable\nN\n%\nVariable\nN\n%\nGender\nFemale\n254\n43.1%\nFemale\n49\n50.5%\n0.170\nMale\n336\n56.9%\nMale\n48\n49.5%\nAge\n<6 years\n162\n27.5%\n<6 years\n27\n27.8%\n0.601\n6—12 years\n155\n26.2%\n6—12 years\n21\n21.7%\n>12 years\n273\n46.3%\n>12 years\n49\n50.5%\nRace\nWhite\n223\n37.8%\nWhite\n34\n35.0%\n0.539\nBlack\n64\n10.8%\nBlack\n11\n11.3%\nHispanic\n204\n34.6%\nHispanic\n41\n42.3%\nOther\n80\n13.6%\nOther\n9\n9.3%\nUnknown\n19\n3.2%\nUnknown\n2\n2.1%\nBMI\n<30\n541\n91.7%\n<30\n84\n86.6%\n0.105\
