  o token {"generated_at": "2026-07-24T14:56:26", "batch_date": "2026-07-24", "label_origem": "Paediatric Surgery/Artigos-ParaLer", "articles": [{"message_id": "1866640395311126657", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19e7a38cb5ea1881", "sender_name": "Rafael Correia", "sender_email": "rafaielcc@gmail.com", "sender_is_owner": true, "date": "2026-05-30T19:50:02", "subject": "Fwd: da série... Sperandio tinha razão.", "original_title": "A 30-year Odyssey reveals the cause of 'idiopathic' chronic constipation", "smart_title": "Relato clínico de 30 anos — obstipação crónica 'idiopática' · Royal Children's Hospital, Melbourne, 2026", "email_summary": "Rafa reencaminhou este artigo sem comentário próprio, mas o assunto (\"da série... Sperandio tinha razão\") sugere que confirma algo já discutido no grupo Uroped sobre a origem da obstipação crónica infantil estar ligada a intolerância alimentar, não a um transtorno comportamental.", "abstract_text": "This article describes a 30-year jorney to understand the cause of what was known as idiopathic con-\nstipation, which I eventually found to be irritable bowel syndrome (IBS) with secondary holding on, \nlearnt by the affected infant at such a young age that by the time they were a year old their only \nsymptom was intractable constipation. Patients recovered after having breath tests to identify the sugar \nthat was indigestable and then being treated by exclusion of the offending sugar from their diet.", "bullets_summary": "Relato autobiográfico de 30 anos de prática de um cirurgião pediátrico (John Hutson, Melbourne) tentando entender a causa da obstipação crónica \"idiopática\" em crianças\nConclusão final: é síndrome do intestino irritável (SII) com \"holding-on\" (retenção voluntária) secundária, aprendida na infância por dor à evacuação\nAchado central: quase todos os pacientes tinham intolerância a frutose e/ou lactose (confirmada por teste respiratório), consistente com má absorção de açúcares FODMAP\nExclusão dietética do açúcar identificado resolveu a obstipação na maioria: crianças <5 anos em <3 meses; 5-10 anos até 6 meses; adolescentes 6-9 meses\nPercurso histórico em \"8 avanços\": biópsia colónica (défice de Substância P) → cintilografia de trânsito (NTS) → distinção entre trânsito lento (STC) e trânsito rápido (RTC) → estimulação eléctrica transcutânea (TES-IFC) → ligação final com SII/FODMAP\nAo aposentar-se em 2021, fechou a clínica de obstipação porque todos os pacientes tinham recuperado e tido alta", "long_summary": "Este artigo é um relato pessoal e retrospetivo — não um estudo controlado clássico — de John Hutson, cirurgião pediátrico do Royal Children's Hospital de Melbourne, descrevendo os 30 anos que levou a descobrir a causa da obstipação crónica \"idiopática\" em crianças. O texto tem um tom narrativo, quase confessional, e é estruturado como uma sequência de \"avanços\" ou \"portas que se abriram\" ao longo da carreira do autor.\n\nO ponto de partida é a rejeição da explicação tradicional (anos 1990) de que a obstipação seria causada por comportamento de \"segurar\" as fezes por má educação no desfralde. Hutson começou a investigar causas orgânicas: primeiro através de biópsias colónicas laparoscópicas, encontrando um défice de Substância P (um neurotransmissor excitatório) no cólon transverso de crianças com obstipação grave — achado que a princípio pareceu confirmar uma doença orgânica (\"Displasia Intestinal Neuronal\"), mas que se revelou ser secundário à dilatação colónica, não uma causa primária.\n\nO segundo avanço foi o desenvolvimento, com o serviço de Medicina Nuclear do hospital, de um teste de trânsito colónico por cintilografia (Nuclear Transit Study, NTS), que permitiu medir objetivamente o tempo de trânsito através do intestino delgado e cólon. Isto levou à identificação de dois padrões distintos: obstipação de trânsito lento (STC) — tratável com estimulação eléctrica transcutânea interferencial (TES-IFC), que Hutson e a sua equipa desenvolveram e testaram em ensaios controlados — e, mais surpreendentemente, um subgrupo de cerca de um terço dos pacientes com trânsito proximal rápido (RTC), inicialmente ignorado porque a equipa procurava apenas \"lentidão\".\n\nA peça final do puzzle veio da analogia com a síndrome do intestino irritável (SII) do adulto: Hutson percebeu que o trânsito rápido no cólon proximal, combinado com fezes ácidas e dolorosas na infância, levaria a uma resposta aprendida de \"segurar\" para evitar a dor — comportamento que, uma vez estabelecido, se tornaria a única manifestação visível, mascarando a diarreia subjacente. Ao testar sistematicamente estes pacientes para intolerância a frutose e lactose (testes respiratórios, já usados em gastroenterologia de adultos com SII e má absorção de açúcares FODMAP), encontrou intolerância a um ou mais açúcares em praticamente todos os casos.\n\nO tratamento — exclusão dietética do açúcar identificado — levou a recuperação completa e previsível: menos de 3 meses em crianças com menos de 5 anos, até 6 meses entre os 5 e 10 anos, e 6 a 9 meses em adolescentes. Ao aposentar-se no final de 2021, Hutson fechou a sua clínica dedicada de obstipação porque todos os pacientes ativos já tinham recebido alta, curados.\n\nO autor termina com uma reflexão sobre uma palestra de 1980 do Dr. C. Everett Koop (então Cirurgião-Geral dos EUA), que identificava a obstipação crónica idiopática como o principal problema sem solução da cirurgia pediátrica americana da época — e nota, com alguma ironia, que a resposta afinal estava numa área (gastroenterologia/SII) que os seus próprios colegas gastroenterologistas, ocupados com doença celíaca e doença inflamatória intestinal, não haviam explorado nestes pacientes.", "full_text_formatted": "Clinical Research Paper\nA 30-year Odyssey reveals the cause of ‘idiopathic’ \nchronic constipation\nJohn M. Hutson a, b, *\na Royal Children's Hospital, Melbourne & Department of Paediatrics, University of Melbourne (ret), Australia \nb Murdoch Children's Research Institute, Melbourne, Australia\na r t i c l e i n f o\nArticle history:\nReceived 5 May 2025 \nReceived in revised form\n1 December 2025 \nAccepted 3 December 2025\n\nKeywords:\nConstipation\nIrritable bowel syndrome \nIBS\na b s t r a c t\nThis article describes a 30-year jorney to understand the cause of what was known as idiopathic con-\nstipation, which I eventually found to be irritable bowel syndrome (IBS) with secondary holding on, \nlearnt by the affected infant at such a young age that by the time they were a year old their only \nsymptom was intractable constipation. Patients recovered after having breath tests to identify the sugar \nthat was indigestable and then being treated by exclusion of the offending sugar from their diet.\n© 2025 Elsevier Inc. All rights are reserved, including those for text and data mining, AI training, and \nsimilar technologies.\nChildren with intractable, chronic constipation comprised a \nsignificant proportion of my 38 years of clinical practice, as they \nhad had difficulty getting a gastroenterology clinic appointment, \nso instead they just drifted into my surgical clinic. Around the \ntime I was promoted to professor in the early 1990's, I estab-\nlished a special ‘constipation’ clinic for them, as they were all \ncomplex and needed extra time to unravel the problem, and this \nreport describes 3 decades of learning about constipation, \nmostly by trial and error! My junior colleagues were anxious as I \nneared retirement because no-one wanted to ‘inherit’ the con-\nstipation clinic, and the expected lifetime of drudgery and stress, \nfor both patients and doctor, as constipation was assumed to be \nintractable. However, to their amazement, the clinic was closed \njust before I retired as all the patients had recovered! How was \nthis possible? The patients had all failed standard, aggressive \nmedical treatment by paediatricians and/or family doctors \nbefore referral (1). The answer to this question was the result of \nmy deep dive into the possible aetiology of the problem, starting \nwith a simplistic assumption that chronic constipation might \nnot be a behaviour disorder in the infant, or caused by bad \nparenting during toilet training, but it might be a disorder of the \nbowel.\nThe standard paediatric textbooks in the 1990's described \nchronic constipation as caused by ‘holding-on’ by the infant during\nattempted defecation. This implied an aberrant response to the call \nto stool, and it suggested a behaviour disorder [1,2], but I thought \nthe infants were getting the blame unfairly. It is a sad reality in \nmedicine that when the clinical problem is ‘idiopathic’ the patient \n(and in this case, even a baby!) often gets the blame rather than \nbeing seen as the victim. What if the holding-on was a normal, \nlearned response of the infant to painful defecation? It took me 30 \nyears to find the answer, showing that biology does not follow \nlogical rules, but is the accidental result of complex evolutionary \nprocesses. The eventual discovery of these rules is a tale of trial, \nerror and accidental enlightenment. Prospectively the problem \nseemed insoluble, but in retrospect it was, unexpectedly, very \nsimple!\nInitially my aim was to exclude organic causes and develop a \nmanagement plan. Patients with chronic constipation referred to a \npaediatric surgeon were assumed to be non-responsive to medical \ntreatments and so surgical solutions to the problem were sought, \nas high-fibre diet, behaviour modification, pelvic floor physio-\ntherapy and various laxative regimes had already been found to be \ninsufficient. Initially I resorted to standard surgical measures, such \nas partial colectomy or diverting stoma, with varying success. \nUsing the standard adult general surgery rule of thumb, however, \nof ‘when in doubt, cut it out,’ turned out to be not the answer for \nchildren!\nMany patients referred to my surgical clinic had not had a \ncomprehensive work-up to exclude the known but rare organic \ndisorders, so that is where I began, with a detailed history and \nexamination looking for rare anatomical conditions and Hirsch-\nsprung disease [3] [Table 1]. This usually required some careful \ncounselling for both the patient and parents to obtain permission \nfor a rectal examination. This enabled me to confirm a normal anal\n* Royal Children's Hospital, Melbourne & Department of Paediatrics, University \nof Melbourne (ret), Australia.\nE-mail address: John.hutson@rch.org.au.\nContents lists available at ScienceDirect\nJournal of Pediatric Surgery\njournal homepage: www.sciencedirect.com/journal/ \njournal-of-pediatric-surgery\nhttps://doi.org/10.1016/j.jpedsurg.2025.162864\n0022-3468/© 2025 Elsevier Inc. All rights are reserved, including those for text and data mining, AI training, and similar technologies.\nJournal of Pediatric Surgery 61 (2026) 162864\n\ncanal with a distended rectum in most patients. However, I also \nfound a small number with undiagnosed pelvic pathology: sacral \nneuroblastoma in one boy and several with presacral meningocele \nand teratoma in Currarino syndrome, which led to one mother also \nneeding help from colorectal surgeons for a presacral teratoma. \nAlso, I was able to identify a few with anorectal anomalies, such as \nanal stenosis or ano-cutaneous fistula and sacral agenesis, unfor-\ntunately demonstrating that paediatricians did not always roll \ntheir patients over and examine the back, spine and perineum of \ninfants.\nAfter physical examination I usually arranged an EUA to exclude \nHirschsprung disease formally by strip biopsy and obtain x-rays of \nthe spine and pelvis to rule out occult spina bifida and partial \nsacral agenesis. In one infant the diagnosis of sacral agenesis was \nmade on x-rays already done 3 months earlier to exclude necro-\ntizing enterocolitis, and the absent sacrum had been missed by \nboth neonatologist and radiologist.\nOnce the obvious anatomical anomalies were excluded [3], I \nwas forced to consider what management strategy might be used \nwhen common laxative regimes had already failed. Polyethylene \nglycol with electrolytes (PEG 3350, sold in Australia as ‘Movicol’) \nwas known to be reasonably well tolerated, even in high doses [4], \nso this is the treatment I started with, as it had been shown to work \neven for dis-impaction [4]. In adolescents with massive secondary \nmegacolon, however, manual dis-impaction under a GA was oc-\ncasionally necessary. When Movicol was unable to provide a stable \nstool pattern, initially I considered partial colectomy to remove the \nmost dilated segment of colon, but improvement was only tem-\nporary [2]. In addition, I was hoping to find a way to fix the \nproblem without leaving the child with a lifelong set of compli-\ncations from laparotomy and colonic resection. In a few desperate \npatients I performed a proximal stoma [5] which was able to \novercome the constipation and allow the colon to gradually \nrecover its tone [6].\nIn 1990 Pat Malone and colleagues described the antegrade \ncontinence enema (ACE) procedure using the appendix as a micro-\nstoma [7], and after 1993 I adapted this strategy, performing the \nappendicostomy laparoscopically, rather than by open surgery \n[8,9]. The development of the cecostomy catheter by Peter Chait \nfrom Toronto [10] was a step forward, and I modified the pro-\ncedure to insert the Chait catheter over a guide wire through an \nappendicostomy rather than direct puncture of the caecum, and \nthis was the mainstay of our surgical treatment of children with \nintractable, chronic constipation for over a decade, while I \nsearched for a cause.\n1) The first door opens: Discovery of ‘Substance P’ Deficiency\nDuring the 1990's I started a determined search for a biological \ncause for chronic constipation, after getting my arm twisted by a \nfew desperate parents, who were sure their child's constipation \nwas not caused by a behaviour disorder, but an organic disease. \nThese parents pushed me to consider biopsy of the colon to find an \norganic explanation, so I started doing regular rectal biopsies for \nstandard histology as well as immunohistochemistry, which was\navailable through my own research laboratory. Once laparoscopy \nwas established at RCH in 1993, I began doing laparoscopic bi-\nopsies of the colon (seromuscular samples from right and left \ntransverse colon and the sigmoid colon) [11]. The specimens were \nexamined for the newly described autonomic neurotransmitters, \nSubstance P (SP) and Vasoactive Intestinal Peptide (VIP). SP was \nknown to be involved stimulating contraction, while VIP was an \ninhibitory peptide [12]. The results of the staining suggested that \nSP was deficient in the transverse colon in children with severe \nconstipation [12]. The parents immediately felt vindicated that \nthere was indeed an organic pathology to explain their child's \nconstipation, and which we called “Neuronal Intestinal Dysplasia” \n(NID), for want of a better name, and this led to the establishment \nof the ‘NIDKIDS’ Support Group.\nMeanwhile I was trying to understand what SP deficiency \nmeant: was it a primary cause of constipation or a secondary effect \nof the dilatation and deficient peristalsis? Initially we thought it \nmight be a primary abnormality, as SP was a known excitatory \ntransmitter controlling peristalsis [12]. However, a few years later \nwe studied an adolescent with severe constipation where SP \nstaining was deficient in the nerves of the grossly dilated trans-\nverse colon. After very aggressive laxative treatment the dilatation \nresolved, and repeat seromuscular biopsies showed recovery of SP \nimmunofluorescence to normal levels. This dynamic response to \ntreatment suggested that the initial SP deficiency was a temporary \nresponse to dilatation, and potentially reversible, rather than a \nprimary abnormality.\n2) 2nd Advance: A new functional test, the Nuclear Transit Study, \n(NTS)\nThe change in SP levels with colonic dilatation showed that \nhistology and physiology in the colon was quite responsive to the \neffects of constipation, which triggered a search for ways to \nmeasure colonic function. In 1997 I approached the staff of the \nNuclear Medicine department at the Royal Children's Hospital \n(RCH) in Melbourne to see if they could adapt their nuclear tracer \ntest of gastrointestinal transit, used to estimate gastric emptying, \nto study transit times in the colon. They were able to modify the \n2-h gastric scintigraphy study to allow further scans of the \nabdomen at 6, 24, 30 and 48 h, and the colonic NTS was born so \nwe could measure transit times through the small bowel and \ncolon [13,14]. It was quantitative and reproducible but took 48 h, \nand the patients stopped laxatives for a total of 5 days (3 days \nbefore and 2 days for the test). Despite these obvious drawbacks \nto the test, the families were desperate for answers, so I had no \ntrouble with consent for the study.\n3) 3rd Advance: NTS identifies Slow-Transit Constipation (STC)\nAfter standardizing the NTS against young adults as controls we \nwere able to define delayed gastric emptying as T1/2 > 50 min and \nslow small bowel transit as >25 % of tracer still retained in the \nsmall bowel at 6 h. Also, it was possible to define slow colonic \ntransit as having a geometric centre of the tracer upstream of the \nmidpoint of the transverse colon at 24 h [15]. Patients with ano-\nrectal retention were defined as having >60 % of tracer in the \nrectosigmoid at 48 h, while in those with normal transit the \ningested gallium tracer (in a milk drink) had already passed \nthrough the colon and reached the toilet [13].\n4) 4th Advance: Transcutaneous Electrical Stimulation (TES) can \ntreat STC\nTable 1\nOrganic disorders causing constipation.\nSurgical\nSpina Bifida\nSacral agenesis \nSacral tumours \nHirschsprung disease \nMedical\nHypothyroidism \nMetabolic disorders \nCoeliac disease\nJ.M. Hutson / Journal of Pediatric Surgery 61 (2026) 162864\n2 \n\nLooking at slow colonic transit we began to consider whether \nit might respond to electrical stimulation. Our Continence \nPhysiotherapist, Janet Chase, had noticed a report in the litera-\nture of transcutaneous electrical stimulation (TES) being used in \na cohort of elderly patients with bladder instability, where it was \nnoted that some of the patients had a side-effect of diarrhoea \n[15]. Using the same technical details, we did a pilot study of \neight children with constipation with four electrodes, two placed \non the abdomen and two on the back and connected diagonally \nand with interfering currents. The children were not bothered by \nthe treatment when the tingling sensation was minimal, and the \ncurrents could be increased gradually as the kids got used to the \nfeeling. The results of the pilot were promising so we then did a \ncontrolled trial of 32 children using TES, with interferential cur-\nrent (TES-IFC) for 20 min after school, three times a week for 3—6 \nmonths, and the number of bowel actions increased, along with a \ndecrease in abdominal pains and an increase in colonic transit \nand improved stool frequency [16—18]. The success of TES-IFC in \ntreating the constipation allowed me to arrange for some chil-\ndren to be treated by their local physiotherapist if they had \nexperience using TES-IFC.\n5) 5th Advance: NTS revealed 1/3 of patients with constipation\nhad rapid proximal colonic transit\nOnce I had an effective way to manage slow-transit con-\nstipation with TES-IFC, I began to consider the possible aetiology \nand treatment for the subgroup of patients with rapid transit, \nwhich we had found retrospectively to occur about a third of the \ntime on NTS [19]. Ironically, we only discovered the group with \nrapid transit after we did a long-term review of all the transit \nstudies done over the previous decade: as we were looking for \n‘slow’ transit, the group with ‘rapid’ transit initially was missed \ncompletely. We had already defined the parameters to identify \n‘slow’ from ‘normal’ transit, but initially we just lumped all the \nstudies that were not slow into a common group, until we later \nrealised it contained patients with both normal and fast transit. \nOnce this became obvious we formally defined the criteria for fast \ntransit: tracer in the caecum or beyond at 6 h and >60 % tracer in \nrectosigmoid at 24 h. There was also delayed gastric emptying in \nthis subgroup, and the tracer was usually still retained in the \nrectosigmoid at 48 h.\n6) 6th Advance: Rapid transit constipation (RTC) caused by food\nintolerance like irritable bowel syndrome (IBS).\nGoing back to basic physiology, I thought about what would \ncause rapid transit in the proximal colon at the same time as \npresenting with a clinical problem of chronic constipation. Infec-\ntious diarrhoea was known to cause rapid transit along the entire \ncolon with liquid stool, and I remembered the times I had \ngastroenteritis with diarrhoea, and how painful it was to pass the \nliquid stool. Not only do infectious agents like rotavirus cause \ndiarrhoea, but also food intolerance. This suggested to me that \nchildren with rapid proximal colonic transit may have had food \nintolerance like IBS [20] when they were infants, with acidic fluid \nstools that were very painful to pass because of perianal excoria-\ntion, and this might have led to holding-on and subsequent con-\nstipation. By the time they were old enough to talk, their only \nsymptom was constipation, as the holding on had become their \n‘normal’ response to the call to stool, and the underlying diarrhoea \nwas invisible.\n7) 7th Advance: Kids with constipation have sugar intolerance the\nsame as IBS\nI knew that gastroenterologists were testing adult patients with \nirritable bowel syndrome (IBS) for sugar malabsorption [21,22], as \nit had been discovered in 2012 that IBS was often caused by \nmalabsorption of the common dietary sugars, the so-called ‘FOD-\nMAP’ sugars (Fermentable Oligosaccharides, DIsaccharides, \nMonosaccharides And Polyols) [23,24]. Ironically the discovery of \nthe dietary exclusion treatment of FODMAP sugars for IBS was \nmade by Prof. Peter Gibson when he worked just up the street from \nRCH at the Royal Melbourne Hospital [24]. IBS symptoms include \nabdominal pain and variable diarrhoea and constipation [20], \nwhich was not far removed from my group of patients with rapid \nproximal colonic transit with anorectal hold up and constipation. \nAs one of the standard investigations for IBS is a breath test for \nassessment of sugar malabsorption [23], I started to order breath \ntests for possible fructose and/or lactose intolerance in my cohort \nof children with constipation and rapid transit on the scintigraphy. \nIt was not long before I was ordering more breath tests per week \nthan most of my paediatric gastroenterology colleagues (who were \nraising eyebrows!).\nAfter I started doing breath tests for new patients with chronic \nconstipation, it was a revelation to find nearly all of them had \nfructose and/or lactose intolerance! Moreover, those with negative \ntests for fructose or lactose malabsorption usually had sorbitol or \nmannitol intolerance. Essentially, almost every patient with \nchronic constipation had intolerance to one or more sugar, \nconsistent with a diagnosis of underlying IBS.\n8) Final Advance: Chronic Constipation in kids is cured with di-\netary exclusion of FODMAP sugars, confirming a diagnosis of \nIBS\nDietary exclusion of the sugars identified by the breath tests led \nto rapid improvement of constipation symptoms in my patients \n[25,26], which then enabled me to estimate how long it would take \nto reach complete recovery in new patients. Children less than 5 \nyears old were better in under 3 months with the appropriate \nsugar exclusion diet, while 5-10-year-olds took up to 6 months and \nadolescents often needed 6—9 months. Most importantly, how-\never, they all got better and were able to stop their laxatives. By the \ntime I retired from active clinical practice at the end of 2021, I was \nable to close my special constipation clinic as all the patients had \nrecovered and been discharged!\nFinally, after 30 years of struggle I was able to diagnose children \nwith chronic ‘idiopathic’ constipation as simple irritable bowel \nsyndrome (IBS) (that was probably congenital) with secondary \nconstipation, triggered by extremely painful defecation in early \ninfancy. The undigested sugars reaching the colon were being \nfermented by colonic bacteria leading to the stools being too acidic \nand burning the perianal skin, and with the baby responding by \n‘holding-on’ to stop the pain. By the time the infant was old \nenough to talk the ‘holding-on’ had become learned and essen-\ntially a ‘normal’ behaviour, and the overriding symptom was se-\nvere constipation, masking the underlying proximal diarrhoea, \nwhich was only revealed subsequently by the nuclear transit \nstudies. The children also had chronic abdominal pain secondary \nto the disordered peristalsis, which only became obvious in \nretrospect after it resolved with treatment, as they had had life-\nlong symptoms.\nWere STC and RTC different diseases, or different presentations \nof the same disease? Initially I wondered whether STC might be a \ncongenital disorder, as the symptoms began very early in life, but it \nwas probably just the sugar intolerance that was congenital. \nHowever, the changes in the transverse colon in histology and \nfunction suggested that slow transit may just be the result of \nmassive dilatation interfering with peristalsis. This would mean\nJ.M. Hutson / Journal of Pediatric Surgery 61 (2026) 162864 \n3\n\nthat ‘STC’ on transit study was just secondary to the colon in that \nchild being much more dilated when the constipation was very \nsevere. This suggested that STC and RTC were indirect measures of \nthe different severity of colonic dilatation. After I started doing the \nbreath tests and treating patients with exclusion diets, I stopped \ndoing transit studies, and all the patients improved, with those \nwho had slow transit on NTS just taking a bit longer to recover.\nAnother feature that puzzled me was that some of the older \npatients who had very severe constipation and soiling in early \nchildhood seemed to improve spontaneously in adolescence. Did \nthe disease abate or not? I was not sure, but wondered whether \nthe adolescents might just have learnt by trial and error to avoid \nthe foods containing the sugar that they could not digest, essen-\ntially developing their own exclusion diet empirically.\nWhat should a paediatric surgeon do now with a new patient \nwith chronic constipation? My recommendation would be to \narrange breath tests if the patient is old enough (>3 years and able \nto blow into a balloon) and refer the patient to a dietitian and/or \ngastroenterologist to manage the IBS and selective dietary exclu-\nsion of whichever FODMAP sugars are implicated.\nIn the 1980's I went to an APSA meeting in Florida where Dr. C. \nEverett Koop (known as “Chick”) was giving the guest lecture. Dr \nKoop was at that time the Chief Pediatric Surgeon in the Children's \nHospital of Philadelphia (CHOP) and who had been chosen by \nPresident Reagan to be the Surgeon General. Dr Koop gave a talk on \nthe challenges faced by American pediatric surgeons at that time, \nand his number one problem was intractable, chronic constipation, \nfor which there was no known cause or cure. Dr. Koop died in \n2003 at the age of 96, and so did not live to see it, but I think he \nwould be pleased to find that 40 years after I heard his lecture we \nnow have all the answers to the questions he posed about chronic \nconstipation. It just took 30 years and eight doors to slowly open to \nenable ‘idiopathic’ chronic constipation to be diagnosed as simple \nIBS with secondary constipation. It is an irony that looking back I \nhad inherited all these patients with chronic constipation because \nmy gastroenterology colleagues were too busy seeing patients \nwith coeliac disease and inflammatory bowel disease, yet the pa-\ntients turned out to just have simple IBS.\n\nDeclaration of competing interest\nAs the sole author of this manuscript I declare there is no \nconflict of interest.\n\nReferences\n[1] Whyllie MD, Hyams JS. Pediatric gastrointestinal disease: pathophysiology, \ndiagnosis, management. Philadelphia: WB Saunders; 1999.\n[2] Siminas S, Losty PD. Current surgical management of pediatric idiopathic con-\nstipation: a systemic review of published studies. Ann Surg 2015;262(6):925—33.\n[3] Southwell BR, King SK, Hutson JM. Chronic constipation in children: \norganic disorders are a major cause. J Paediatr Child Health 2005;41(1—2): \n1—15.\n[4] Jordan-Ely JA, Dobson KM, Southwell BR, Hutson JM. Combination PEG & E \nand picosulphate is effective for bowel dis-impaction in pediatric patients \npresenting to a surgical clinic. Gastroenterology 2013;144(5):S610.\n[5] Villarreal J, Sood M, Zangen T, Flores A, Michel R, Reddy N, et al. Colonic \ndiversion for intractable constipation in children: colonic manometry helps \nguide clinical decisions. J Pediatr Gastroenterol Nutr 2001;33(5):588—91.\n[6] Christison-Lagay ER, Rodriguez L, Kurtz M, St Pierre K, Doody DP, \nGoldstein AM. Antegrade colonic enemas and intestinal diversion are highly \neffective in the management of children with intractable constipation. J \nPediatr Surg 2010;45(1):213—9.\n[7] Malone PS, Ransley PG, Kiely EM. Preliminary report: the antegrade conti-\nnence enema. Lancet 1990;336(8725):1217—8.\n[8] King SK, Sutcliffe JR, Southwell BR, Chait PG, Hutson JM. The antegrade \ncontinence enema successfully treats idiopathic slow transit constipation. J \nPediatr Surg 2005;40(12):1935—40.\n[9] King SK, Sutcliffe JR, Hutson JM. Laparoscopic seromuscular colonic biopsies: \na surgeon's perspective. J Pediatr Surg 2005;40:381—4.\n[10] Chait PG, Shandling B, Richards HM, Connolly BL. Fecal incontinence in \nchildren: treatment with percutaneous cecostomy tube placement―a pro-\nspective study. Radiology 1997;203(3):621—4.\n[11] Hutson JM, Chow CW, Borg J. Intractable constipation with a decrease in \nsubstance P immunoreactive fibres: is it a variant of neuronal intestinal \ndysplasia? J Pediatr Surg 1996;31:580—3.\n[12] King SK, Sutcliffe JR, Ong SY, Lee M, Koh TL. Substance P and vasoactive in-\ntestinal peptide are reduced in right transverse colon in pediatric slow-\ntransit constipation. Neurogastroenterol Motil 2010;22(8):883—92, e234.\n[13] Hynes MC, Yik YI, Vesey D, Southwell BR, Hutson JM. Gastrointestinal transit \npatterns identified in children with intractable constipation using scintig-\nraphy: experience of over a1000 cases. Gastroenterology 2017;152(5):S515.\n[14] Cook BJ, Lim E, Cook D, Hughes J, Southwell BR, Hutson JM. Radionuclide \ntransit to assess sites of delay in large bowel transit in children with chronic \nidiopathic constipation. J Pediatr Surg 2005;40(3):478—83.\n[15] Hagstrom S, Mahler B, Madsen B, Rittig S, Djurhuus JC. Transcutaneous \nelectrical nerve stimulation for refractory daytime urinary urge incontinence. \nJ Urol 2009;182(4 Suppl):2072—8.\n[16] Yik YI, Hutson JM, Southwell BR. Home-based transabdominal interferential \nelectrical stimulation for 6 months improves paediatric slow transit con-\nstipation (STC). Neuromodulation 2017;21(7):676—81.\n[17] Clarke MC, Chase J, Gibb S, Robertson V, Catto-Smith A, Hutson JM, et al. \nImprovement in quality of life in children with slow transit constipation after \ntreatment with transcutaneous electrical stimulation. J Pediatr Surg \n2009;44(6):1268—72.\n[18] Ismail KA, Chase J, Gibb S, Robertson V, Catto-Smith A, Hutson JM, et al. Daily \ntransabdominal electrical stimulation at home increased defecation in chil-\ndren with slow transit constipation: a pilot study. J Pediatr Surg 2009;44(12): \n2388—92.\n[19] Hutson JM, Hynes MC, Kearsey I, Yik YI, Southwell BR. Rapid transit con-\nstipation in children: a possible genesis for irritable bowel syndrome. Pediatr \nSurg Int 2020;36(1):11—9.\n[20] Chey WD, Kurlander J, Eswaran S. Irritable bowel syndrome: a clinical re-\nview. JAMA 2015;31(9):949—58.\n[21] Halmos EP, Power VA, Shepherd SJ, Gibson PR, Muir JG. A diet low in FOD-\nMAPs reduces symptoms of irritable bowel syndrome. Gastroenterology \n2014;146(1):67—75.e5.\n[22] Dabritz J, Muhlbauer M, Domagk D, Voos N, Henninger S, Lainka E, et al. \nSignificance of hydrogen breath tests in children with suspected carbohy-\ndrate malabsorption. BMC Pediatr 2014;14:59.\n[23] Barrett JS, Gibson PR. Fructose and lactose testing. Aust Fam Physician \n2012;41(5):293—6.\n[24] Barrett JS, Gibson PR. Fermentable oligosaccharides, disaccharides, mono-\nsaccharides and polyols (FODMAPs) and nonallergic food intolerance: FOD-\nMAPs or food chemicals? Therap. Adv Gasatroenterol 2012;5(4):261—8.\n[25] Waingankar K, Lai C, Punwani V, Hutson JM, Southwell BR. Effect of dietary \nexclusion of sugars on rapid transit constipation in children. J Gastroenterol \nHepatol 2017;32(Suppl 3):188—9.\n[26] Waingankar K, Lai C, Punwani V, Hutson JM, Southwell BR. Dietary exclusion \nof fructose and lactose after positive breath tests improved rapid transit \nconstipation in children. J Gastroenterol Hepatol 2018;2(6):262—9.\nJ.M. Hutson / Journal of Pediatric Surgery 61 (2026) 162864\n4"}, {"message_id": "1871602368618600886", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f94470264a99b6", "sender_name": "Rafa Reader", "sender_email": "readerrafa@gmail.com", "sender_is_owner": false, "date": "2026-07-24T14:18:16", "subject": "Fwd: JAMA surg set 2024 1071.pdf", "original_title": "Enhanced Recovery After Surgery (ERAS) Society Recommendations for Neonatal Perioperative Care", "smart_title": "Diretriz por consenso Delphi/GRADE — cuidados perioperatórios neonatais ERAS · Hospital for Sick Children, Toronto, 2024", "email_summary": "Reencaminhamento em cadeia (Rafa para si mesmo em 2025, depois para \"Rafa Reader\", reencaminhado de novo agora) do PDF da diretriz ERAS neonatal da JAMA Surgery — sem comentário adicional em nenhum dos saltos da cadeia.", "abstract_text": "screening, 98 articles were included in full-text review,\nwhich were considered alongside the relevant 58 articles from the\nERAS Society Guideline for Neonatal Intestinal Surgery Guideline4\n(Figure). Using the JBI critical appraisal tool specific to each study\ndesign, each of these articles was assessed for the quality of\nTable 1. Grading of Recommendations Assessment, Development,\nand Evaluation Method for Rating Quality of Evidence\nand Strength of Recommendation\nMeasure\nQuality/\nstrength level\nMeaning\nEvidence\nquality\nHigh\nFurther research very unlikely to change\nthe GDC’s confidence in the estimate\nof effect\nModerate\nFurther research is likely to have\nan important impact on the GDC’s\nconfidence in the estimate of effect\nand may change the estimate\nLow\nFurther research is very likely to have\nan important impact on confidence in\nthe estimate of effect and is likely\nto change the estimate\nVery low\nAny estimate of effect is very uncertain\nStrength of\nrecommendation\nStrong\nThe desirable effects of an intervention\nclearly outweigh the undesirable effects,\nor clearly do not\nWeak\nThe trade-offs are less certain—either\nbecause of low-quality evidence or\nbecause evidence suggests that desirable\nand undesirable effects are closely\nbalanced\nAbbreviation: GDC, guideline development committee.\nFigure. Preferred Reporting Items for Systematic Reviews\nand Meta-Analyses (PRISMA) Diagram\n5763 Records identified from\nOvid MEDLINE searches\n98 Articles included in review\n28 Parental hands-on care\n11 Enteral feeds\n12 Perioperative glucose\n9 Perioperative ventilation\n9 Antimicrobial prophylaxis\n7 Team communication\n6 Transfusion thresholds\n5 Preoperative fasting\n5 Temperature regulation\n5 Fluid management\n1 Surgical skin site preparationb\n9 Records removed before\nscreening (duplicates)\n5656 Abstracts excludeda\n5754 Abstracts screened\n98 Articles had full-text review\naThe reasons for exclusion were that the population, setting, or study type\n(review, editorial, or study protocol) was wrong or the article was retracted.\nbIncluded recent systematic review.\nClinical Review & Education Special Communication\nERAS Society Recommendations for Neonatal Perioperative Care\n1072\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n(Reprinted)\njamasurgery.com", "bullets_summary": "Primeira diretriz ERAS (Enhanced Recovery After Surgery) desenhada para TODOS os neonatos cirúrgicos numa UCIN, não só para um procedimento específico\nMetodologia: comité internacional (cirurgiões, anestesistas, neonatologistas, enfermagem), técnica de Delphi modificada, 5763 resumos rastreados → 98 artigos incluídos, avaliados por GRADE\n16 recomendações finais em 11 áreas: comunicação de equipa, jejum pré-operatório, regulação térmica, profilaxia antimicrobiana, preparação cutânea, ventilação, fluidos, glicemia, limiares de transfusão, alimentação entérica e cuidados práticos parentais\nApenas 5 das 16 recomendações têm evidência de qualidade alta ou moderada com força \"forte\" — a maioria (8 de 16) assenta em evidência de baixa qualidade, força \"fraca\"\nÁreas exploradas mas sem recomendação por falta de dados: sonda nasogástrica, algália de Foley e cateteres centrais\nRecomendações fortes de maior peso prático: usar leite materno como primeira escolha entérica; envolver os pais activamente e cedo nos cuidados; preparação cutânea com clorohexidina (>35 semanas e >1500g); minimizar o jejum (fórmula/leite até 6h/4h antes, líquidos claros até 1h antes)", "long_summary": "Esta diretriz da ERAS Society (Enhanced Recovery After Surgery), publicada na JAMA Surgery em 2024, é a primeira a cobrir cuidados perioperatórios para TODOS os neonatos submetidos a cirurgia não-cardíaca major numa unidade de cuidados intensivos neonatais (UCIN) — até então só existia uma diretriz ERAS específica para resseção intestinal neonatal. A equipa, liderada por Mercedes Pilkington (Hospital for Sick Children, Toronto), argumenta que, apesar da diversidade de patologias cirúrgicas neonatais, há prioridades perioperatórias suficientemente comuns entre os recém-nascidos para justificar uma diretriz única, aplicável a toda a unidade.\n\nMetodologicamente, um comité internacional de 18 membros (cirurgiões pediátricos, anestesistas, neonatologistas, enfermagem e peritos em metodologia ERAS) usou uma técnica de Delphi modificada para chegar a consenso (definido como >70% de concordância) sobre quais tópicos incluir. De 42 tópicos potenciais, 21 avançaram para revisão sistemática da literatura (Ovid MEDLINE, 2017-2022, complementando a diretriz de resseção intestinal de 2020). De 5763 resumos rastreados, 98 artigos de qualidade variável entraram na revisão final, avaliados com as ferramentas JBI e GRADE para determinar a força de cada recomendação.\n\nO resultado são 16 recomendações finais, distribuídas por 11 áreas temáticas: comunicação estruturada de equipa (checklists pré/pós-operatórios); minimização do jejum pré-operatório (fórmula/leite materno até 6h/4h antes, líquidos claros até 1h antes — recomendação forte, apesar de evidência apenas moderada, dada a vulnerabilidade metabólica do neonato); monitorização e prevenção ativa de hipotermia desde a saída da UCIN; profilaxia antibiótica pré-operatória dentro de 60 minutos da incisão, descontinuada em 24h salvo indicação clínica; preparação cutânea com clorohexidina em neonatos >35 semanas e >1500g (única recomendação com evidência de alta qualidade E força forte); estratégia ventilatória protetora (4-8 mL/kg) com extubação precoce quando viável; titulação cuidadosa de fluidos e controlo glicémico (evitando hipoglicemia, sem controlo apertado por insulina); limiares restritivos de transfusão (Hb >90g/L, ou >110g/L se intubado/primeira semana); leite materno como primeira escolha entérica (única outra recomendação forte com evidência de alta qualidade) com protocolos de alimentação pós-operatória precoce; e, por fim, envolvimento ativo e precoce dos pais nos cuidados práticos (trocas de fralda, alimentação por sonda, cuidados de estoma), com preparação estruturada para a alta.\n\nUm ponto importante que os autores assumem abertamente: 8 das 16 recomendações finais assentam em evidência de qualidade baixa, com força \"fraca\" — não porque sejam pouco importantes, mas porque a população neonatal cirúrgica está globalmente sub-estudada. Em vez de excluir estas áreas à espera de melhor evidência, o comité optou por publicá-las mesmo assim, precisamente para sinalizar onde é preciso investigação e auditoria futuras. Três áreas (sonda nasogástrica, algália de Foley, cateteres centrais) foram consideradas relevantes mas não geraram recomendação alguma por falta de dados suficientes.\n\nA conclusão prática dos autores é que esta diretriz não substitui protocolos específicos por procedimento (ex.: gastrosquise, atresia intestinal) mas serve como base transversal de cuidados, implementável ao nível de toda a unidade, para reduzir a variabilidade de prática e permitir que mais recém-nascidos beneficiem dos princípios de recuperação melhorada sem esperar por diretrizes específicas de cada subespecialidade.", "full_text_formatted": "Enhanced Recovery After Surgery (ERAS) Society Recommendations\nfor Neonatal Perioperative Care\nMercedes Pilkington, MD, MGSC; Gregg Nelson, MD, PhD; Brandon Pentz, MSc; Tyara Marchand, MD; Erin Lloyd, BSc;\nPriscilla P. L. Chiu, MD, PhD; David de Beer, MB, ChB; Nicole de Silva, RN(EC), NP; Scott Else, MD; Annie Fecteau, MDCM, MHSC;\nStefano Giuliani, MD, PhD; Simon Hannam, MBBS, MD; Alexandra Howlett, MD; Kyong-Soon Lee, MD, MSc; David Levin, MD, MSc;\nLorna O’Rourke, RN; Lori Stephen, RN/BN; Lauren Wilson, BMedSci, BMBS; Mary E. Brindle, MD, MPH\nE\nnhanced Recovery After Surgery (ERAS) guidelines pro-\nvidehealthcarepractitionerswithevidence-informedrec-\nommendationsdesignedtobeimplementedasasynergis-\ntic care bundle to standardize and improve perioperative care.1\nThe guidelines and their respective components are intended to\nminimize the physiologic stress of surgery and the resultant cata-\nbolic state that contributes to adverse surgical outcomes. ERAS\nguidelines currently exist for over 20 adult surgical populations.2-5\nRecommendations relating to preoperative optimization, intraop-\nerative fluid management, and analgesia-related recommenda-\ntions are similar across a number of specialty-specific guidelines. In\nadults, ERAS care pathways have been shown to reduce complica-\ntions, reduce postoperative length of stay (without increasing\nreadmissions), and reduce costs.6\nPediatric patients, and particularly neonates, are especially\nvulnerable to surgical stress. At present, the ERAS Society Guide-\nline for the treatment of neonates undergoing intestinal resection\nis the only neonatal guideline.4 Given the imperative to produce\nevidence-based care pathways for the neonatal population, a\nseries of subspecialty-based guidelines would be cumbersome,\nand thus, this model of replicating the adult guidelines was\nrejected. Instead, there is a recognized set of commonalities\nbetween neonates requiring surgery that can be used to develop\nbroadly applicable guidelines. It is with this tenet in mind that this\nguideline was created. We sought to reevaluate the recommenda-\ntions for neonates undergoing intestinal resection and update\nand expand these guidelines to apply to a broader population of\nall surgical neonates. These guidelines are intended to be imple-\nmented within the neonatal intensive care unit (NICU) to create a\nshared evidence-based care model for multidisciplinary and\nmultiprofessional teams.\n\nMethods\nThe guideline was developed following the approach outlined by\nthe ERAS Society’s standards for guideline creation and has been\nendorsed by the ERAS Society.7\nIMPORTANCE Neonates requiring surgery are often cared for in neonatal intensive care units\n(NICUs). Despite a breadth of surgical pathology, neonates share many perioperative\npriorities that allow for the development of unit-wide evidence-based Enhanced Recovery\nAfter Surgery (ERAS) recommendations.\nOBSERVATIONS The guideline development committee included pediatric surgeons,\nanesthesiologists, neonatal nurses, and neonatologists in addition to ERAS content and\nmethodology experts. The patient population was defined as neonates (first 28 days of life)\nundergoing a major noncardiac surgical intervention while admitted to a NICU. After the first\nround of a modified Delphi technique, 42 topics for potential inclusion were developed.\nThere was consensus to develop a search strategy and working group for 21 topic areas.\nA total of 5763 abstracts were screened, of which 98 full-text articles, ranging from low to\nhigh quality, were included. A total of 16 recommendations in 11 topic areas were developed\nwith a separate working group commissioned for analgesia-related recommendations. Topics\nincluded team communication, preoperative fasting, temperature regulation, antibiotic\nprophylaxis, surgical site skin preparation, perioperative ventilation, fluid management,\nperioperative glucose control, transfusion thresholds, enteral feeds, and parental care\nencouragement. Although clinically relevant, there were insufficient data to develop\nrecommendations concerning the use of nasogastric tubes, Foley catheters, and central lines.\nCONCLUSIONS AND RELEVANCE Despite varied pathology, neonatal perioperative care within\nNICUs allows for unit-based ERAS recommendations independent of the planned surgical\nprocedure. The 16 recommendations within this ERAS guideline are intended to be\nimplemented within NICUs to benefit all surgical neonates.\nJAMA Surg. 2024;159(9):1071-1078. doi:10.1001/jamasurg.2024.2044\nPublished online July 31, 2024.\nSupplemental content\nCME at jamacmelookup.com\nAuthor Affiliations: Author\naffiliations are listed at the end of this\narticle.\nCorresponding Author: Mercedes\nPilkington, MD, MGSC, Division of\nGeneral and Thoracic Surgery, The\nHospital for Sick Children,\nDepartment of Surgery, University of\nToronto, 555 University Ave, Toronto,\nON M5G 1X8, Canada (mpilkington@\nariadnelabs.org).\nClinical Review & Education\nJAMA Surgery | Special Communication\njamasurgery.com\n(Reprinted)\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n1071\n© 2024 American Medical Association. All rights reserved.\nDownloaded from jamanetwork.com by Universidade de Lisboa user on 11/24/2025\n\nGuideline Development Committee\nAn international guideline development committee (GDC) was\nestablished,includingpediatricgeneralandthoracicsurgeons,pedi-\natric anesthesiologists, neonatologists, neonatal nurses, and ERAS\nmethodologyexperts.Anadditionaladvisoryteamofadhocconsul-\ntants was approached for specific recommendations (members\nincluded representatives from dietetics, pharmacy, and subspe-\ncialty surgery). Parent representatives were consulted throughout.\nScope Determination and Literature Search\nA modified Delphi technique was used to create a consensus defi-\nnition for the scope of included patient population and procedures\nand then to develop and refine the topic areas and specific recom-\nmendations.Consensuswaspredefinedasgreaterthan70%agree-\nment with the proposal by GDC members with serial Qualtrics sur-\nveys being used to measure consensus. A combination of virtual\nconsensus meetings and circulated working documents were used\nuntiluniversalconsensusregardingthepopulationandincludedtopic\nareas was attained.\nAnalgesia-relatedtopicswereconsideredbyanalternatework-\ning group and not included in these recommendations.\nLiterature Search\nWithin the topic areas, working groups proposed new recommen-\ndation(s) or recommendation amendments, and search strategies\nwere developed in consultation with a research librarian. The pri-\nmary literature from the 2020 Intestinal Resection Guideline4 was\nreviewedtogetherwithafocusedliteraturereviewofeachtopicfrom\n2017 to 2022 to identify updated data and reevaluate the evidence\nbasebehindpriorrecommendationsforthebroaderneonatalpopu-\nlation. Searches were performed using Ovid MEDLINE and limited\nto the English language. Each working group was provided with lit-\neratureandencouragedtofurthersnowballsearchtheliteratureas\nrequired. JBI (formerly Joanna Briggs Institute, a research organi-\nzation that develops evidence-based information) quality assess-\nment was performed for all included full-text studies and the Grad-\ningofRecommendationsAssessment,Development,andEvaluation\n(GRADE) approach was used to summarize the certainty of evi-\ndenceforeachrecommendationanddeterminethestrengthofthe\nrecommendation(Table1).8,9Theproposedrecommendationswere\nthencirculatedtothebroaderGDCalongsideproposedstrengthof\nrecommendationsandgradeofevidence.Iterativeamendmentsoc-\ncurred until there was (1) consensus (>70% agreement) to include\nthe recommendation, (2) support of the strength of recommenda-\ntion, and (3) the appropriate grade of evidence quality. All 18 GDC\nmembers completed each round of the modified Delphi and\napproved the final recommendations.\n\nResults\nThe patient population was defined as neonates (within the first 28\ndays of life) undergoing a major noncardiac surgical intervention\nwhile admitted to the NICU. The GDC elected not to specify any\npatient-related exclusion factors (eg, prematurity, comorbidities);\nrather, clinicians were encouraged to use these recommendations\nfor any patient within the NICU and to modify using clinical judg-\nment. There were 42 potential topics identified, 17 of which were\ntaken from the neonatal intestinal resection guideline.4 After 2\nrounds, a total of 21 topics were selected for search strategy devel-\nopment. Working groups contributed to the development of\nsearch strategies yielding a total of 5763 identified abstracts. After\nabstract screening, 98 articles were included in full-text review,\nwhich were considered alongside the relevant 58 articles from the\nERAS Society Guideline for Neonatal Intestinal Surgery Guideline4\n(Figure). Using the JBI critical appraisal tool specific to each study\ndesign, each of these articles was assessed for the quality of\nTable 1. Grading of Recommendations Assessment, Development,\nand Evaluation Method for Rating Quality of Evidence\nand Strength of Recommendation\nMeasure\nQuality/\nstrength level\nMeaning\nEvidence\nquality\nHigh\nFurther research very unlikely to change\nthe GDC’s confidence in the estimate\nof effect\nModerate\nFurther research is likely to have\nan important impact on the GDC’s\nconfidence in the estimate of effect\nand may change the estimate\nLow\nFurther research is very likely to have\nan important impact on confidence in\nthe estimate of effect and is likely\nto change the estimate\nVery low\nAny estimate of effect is very uncertain\nStrength of\nrecommendation\nStrong\nThe desirable effects of an intervention\nclearly outweigh the undesirable effects,\nor clearly do not\nWeak\nThe trade-offs are less certain—either\nbecause of low-quality evidence or\nbecause evidence suggests that desirable\nand undesirable effects are closely\nbalanced\nAbbreviation: GDC, guideline development committee.\nFigure. Preferred Reporting Items for Systematic Reviews\nand Meta-Analyses (PRISMA) Diagram\n5763 Records identified from\nOvid MEDLINE searches\n98 Articles included in review\n28 Parental hands-on care\n11 Enteral feeds\n12 Perioperative glucose\n9 Perioperative ventilation\n9 Antimicrobial prophylaxis\n7 Team communication\n6 Transfusion thresholds\n5 Preoperative fasting\n5 Temperature regulation\n5 Fluid management\n1 Surgical skin site preparationb\n9 Records removed before\nscreening (duplicates)\n5656 Abstracts excludeda\n5754 Abstracts screened\n98 Articles had full-text review\naThe reasons for exclusion were that the population, setting, or study type\n(review, editorial, or study protocol) was wrong or the article was retracted.\nbIncluded recent systematic review.\nClinical Review & Education Special Communication\nERAS Society Recommendations for Neonatal Perioperative Care\n1072\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n(Reprinted)\njamasurgery.com\n© 2024 American Medical Association. All rights reserved.\nDownloaded from jamanetwork.com by Universidade de Lisboa user on 11/24/2025\n\nevidence.8 The GDC determined that there was adequate evidence\nto create recommendations in 11 defined topic areas. Between 1\nand 3 recommendations were created per topic area, resulting in a\ntotal of 16 final recommendations (Table 2). Evidence tables are\nincluded in the eAppendix in the Supplement.\nTeam Communication\nSurgical handovers are particularly vulnerable to communication\nbreakdown and can lead to patient safety events.10 Structured\ncommunication using checklists such as the World Health Organi-\nzation Surgical Safety Checklist,11 standardized postoperative\nchecklists,12 and hypothermia checklists13 have been shown to be\neffective in neonates in multiple international large-scale studies.\nEnhanced communication can build collaborative teams and\nimprove health care practitioner satisfaction.14 Although the body\nof evidence in neonates is still somewhat limited, this is a strong\nrecommendation given the body of indirect evidence and expert\nagreement of the small risk of harm.\nRecommendation:Implementperioperativemultidisciplinaryteam\ncommunication using a structured process and protocol (eg, pre-\noperative and postoperative huddles).\nEvidence quality: Moderate\nRecommendation strength: Strong\nPreoperative Fasting\nMinimizing fasting time to reduce the catabolic response is a core\ncomponent of ERAS recommendations. There is a large body of\nhigh-quality evidence that demonstrates its importance.15 Neo-\nnates are particularly vulnerable to prolonged fasting as they have\nreduced reserves; therefore, despite there only being a moderate\namount of evidence in neonatal patients, there is a strong\nTable 2. Consensus Guidelines for Neonatal Perioperative Care: Enhanced Recovery After Surgery (ERAS)\nSociety Recommendations for Neonatal Intensive Care Units\nTopic\nRecommendation\nQuality\nStrength\nTeam\ncommunication\nImplement perioperative multidisciplinary team communication\nusing a structured process and protocol (eg, preoperative and\npostoperative huddles).\nModerate\nStrong\nPreop fasting\nFor neonates who are not otherwise nothing by mouth, offer\nformula or breast milk (with fortification removed) for up to 6 h\nand 4 h, respectively, preoperatively, and clear fluids up to 1 h\npreoperatively to minimize fasting.\nModerate\nStrong\nTemperature\nregulation\nContinuously monitor intraoperative core temperature and take\npreemptive measures to prevent hypothermia (<36.5 °C) and\nmaintain normothermia beginning before transfer from the NICU.\nModerate\nStrong\nAntimicrobial\nprophylaxis\nAdminister appropriate preoperative antibiotic prophylaxis within\n60 min of skin incision for clean-contaminated, contaminated, and\ndirty cases.\nLow\nWeak\nDiscontinue prophylactic postoperative antibiotics within 24 h of\nsurgery unless ongoing treatment is warranted.\nLow\nWeak\nSurgical skin site\npreparation\nUse chlorhexidine-based skin preparation to prepare the surgical\nsite in neonates and infants >35 weeks’ gestation and >1500 g.\nHigh\nStrong\nPerioperative\nventilation\nUse a lung-protective strategy (eg, 4-8 mL/kg, not >10 mL/kg and\nPEEP approximately 5). Ensure tidal volumes are measured\nintraoperatively and monitor carbon dioxide levels.\nLow\nWeak\nConsider using cuffed tracheal tubes for appropriately sized\nneonates to optimize ventilation and decrease the risk of\nreintubation. Consider the use of LMAs for appropriately sized\ninfants for uncomplicated procedures where the anesthesia\npractitioner has access to the airway in case of need to rescue.\nLow\nWeak\nAim for early postoperative extubation as soon as feasible,\nconsidering gestational age, risk for respiratory failure and type of\nsurgical repair.\nModerate\nWeak\nFluid management\nTitrate perioperative fluids to maintain tissue perfusion and\nprevent hypovolemia, fluid overload, and hyponatremia.\nModerate\nWeak\nPerioperative\nglucose control\nEnsure adequate perioperative glucose intake to avoid\nhypoglycemia which can be associated with adverse outcomes;\ntight glucose control with insulin infusions is not routinely\nrecommended.\nLow\nWeak\nTransfusion\nthreshold\nRestrict transfusions to maintain a hemoglobin level >90 g/L for a\nterm neonate with no oxygen requirements. Term neonates within\nthe first week of life, either intubated or with an oxygen\nrequirement, should be transfused to maintain a hemoglobin level\n>110 g/L.\nLow\nWeak\nUse written transfusion guidelines that take into account the target\nhemoglobin threshold and coagulation profile as well as the clinical\nstatus of the neonate and local practice.\nLow\nWeak\nEnteral feeds\nUse breast milk as first choice for enteral nutrition.\nHigh\nStrong\nUse postoperative feeding protocols to promote early enteral feed\nintroduction and advancement.\nLow\nWeak\nParental hands-on\ncare\nFacilitate hands on care and purposeful practice by parents that is\nindividualized to meet the unique needs of parents and infants\nearly during the admission. Build parental knowledge, skills, and\nconfidence to take on a leading role and facilitate caregiver\nreadiness for safe transition or discharge from the NICU.\nHigh\nStrong\nAbbreviations: LMA, laryngeal mask;\nNICU, neonatal intensive care unit;\nPEEP, positive end-expiratory\npressure.\nSI conversion factor: To convert\nhemoglobin to grams per deciliter,\ndivide by 10.\nERAS Society Recommendations for Neonatal Perioperative Care\nSpecial Communication Clinical Review & Education\njamasurgery.com\n(Reprinted)\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n1073\n© 2024 American Medical Association. All rights reserved.\nDownloaded from jamanetwork.com by Universidade de Lisboa user on 11/24/2025\n\nrecommendation to minimize fasting. Anesthesia guidelines have\nincreasingly recognized the safety evidence permitting clear fluid\nintake up to 1 hour before surgery.16-18 The group recommends\nthe development of local protocols to minimize fasting and\nencourage clear fluid intake up until 1 hour before surgery.\nRecommendation: For neonates who are not otherwise nothing\nby mouth, offer formula or breast milk (with fortification removed)\nfor up to 6 hours and 4 hours respectively preoperatively, and clear\nfluids up to 1 hour preoperatively to minimize fasting.\nEvidence quality: Moderate\nRecommendation strength: Strong\nTemperature Regulation\nNeonates with perioperative hypothermia have additional adverse\nrespiratory events and are more likely to require thermoregula-\ntory, respiratory, and cardiac interventions than normothermic\nneonates.19 Transportation of neonates is often a time of heat\nloss,20,21 and perioperative protocols including standardized han-\ndovers addressing thermoregulation have been demonstrated to\nimprove maintenance of normothermia.12,13,22 There is moderate\nevidence from multiple prospective studies that a multifaceted\napproach to heat preservation and active warming is required to\nprevent hypothermia during transfer and while in the operating\nroom.\nRecommendation:Continuouslymonitorintraoperativecoretem-\nperature and take preemptive measures to prevent hypothermia\n(temperature <36.5 °C) and maintain normothermia beginning\nbefore transfer from the NICU.\nEvidence quality: Moderate\nRecommendation strength: Strong\nAntimicrobial Prophylaxis\nSurgical site infections (SSIs) are a major cause of morbidity after\nsurgery.23RatesofneonatalSSIareincreasedinyoungerneonatesun-\ndergoingabdominalsurgery.24Anumberofsingle-centercohortstud-\nies of infants have demonstrated the benefit of preoperative antibi-\noticsinreducingtheratesofSSIinclean-contaminated,contaminated,\nand dirty cases.25,26 Several small cohort studies in infants younger\nthan1yearhavenotdemonstratedanybenefitofantibioticprophy-\nlaxisincleanprocedures.27,28Althoughthequalityofevidenceinneo-\nnatesislow,theguidelinecommitteehasrecommendedappropriate\nprophylactic antibiotics given the congruency of findings in small\ncohort studies with high-quality data in older patients.\nRecommendation: Administer appropriate preoperative antibi-\notic prophylaxis within 60 minutes of skin incision for clean-\ncontaminated, contaminated, and dirty cases.\nEvidence quality: Low\nRecommendation strength: Weak\nTheextendeduseofprophylacticantibioticshasnotbeenshown\nto reduce the risk of SSI in adult or pediatric patients undergoing\nclean or clean-contaminated procedures.29 If ongoing treatment is\nrequired (due to necrotizing enterocolitis, incomplete source\ncontrol, etc), the antibiotic duration should be guided by clinical\ncontext. Given the low quality of evidence specifically within the\nneonatal population, this is a weak recommendation.\nRecommendation:Discontinueprophylacticpostoperativeantibiot-\nicswithin24hoursofsurgeryunlessongoingtreatmentiswarranted.\nEvidence quality: Low\nRecommendation strength: Weak\nSurgical Site Skin Preparation\nTheuseofskinantisepsistopreparethesurgicalsiteisacentraltenet\nof surgical site preparation to reduce the burden of skin pathogens\nbefore incision. High-quality evidence supports the superiority of\nchlorhexidine-basedsolutionsinreducingtheriskofSSIinadults.30,31\nThere was initially some hesitancy in applying this to the neonatal\npopulation given the increased susceptibility to skin burns.32 A re-\ncentprospectivequalityimprovementinitiativedemonstratedthat\nchlorhexidine-based skin preparation in infants (aged >35 weeks\nand weighing >1500 g) was not associated with any adverse skin\nreactions.33 Indirect adult and pediatric data are coupled with\nrecent prospectively collected safety data for the term and late-\npreterm neonatal population.33\nRecommendation:Usechlorhexidine-basedskinpreparationtopre-\npare the surgical site in neonates and infants older than 35 weeks’\ngestation and weighing more than 1500 g.\nEvidence quality: High\nRecommendation strength: Strong\nPerioperative Ventilation\nNeonates are at higher risk of airway or pulmonary complications\nrelated to perioperative ventilation. Their small airways and fragile\nlungs are susceptible to airway stenoses and barotrauma. Appro-\npriate monitoring including capnography and tidal volumes are re-\nquired to deliver lung-protective ventilation strategies.34-36\nDespite these practices being widespread, there are relatively few\nprimary sources of high-quality evidence, and thus, this is a weak\nrecommendation.\nRecommendation: Use a lung-protective strategy (eg, 4-8 mL/kg,\nnot greater than 10 mL/kg and positive end-expiratory pressure\nof approximately 5 cm H2O). Ensure tidal volumes are measured\nintraoperatively and monitor carbon dioxide levels.\nEvidence quality: Low\nRecommendation strength: Weak\nThe risks of unplanned extubation and consequent reintuba-\ntion can be high.37 The use of cuffed endotracheal tubes (ETTs) re-\nmainscontroversialinneonates.38,39Anonblindedrandomizedclini-\ncal trial (RCT) comparing cuffed and uncuffed ETTs in the NICU\ndemonstrated fewer reintubations to optimize ETT size and fewer\nepisodes of atelectasis with a cuffed tube with no difference in\npostextubation complications or subglottic stenosis.40 In a select\ngroup of neonatal patients, the use of a laryngeal mask can be con-\nsideredduetoeaseofuse,fewerhemodynamicchangeswhilecap-\nturing the airway, and minimal postoperative complications.41-43\nRecommendation:Considertheuseofcuffedtrachealtubesforap-\npropriately sized neonates to optimize ventilation and decrease the\nrisk of reintubation. Consider the use of laryngeal masks for appro-\npriatelysizedinfantsforuncomplicatedprocedureswheretheanes-\nthesiapractitionerhasaccesstotheairwayincaseofneedtorescue.\nEvidence quality: Low\nClinical Review & Education Special Communication\nERAS Society Recommendations for Neonatal Perioperative Care\n1074\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n(Reprinted)\njamasurgery.com\n© 2024 American Medical Association. All rights reserved.\nDownloaded from jamanetwork.com by Universidade de Lisboa user on 11/24/2025\n\nRecommendation strength: Weak\nEarly extubation has been associated with decreased morbid-\nity and shorter ICU and hospital lengths of stay.44 In neonates who\nwere intubated for noncardiac surgery, those who were extubated\nearly (within 24 hours of surgery) had lower adverse respiratory\nevents and a shorter length of stay.45 However, in 1 study,46 the\nextubation of neonates in the recovery room was associated with\nhigheradverserespiratoryevents.Aweakrecommendationismade\nto encourage neonatal units to develop protocols to facilitate early\nextubationwhenfeasiblegiventhevariablefactorsthatimpactrisks\nof reintubation (eg, recent esophageal anastomosis, need for posi-\ntive pressure, etc).\nRecommendation:Aimforearlypostoperativeextubationassoon\nas feasible, considering gestational age, risk for respiratory failure,\nand type of surgery.\nEvidence quality: Moderate\nRecommendation strength: Weak\nFluid Management\nNeonates require careful titration of intravenous fluid intake par-\nticularly in the first few days of life.47 There are pediatric guidelines\nfor intraoperative fluid administration, but guidelines for neonates\ndonotyetexist.48Fluidchoiceshouldbedrivenbytheinfant’spre-\noperative fluid status, intraoperative stress and volume loss, and\nurine output with a target of euvolemia and the avoidance of\nhyponatremia. Hypotonic solutions must be used with caution as\nthey may contribute to hyponatremia in neonates.49 This is a weak\nrecommendation as there is relative paucity of primary evidence\nprimarily from small, single-site studies, and specific fluid resusci-\ntation regimens cannot be recommended.\nRecommendation: Titrate perioperative fluids to maintain tissue\nperfusion and prevent hypovolemia, fluid overload, and hypo-\nnatremia.\nEvidence quality: Moderate\nRecommendation strength: Weak\nPerioperative Glucose Control\nNeonates require a continuous supply of glucose to support brain\ndevelopment and are susceptible to neurodevelopmental se-\nquelae with prolonged hypoglycemia. Perioperative euglycemia\nis the target for neonates who are susceptible to complications of\nbothhypoglycemiaandhyperglycemiaforwhichintraoperativeand\npostoperative monitoring is recommended.50 Tight glycemic con-\ntrol with an insulin infusion was associated with a higher risk of\ninfection in infants younger than 60 days in a post hoc analysis of\nchildren undergoing cardiac surgery51 and was not shown to affect\nneurodevelopmentaloutcomes.52Overall,theevidenceforthisrec-\nommendation came from small, single-site studies including RCTs\nfocused on specific aspects of glucose management (ie, tight vs\nlenient glycemic control).\nRecommendation: Ensure adequate perioperative glucose intake\nto avoid hypoglycemia, which can be associated with adverse out-\ncomes; tight glucose control with insulin infusions is not routinely\nrecommended.\nEvidence quality: Low\nRecommendation strength: Weak\nTransfusion Thresholds\nBoth anemia and blood product transfusion have potential detri-\nmental effects on neonates, and a careful balance is required to\nguide transfusion practices.53 Anemia and thrombocytopenia\nin neonates are common, and the majority of preterm infants\nwill receive at least 1 blood transfusion while admitted to the\nNICU.54 The Canadian Pediatric Society Position article55 includes\npostnatal age and the need for respiratory support when deter-\nmining thresholds. Most advocate for conservative transfusion\nthresholds given the lack of any difference in large RCTs between\nrestrictive and liberal transfusion regimes in neonates.56-58\nIn order to create consistency in the NICU, an institution-specific\nguideline is recommended to promote consistency in transfusion\nparameters that take into account relevant clinical variables.\nRecommendation: Restrict transfusions to maintain a hemoglo-\nbin level greater than 90 g/L (to convert to grams per deciliter,\ndivideby10)foratermneonatewithnooxygenrequirements.Term\nneonates within the first week of life, those who are intubated, or\nthose with an oxygen requirement should be transfused to main-\ntain a hemoglobin level greater than 110 g/L.\nEvidence quality: Low\nRecommendation strength: Weak\nRecommendation:Usewrittentransfusionguidelinesthattakeinto\naccountthetargethemoglobinthresholdandcoagulationprofileas\nwell as the clinical status of the neonate and local practice.\nEvidence quality: Low\nRecommendation strength: Weak\nEnteral Feeds\nBreast milk is the first-choice enteral feed for preterm and term\ninfants in the NICU who do not have a contraindication for enteral\nfeeds.59 The evidence for this recommendation comes from high-\nquality studies, including a multisite RCT. For term infants, breast\nmilk has been shown to reduce severe diarrhea, acute otitis media,\nlower respiratory tract infections, and obesity.60 In preterm infants,\nthere is a reduction in necrotizing enterocolitis, late-onset sepsis,\nchronic lung disease, retinopathy of prematurity, and improved\nneurodevelopmental outcomes.61 Postoperative patients, includ-\ning patients with gastrointestinal tract anomalies such as gastros-\nchisis, may have an earlier resumption of enteral autonomy when\ngiven breast milk exclusively.62 Mechanisms already in place\nwith the NICU can be applied to surgical neonates across\nthe unit.59,60\nRecommendation: Use breast milk as first choice for enteral\nnutrition.\nEvidence quality: High\nRecommendation strength: Strong\nEarlyenteralfeedingissupportedandcanreducelengthofstay\nandinfectiouscomplicationsinappropriatepatients.63-65Giventhe\nwide variability in patients included within this guideline, no spe-\ncific recommendation regarding timing of postoperative feeds is\nmade.Thereisevidencefromsmall,single-sitestudiestosupporta\nstructured feeding protocol postoperatively to reduce time to en-\nteral autonomy and reduce incidence of intestinal failure–\nassociated liver disease.66-68 Feeding protocols standardize readi-\nnesscriteriaforintroductionoftrophicfeedsandprovidestructured\nERAS Society Recommendations for Neonatal Perioperative Care\nSpecial Communication Clinical Review & Education\njamasurgery.com\n(Reprinted)\nJAMA Surgery\nSeptember 2024\nVolume 159, Number 9\n1075\n© 2024 American Medical Association. All rights reserved.\nDownloaded from jamanetwork.com by Universidade de Lisboa user on 11/24/2025\n\ncriteriaforadvancementtowardfullenteralfeedstominimizeprac-\ntitioner variability. Unit-based guidelines to standardize the intro-\nductionandadvancementoffeedsarerecommendedtoreduceboth\nthedurationofparenteralnutritionandcentrallineusebyreaching\ngoal enteral feeds more quickly.\nRecommendation: Use postoperative feeding protocols to pro-\nmote early enteral feed introduction and advancement.\nEvidence quality: Low\nRecommendation strength: Weak\nParental Hands-On Care\nParents and other identified caregivers should be considered inte-\ngral members of their infant’s care team rather than merely visi-\ntors to the NICU.69 Family-centered care has been associated with\nimproved weight gain, decreased length of stay, and decreased\nreadmission rates in multiple well-designed studies.70 Parental\ninvolvement is often already integrated within many neonatal\nunits: benefit has been shown by involving parents in delivering\ndevelopmentally appropriate sensory stimulation,71 participating\nin Beads of Courage memory making,72 and engaging in family-\nintegrated care.73 Parents of neonates and infants who have\nundergone surgery require additional coaching to help them com-\nfortably participate in their child’s care. Early hands-on practice\nwith skills such as nasogastric tube feeds, dressing changes, and\nmanagement of colostomies are necessary to develop a readiness\nto leave the NICU.74 Parental discharge teaching can be associated\nwith a reduction in health care utilization,75 and discharge simula-\ntions can increase parental preparedness.76 Each of these inter-\nventions can be adapted to the perioperative recovery and are\nideally implemented unit-wide, thus, a strong recommendation is\nmade to involve parents early.\nRecommendation: Facilitate hands-on care and purposeful prac-\ntice by parents that is individualized to meet the unique needs of\nparentsandinfantsearlyduringtheadmission.Buildparentalknowl-\nedge, skills, and confidence to take on a leading role and facilitate\ncaregiver readiness for safe transition or discharge from the NICU.\nEvidence quality: High\nRecommendation strength: Strong\n\nDiscussion\nAlthough the GDC considered 21 potential topic areas, evidence-\nbased recommendations could only be supported in 11 of these\nareas at the current time. Eight of the resultant 16 recommenda-\ntions are supported by low-quality evidence. Rather than exclude\nthese topics while waiting for stronger evidence, the GDC felt it was\nnecessary to include these weak recommendations to highlight\nareas in need of further audit and research. Surgical neonates are\nan understudied population. Neonatal surgical units are encour-\naged to develop implementation and audit tools to measure out-\ncomes and contribute to stronger recommendations. Working\ngroups were developed to explore the use of Foley catheters, naso-\ngastric tubes, and central lines as they were felt to be relevant top-\nics for ERAS protocol development; however, there were insuffi-\ncient data to support any recommendation for or against their use.\nThe GDC felt that it was important to highlight these areas in the\nhope that future iterations of this guideline will be able to draw on\nnew primary data concerning these topic areas that would be help-\nful additions to a neonatal ERAS protocol. Patient characteristics\nincluding patient sex were not considered in the recommendations\ndue to the lack of rigorous evidence and are worthy of attention in\nfuture studies.\n\nConclusions\nERAS guidelines have historically been designed for the care of pa-\ntientsundergoingspecificsurgicalprocedures(eg,pancreaticoduo-\ndenectomy) or related procedures (eg, colorectal resections). This\nnew guideline provides recommendations based on the best avail-\nable evidence for the perioperative care of neonates undergoing a\nvariety of noncardiac surgical procedures. It is designed for unit-\nwide implementation to reduce variability in care, enhanced evi-\ndence-based practice, while allowing clinicians to modify and se-\nlect the appropriate recommendations as appropriate. It is hoped\nthat by implementing ERAS on a unit-wide level, more infants can\nbenefit from the principles of enhanced recovery after surgery\nwithout waiting for specific procedure-based guidelines.\nARTICLE INFORMATION\nAccepted for Publication: April 27, 2024.\nPublished Online: July 31, 2024.\ndoi:10.1001/jamasurg.2024.2044\nAuthor Affiliations: Division of General and\nThoracic Surgery, The Hospital for Sick Children,\nDepartment of Surgery, University of Toronto,\nToronto, Ontario, Canada (Pilkington, Chiu, de Silva,\nFecteau); Ariadne Labs, Brigham and Women’s\nHospital, Harv
