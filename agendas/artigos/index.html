n in children: lessons learned from a 10-year experience \nplacing more than 1000 catheters. J Burn Care Res 2006 Sep-Oct;27(5): \n713—8. \nhttps://doi.org/10.1097/01.BCR.0000238087.12064.E0. \nPMID: \n16998405.\n[10] Munck A, Malbezin S, Bloch J, Gerardin M, Lebourgeois M, Derelle J, et al.\nFollow-up of 452 totally implantable vascular devices in cystic fibrosis pa-\ntients. Eur Respir J 2004 Mar;23(3):430—4. https://doi.org/10.1183/ \n09031936.04.00052504. PMID: 15065834.\n[11] Esfahani H, Ghorbanpor M, Tanasan A. Implantable port devices, complica-\ntions and outcome in pediatric cancer, a retrospective study. Iran J Ped \nHematol Oncol 2016;6(1):1—8. Epub 2016 Mar 15. PMID: 27222696; PMCID: \nPMC4867165.\n[12] Loh AH, Chui CH. Port-A-Cath insertions in acute leukaemia and childhood \nmalignancies. Asian J Surg 2007 Jul;30(3):193—9. https://doi.org/10.1016/ \nS1015-9584(08)60022-6. PMID: 17638639.\n[13] Schwarz RE, Groeger JS, Coit DG. Subcutaneously implanted central venous \naccess devices in cancer patients: a prospective analysis. Cancer 1997 Apr \n15;79(8):1635—40. PMID: 9118051.\n[14] Fu AB, Hodgman EI, Burkhalter LS, Renkes R, Slone T, Alder AC. Long-term \ncentral venous access in a pediatric leukemia population. J Surg Res 2016 \nOct;205(2):419—25. https://doi.org/10.1016/j.jss.2016.06.052. Epub 2016 Jun \n24. PMID: 27664891.\n[15] Rothenberg KA, Gologorsky RC, Kim S. Dermal securement of port catheters \nin obese patients. J Pediatr Surg 2020 Mar;55(3):570—2. https://doi.org/ \n10.1016/j.jpedsurg.2019.09.013. Epub 2019 Nov 1. PMID: 31727382.\n[16] Busti AJ, Hooper JS, Amaya CJ, Kazi S. Effects of perioperative antiin-\nflammatory and immunomodulating therapy on surgical wound healing. \nPharmacotherapy 2005 Nov;25(11):1566—91. https://doi.org/10.1592/ \nphco.2005.25.11.1566. PMID: 16232020.\n[17] Kılıç S, Soyer T, Karnak _I, Çiftçi A €O, Tanyel FC, S¸ enocak ME. Evaluation of the\nremoval reasons of totally implantable venous devices in children: a retro-\nspective study. Turk J Pediatr 2016;58(2):187—94. https://doi.org/10.24953/ \nturkjped.2016.02.010. PMID: 27976560.\nL. Mayon, Y.-J. Chiang, A. Lee et al. / Journal of Pediatric Surgery 61 (2026) 163138 \n5"}, {"message_id": "1871083070218576317", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f76c2391a021bd", "sender_name": "Humberto Bia Lima Forte", "sender_email": "humbertoblforte@gmail.com", "sender_is_owner": false, "date": "2026-07-18T16:44:13", "subject": "Re: Acesso via subclavia", "original_title": "Re: Acesso via subclavia", "smart_title": "Pedido de acesso ao artigo (grupo Uroped) — sem PDF anexado", "email_summary": "Humberto Bia Lima Forte responde à discussão iniciada por Lisieux sobre o estudo do acesso subclávio, perguntando se ela tem o artigo em PDF porque não conseguiu aceder a ele — mensagem curta, sem conteúdo científico próprio além do pedido.", "abstract_text": "", "bullets_summary": "", "long_summary": "", "full_text_formatted": ""}, {"message_id": "1871075922179283298", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f765a349485962", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-18T14:50:34", "subject": "Acesso via subclavia", "original_title": "Acesso via subclavia", "smart_title": "Comentário de grupo (Uroped) sobre vieses de um estudo — sem PDF anexado", "email_summary": "Lisieux comenta, no grupo Uroped, os possíveis vieses do estudo sobre acesso venoso subclávio (o mesmo artigo enviado no e-mail seguinte, com o PDF): predominância de tumor sólido (~2/3 da amostra), tendência a mais adolescentes (~45%), maioria absoluta de dispositivos tipo \"port\", e critérios determinados por protocolo institucional. Destaca como particularmente chamativa a taxa muito menor de trombose observada no grupo subclávio.", "abstract_text": "", "bullets_summary": "Comentário crítico prévio de Lisieux sobre o estudo de Mayon et al. (acesso subclávio sem ecoguiagem), antes de o PDF completo circular no grupo\nVieses apontados: predominância de tumor sólido (~2/3 da coorte), tendência a mais adolescentes (~45%), maioria absoluta de dispositivos tipo \"port\" (não cateteres tunelizados/não-tunelizados)\nOs critérios de seleção de via de acesso foram determinados por protocolo institucional, não aleatorizados\nAchado que mais impressionou Lisieux: a taxa de trombose marcadamente menor no grupo de acesso subclávio comparado à via jugular interna", "long_summary": "Este e-mail antecede a circulação do PDF completo do estudo de Mayon et al. sobre acesso venoso subclávio sem ecoguiagem (ver síntese completa nesse outro cartão, mesmo assunto, PDF anexado um dia depois). Aqui, Lisieux Eyer de Jesus partilha uma leitura crítica rápida e pessoal dos possíveis vieses da amostra, antes de qualquer discussão mais aprofundada:\n\nPrimeiro, a predominância de tumores sólidos (cerca de dois terços da coorte) pode limitar a generalização dos resultados para populações com maior proporção de doenças hematológicas, onde os padrões de uso e duração do cateter podem diferir. Segundo, a tendência a uma proporção elevada de adolescentes (~45%) na amostra pode favorecer resultados mais favoráveis do que se observaria numa população pediátrica mais jovem, dado que fatores anatómicos (calibre vascular, tecido subcutâneo) mudam com a idade. Terceiro, a maioria absoluta dos dispositivos era do tipo \"port\" (implantável, tunelizado) em vez de cateteres percutâneos de curta duração — o que também pode influenciar as taxas de complicação reportadas, já que ports tunelizados tendem a ter perfis de risco infeccioso diferentes de cateteres não-tunelizados. Por fim, nota que os critérios de escolha de via de acesso foram determinados por protocolo institucional (não por randomização), reforçando que a comparação entre vias é observacional, não um ensaio controlado.\n\nApesar destas ressalvas metodológicas, Lisieux destaca como o achado que mais lhe chamou a atenção a taxa \"extremamente menor\" de trombose no grupo de acesso subclávio comparado à via jugular interna — precisamente o resultado central que viria a ser confirmado, com números, no PDF completo do estudo (trombose de cateter 8,9% na via subclávia vs. 16,8% na via jugular interna).", "full_text_formatted": ""}, {"message_id": "1871075898912113810", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f7659dde738492", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-18T14:49:59", "subject": "Revisão muito boa", "original_title": "The influence of perioperative factors on primary severe hypospadias repair", "smart_title": "Revisão sistemática — fatores perioperatórios na hipospádia severa primária · University Hospital of Padova / Hôpital Robert Debré, Paris, 2011", "email_summary": "Lisieux partilhou este artigo no grupo Uroped, elogiando-o apenas com o assunto \"Revisão muito boa\" — sem comentário adicional no corpo do e-mail.", "abstract_text": "| Hypospadias is one of the most common congenital malformations of the male genitalia. \nSevere cases present with associated curvature greater than 30° and the meatus opening proximally to \nthe penoscrotal junction. The perioperative management of patients with primary severe hypospadias is \nvariable. Systematic evaluation of the upper urinary tract and the search for enlarged prostatic utricles seem \nunnecessary in patients with isolated primary severe hypospadias, and should be limited to severe cases \nwith associated extraurinary malformations. Detection of a disorder of sex development is key for gender \nassignment and prognosis, but the identification of cases warranting a full work-up and the influence of such a \ndiagnosis on the success of hypospadias repair is controversial. Preoperative hormonal stimulation allows for \npenile growth irrespective of the administration route. Associated morbidity is minimal, but its influence on the \nsuccess of surgery is still unknown. An age of 6–18 months is generally recommended for surgery, but no trial \ndata support this policy. Second-layer coverage of the urethroplasty and postoperative urinary drainage seem \nto reduce the complications of surgery, whereas postoperative antibiotic prophylaxis and type of dressing \nhave minimal impact on surgical success. Overall, most interventions are based on weak evidence, and their \ninfluence on the outcomes of repair is ill-defined. Clinicians should be made aware of the evidence supporting \nany single intervention in order to standardize their management policies. We hope the issues outlined here \nwill prompt researchers to design new studies to address the clinically relevant questions.\nCastagnetti, M. & El-Ghoneimi, A. Nat. Rev. Urol. 8, 198–206 (2011);", "bullets_summary": "Revisão sistemática (Castagnetti & El-Ghoneimi, Nature Reviews Urology 2011) sobre o manejo perioperatório da hipospádia severa primária, baseada em 52 séries cirúrgicas identificadas\nAvaliação pré-operatória de vias urinárias altas e utrículo prostático aumentado parece desnecessária em hipospádia isolada — deve limitar-se a casos com malformações extra-urinárias associadas\nDiagnóstico de distúrbio do desenvolvimento sexual (DSD) é fundamental para atribuição de género, mas critérios de rastreio e influência no sucesso cirúrgico permanecem controversos (só 15% dos casos DSD têm cariótipo anormal)\nEstimulação hormonal pré-operatória (testosterona ou hCG) aumenta o pénis e a glande de forma consistente, com morbidade mínima, mas a sua influência na cicatrização e no sucesso cirúrgico continua por esclarecer\nIdade recomendada para cirurgia: 6-18 meses (opinião de peritos, sem dados de ensaios controlados que a sustentem diretamente para hipospádia severa)\nCobertura em segunda camada da uretroplastia e drenagem urinária pós-operatória reduzem complicações; profilaxia antibiótica pós-operatória e tipo de penso têm impacto mínimo no sucesso cirúrgico", "long_summary": "Esta revisão sistemática de Marco Castagnetti (Universidade de Pádua) e Alaa El-Ghoneimi (Hôpital Robert Debré, Paris), publicada na Nature Reviews Urology em 2011, complementa uma revisão anterior dos mesmos autores sobre técnicas cirúrgicas de hipospádia severa primária, focando-se desta vez nos fatores perioperatórios (não cirúrgicos) que podem influenciar o resultado — usando as mesmas 52 séries cirúrgicas identificadas previamente.\n\nSobre o trabalho diagnóstico pré-operatório, os autores notam que apenas 5 das 52 séries mencionam sequer um protocolo de investigação, refletindo o consenso geral de que, em hipospádia severa isolada, o exame físico basta. Três investigações específicas são discutidas: anomalias das vias urinárias altas (raras e geralmente assintomáticas — rastreio ecográfico sistemático parece desnecessário, exceto se houver malformações extra-urinárias associadas); utrículo prostático aumentado (prevalência de 20-30%, geralmente também assintomático, com poucos casos documentados de infeção urinária por drenagem inadequada); e distúrbios do desenvolvimento sexual (DSD) — aqui o problema é mais complexo, porque não há consenso sobre que características clínicas devem levantar suspeita (posição meatal proximal e criptorquidia bilateral são fatores de risco segundo alguns autores, mas outros discordam), e o cariótipo isolado só explica cerca de 15% dos diagnósticos de DSD, exigindo abordagem multidisciplinar mais completa.\n\nA secção sobre estimulação hormonal pré-operatória é particularmente detalhada: tanto testosterona (tópica ou parentérica) como gonadotrofina coriónica humana (hCG) produzem aumento consistente do comprimento peniano e circunferência glandular (documentado em várias séries, com ganhos de 18% a 77% dependendo do protocolo), com efeitos adversos mínimos (alterações comportamentais, ereções aumentadas, pigmentação cutânea) e sem impacto conhecido no crescimento linear ou idade óssea. O efeito é considerado temporário (há redução de 10-17% do comprimento ganho, meses após o tratamento), pelo que a estimulação deve ser feita próxima da cirurgia — mas com pelo menos 2-3 semanas de intervalo antes da operação, devido ao potencial efeito angiogénico aumentar o risco de sangramento intraoperatório. A questão em aberto, que os autores destacam repetidamente, é se a estimulação hormonal poderia prejudicar a cicatrização: um estudo retrospetivo sugeriu maior taxa de complicações com estimulação recente (<3 meses antes da cirurgia), mas um ensaio prospetivo randomizado mostrou o oposto (menos complicações com estimulação), pelo que a questão permanece por resolver.\n\nQuanto à idade cirúrgica, a recomendação de 6-18 meses (da Academia Americana de Pediatria) é baseada em opinião de peritos, não em dados de ensaios — mas é consistentemente citada como benéfica por reduzir o impacto psicológico (cirurgia antes da fase genital do desenvolvimento) e facilitar cuidados pós-operatórios (uso de dupla fralda). Dados de satisfação de doentes sugerem vantagem em operar antes dos 2 anos, mas os estudos disponíveis quase não incluem casos de hipospádia severa especificamente, limitando a extrapolação.\n\nSobre fatores intraoperatórios e pós-operatórios, a evidência é mais consistente: cobertura em segunda camada da uretroplastia (tecido subcutâneo, vaginal ou escrotal) reduz claramente as taxas de fístula e complicação global em múltiplos estudos comparativos (ex.: fístula 4,5% vs. 63% num estudo, 15% vs. 41% noutro); drenagem urinária pós-operatória (cateter transuretral, geralmente 7-14 dias) parece necessária, embora o tipo exato (transuretral vs. suprapúbico) e a duração não pareçam alterar significativamente as taxas de complicação nos dois estudos caso-controlo disponíveis. Já a profilaxia antibiótica pós-operatória e o tipo de penso (compressivo vs. adesivo vs. nenhum) parecem ter impacto mínimo no sucesso cirúrgico, embora a profilaxia antibiótica possa reduzir infeções urinárias enquanto o cateter estiver colocado.\n\nOs autores concluem, de forma auto-crítica, que a maioria destas práticas assenta em evidência fraca (séries observacionais pequenas), e apelam a estudos colaborativos, multicêntricos e prospetivos — reconhecendo que a raridade da hipospádia severa primária, mesmo em serviços de referência, torna estudos randomizados difíceis de realizar isoladamente por centro.", "full_text_formatted": "198  |  APRIL 2011  |  VOLUME 8\b\nwww.nature.com/nrurol\nSection of Pediatric \nUrology, Urology Unit, \nDepartment of \nOncological and \nSurgical Sciences, \nUniversity Hospital of \nPadova, Monoblocco \nOspedaliero, Via \nGiustiniani 2, 35128 \nPadua, Italy \n(M. Castagnetti). \nDepartment of Pediatric \nSurgery and Urology, \nHôpital Robert Debré, \nAssistance Publique-\nHopitaux de Paris, \nUniversity of Paris VII, \nRené Diderot, 48 \nBoulevard Serurier, \n75019 Paris, France \n(A. El-Ghoneimi).\nCorrespondence to:\nM. Castagnetti \nmarcocastagnetti@\nhotmail.com\nThe influence of perioperative factors \non primary severe hypospadias repair\nMarco Castagnetti and Alaa El-Ghoneimi\nAbstract | Hypospadias is one of the most common congenital malformations of the male genitalia. \nSevere cases present with associated curvature greater than 30° and the meatus opening proximally to \nthe penoscrotal junction. The perioperative management of patients with primary severe hypospadias is \nvariable. Systematic evaluation of the upper urinary tract and the search for enlarged prostatic utricles seem \nunnecessary in patients with isolated primary severe hypospadias, and should be limited to severe cases \nwith associated extraurinary malformations. Detection of a disorder of sex development is key for gender \nassignment and prognosis, but the identification of cases warranting a full work-up and the influence of such a \ndiagnosis on the success of hypospadias repair is controversial. Preoperative hormonal stimulation allows for \npenile growth irrespective of the administration route. Associated morbidity is minimal, but its influence on the \nsuccess of surgery is still unknown. An age of 6–18 months is generally recommended for surgery, but no trial \ndata support this policy. Second-layer coverage of the urethroplasty and postoperative urinary drainage seem \nto reduce the complications of surgery, whereas postoperative antibiotic prophylaxis and type of dressing \nhave minimal impact on surgical success. Overall, most interventions are based on weak evidence, and their \ninfluence on the outcomes of repair is ill-defined. Clinicians should be made aware of the evidence supporting \nany single intervention in order to standardize their management policies. We hope the issues outlined here \nwill prompt researchers to design new studies to address the clinically relevant questions.\nCastagnetti, M. & El-Ghoneimi, A. Nat. Rev. Urol. 8, 198–206 (2011); doi:10.1038/nrurol.2011.24\n\nIntroduction\nHypospadias is one of the most common congenital \nmalformations of the male genitalia.1 The condition is \na spectrum, and severity principally depends on two \nvariables: meatal location and degree of associated \npenile curvature.1 Mild cases present with no or minor \ncurva­ture (less than 30°) and the meatus opening distally \nto the midshaft. Severe cases, on the other hand, have \nassociated curvature greater than 30° and the meatus \nusually opens proximally to the penoscrotal junction \n(Figure 1). Overall, primary severe hypospadiases rep­\nresent the minority of cases, but in contrast to the mild \ntype their management remains highly controversial. In a \nprevious review, we systematically assessed the differ­ent \nsurgical approaches for penile straightening and urethro­\nplasty in patients with primary severe hypo­spadias.2 \nAlthough these are certainly the two major steps of any \nrepair, a number of preoperative, intraoperative, and \npost­operative factors might also influence the outcome \nof surgery.\nIn this Review we aim to determine the common prac­\ntice regarding several aspects of the perioperative manage­\nment of primary severe hypospadias, using the 52 surgical \nseries we previously identified.2 We will discuss the poten­\ntial influence of various preoperative, intra­operative and \npostoperative variables on the final success of surgery. The \npossible advantages and drawbacks of each intervention, \nand their influence on surgical outcomes, were assessed \nby reviewing the available literature specific to each point. \nStudies including hypospadias cases other than severe \nwere considered in the absence of more-specific data on \nprimary severe hypospadias if it was felt they provided \nrelevant insight into clinical management.\nPreoperative factors\nDiagnostic work-up\nOnly 5 of the 52 series of surgical management of \nprimary severe hypospadias mention a preoperative \ndiagnostic work-up.3–7 Consistently, experts believe \nthat no evaluation other than physical examination \nis required for patients with isolated primary severe \nhypospadias.8 However, there are three investigations \nthat might be warranted: the detection of upper urinary \ntract malforma­tions associated with the hypo­spadias; the \ndetection of enlarged prostatic utricles; and the evalua­\ntion of a dis­order of sex development (DSD) underlying \nthe abnormal genital appearance.8\nUpper urinary tract anomalies\nUpper urinary tract malformations are generally reported \nto be rare in patients with hypospadias. Cerasaro et al.9 \ndetected such anomalies in only four of 233 boys with \nhypospadias who underwent either excretory urography \nor renal ultrasonography. They found that prevalence of \nCompeting interests\nThe authors declare no competing interests.\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\nNATURE REVIEWS | UROLOGY \nVOLUME 8  |  APRIL 2011  |  199\nupper urinary tract abnormalities was unrelated to the \nseverity of hypospadias.9 Davenport and MacKinnon10 \nsimilarly reported that three of 82 boys who underwent \nrenal ultrasonography had associated abnormalities in \ntheir upper urinary tracts. Two recent studies, however, \nhave reported a higher prevalence (18–25%) of upper \nurinary tract anomalies in patients with hypospadias, and \nobserved a correlation between the severity of hypo­spadias \nand the presence of such malformations.11,12\nNevertheless, the key question is whether such mal­\nformations are of clinical relevance and if their diag­\nnosis affects patient management. In fact, most such \nmalforma­tions seem to be asymptomatic and do not \nrequire treatment.9–12 Furthermore, Davenport and \nMacKinnon10 noted that two of their three cases with \nclinically signifi­cant upper urinary tract malformations \nwould have been fully investigated anyway owing to the \npresence of other clinical findings, such as anorectal \nmalformation. Prenatal ultrasonography screening is \nan increasingly accurate method of identifying upper \nurinary tract anomalies, limiting further the need for \npostnatal screening.13\nIn clinical practice, ultrasonographic assessment of \nthe upper urinary tract seems unwarranted in patients \nwith isolated primary severe hypospadias. Investigation \nshould be limited to severe cases that present with associ­\nated extraurinary malformations. Long-term series \nare necessary to determine the clinical significance of \nassoci­ated upper urinary tract anomalies in patients \nwith hypospadias.\nProstatic utricles\nProstatic utricles are rudimentary structures of the male \nurethra (Figure 2).14 They generally open into the pros­\ntatic urethra, but can also open into the bulbar urethra \ndistal to the external shpincter. The caudal portion \nis derived from Wolffian structures and the cranial \nportion from Mullerian structures.14 Experts’ opinions \nvary on the need to screen for enlarged prostatic utricles. \nSome surgeons do not recommend any screening at \nall, some recommend systematic radiological studies \nand intraoperative cystoscopy, and others recommend \nselective endoscopy in the presence of symptoms or diffi­\nculty in passing a catheter during surgery.8 If screening is \nconsidered appropriate, no agreement exists on the ideal \nscreening tool—ultrasonography, voiding cystourethro­\ngraphy, or cystoscopy. At some institutions MRI is con­\nsidered the standard (Figure 2). Kojima et al.15 noted \nformal urethro­graphy to be slightly more accurate \nthan ultrasonography when using cystoscopy as refer­\nence standard. However, the differences they observed \nbetween imaging modalities were limited to small utricles \nof questionable clinical relevance. \nThe prevalence of enlarged prostatic utricles in patients \nwith hypospadias is poorly known. Kojima et al.15 \nreported a prevalence of 45% in their cohort, and demon­\nstrated a correlation with the severity of hypo­spadias. \nOthers have reported a lower prevalence. Enlarged \nprostatic utricles were detected in: 16 of 39 (28%) \npatients with primary severe hypospadias undergoing \nKey points\n■■Systematic evaluation of the upper urinary tract and investigation for enlarged \nprostatic utricles seem unnecessary in patients with isolated primary severe \nhypospadias\n■■Diagnosis of a disorder of sex development is key, but the identification of \ncases warranting a full work-up and the influence of diagnosis on the success \nof surgery are controversial\n■■Preoperative hormonal stimulation allows for penile growth irrespective of the \nadministration route; associated morbidity is minimal, but its influence on \nthe success of surgery is still unknown\n■■An age of 6–18 months is generally recommended for surgery, but no trial data \nsupport this policy\n■■Second-layer coverage of the urethroplasty and postoperative urinary drainage \nseem to reduce the complications of surgery\n■■Postoperative antibiotic prophylaxis and type of dressing have minimal impact \non the success of surgery\nmasculinizing genitoplasty for a DSD;16 4 of 18 (22%) \npatients with penoscrotal, scrotal or perineal hypo­\nspadias under­going radiological and endoscopic assess­\nment;14 and in 4 of 19 (21%) individuals with proximal \nor penoscrotal hypospadias undergoing intra­operative \nendoscopic assessment.12 \nImportantly, the long-term outcomes and complica­\ntions of utricles that are left undrained are poorly known. \nChertin et al.16 reported that 2 of their 16 patients devel­\noped urinary tract infections owing to inadequate drain­\nage of the utricle. The prevalence of enlarged prostatic \nutricles in patients with primary severe hypospadias is \naround 20–30%. Enlarged utricles can cause problems, \nbut only on rare occasions. In clinical practice, systematic \nscreening seems unwarranted, but future research should \nFigure 1 | Primary severe hypospadias in a 12-month-old \nboy. The meatus (arrow) opens proximally between the two \nhalves of a bifid scrotum.\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\n200  |  APRIL 2011  |  VOLUME 8\b\nwww.nature.com/nrurol\nfocus on the long-term outcomes of enlarged utricles \nleft untreated.\nDisorders of sex development\nAccurate identification of a DSD is key for gender assign­\nment, to plan the appropriate surgical strategy (gonad­\nectomy, gonadal biopsy, or preputial biopsy), and to \ncounsel parents about prognosis.17 Therefore, it is surpris­\ning that only three series of primary severe hypo­spadias \nrepair mention preoperative work-up to identify a DSD, \nsuch as karyotype analysis or hormonal studies.4,5,7\nA key problem in this area is the lack of agreement on \nthe clinical features that should make clinicians suspi­\ncious of an underlying DSD in a patient with primary \nsevere hypospadias. Kaefer et al.18 suggest that proxi­\nmal meatal location and cryptorchidism (unilateral \nor bilateral) are risk factors for a DSD, as 70% of their \npatients with both these features were diagnosed with a \nDSD. Other evidence, however, contrasts with this sug­\ngestion (Table 1). McAleer and Kaplan,19 in particular, \ndiagnosed a DSD in only four of 29 (14%) patients with \nsevere hypospadias, and all four boys had palpable testes. \nEven genital ambiguity, as assessed by a staff pediatric \nurologist, seemed not to be a predictor of DSD.19\nNo standard diagnostic pathway for DSD exists \nat present. A correct diagnosis is not only a matter of \nkaryo­typing, as was initially suggested by Kaefer et al.18 \nwho reported a 71% prevalence of sex chromosome \nabnormali­ties on karyotyping patients with DSD. In \nfact, chromosomal abnormalities only account for some \n15% of the diagnoses.19,20 Consistently, international \nguidelines emphasize the need for a multidisciplinary \napproach and a work-up including ultrasonographic \nassessment of abdominal and pelvic organs, internal \nduct structures and gonads, full hormonal work-up, \nkaryotype, and molecular genetic studies.17 However, two \nrecent series of patients with ambiguous genitalia under­\ngoing masculinizing genitoplasty report that 30–40% of \ncases are considered idiopathic according to current \ndiagnostic standards.15,21\nRegarding the prognostic relevance of a diagnosis of \nDSD and its influence on the success of hypospadias repair, \nwe could identify only a few series. Hypospadias repair is \ncommonly reported to be fraught with a fairly high \ncomplication rate in patients with a DSD. Sircili et al.21 \nreported a 50% fistula rate, and a 22% stricture rate. \nChertin et al.16 and Gupta et al.22 both reported second \nsurgery rates above 40%. Nevertheless, such poor results \nare probably owing to anatomical considerations (includ­\ning the small size of the penis, proximal meatal location, \nand severe associated curvature) rather than the diag­\nnosis of DSD per se. Regarding long-term functional out­\ncomes, the reduced length of the phallus is a common \ncause of patient concern and dissatisfaction. Sircili et al.21 \nreported that patients with DSD owing to 5α-reductase \ndeficiency have a final mean penile length statistically \nshorter than patients with testosterone production \ndefects or undetermined DSD, although the diagnosis \nhas no influence on the degree of penile length gain after \ntreatment. However, it is noteworthy that the final satis­\nfaction level and sexual life of such patients seems to be \nlargely unrelated to penis length.21\nAlthough the importance of a correct diagnosis of \nDSD is not questioned, no strict recommendations \ncan be made at present regarding the criteria to select \npatients warranting a complete work-up. Furthermore, \nno standard work-up exists. The diagnosis of DSD, \nhowever, seems to have a limited influence on the success \nof surgical repair. Further research on all these aspects \nis paramount.\nHormonal stimulation\nThe enlarging effect of preoperative hormonal stimula­\ntion is generally considered to make urethroplasty \neasier. The effect on the glans is particularly useful to \nprevent glans dehiscence, a complication otherwise quite \ncommon in patients with a small glans. Only 17 of the \n52 identified series of primary severe hypospadias repair \nreported the authors’ policy regarding preoperative \nhormone administration—hormonal stimulation was not \nused at all in two studies,23,24 systematically administered \nto all patients in four studies,4,25–27 and used selectively \naccording to subjective evaluation of each patient in \nthe remaining 11 studies.3,7,28–36 Furthermore, a number \nof series specifically focused on the role of hormonal \nstimula­tion in patients with primary severe hypospadias, \nnamely the effects on the penis and/or on the outcomes \nof the repair.37–43\nHormonal stimulation can be performed with either \nhuman chorionic gonadotropin or testosterone. The \nlatter can be administered topically, with a cream, or \nparenterally by intramuscular injection. Administration \nprotocols vary (Table 2). Topical administra­tion is gener­\nally considered to avoid systemic effects and to allow for \n*\nFigure 2 | Enlarged prostatic utricle. MRI of a 6‑month-old \nboy with posterior hypospadias (arrow) and severe \ncurvature reveals a persistant enlarged prostatic utricle \n(*), 39 mm in length.\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\nNATURE REVIEWS | UROLOGY \nVOLUME 8  |  APRIL 2011  |  201\nTable 1 | Preoperative work-up for DSD in patients with severe hypospadias\nStudy\nn\nAbnormal \nkaryotype, n (%)\nSex chromosome \nabnormalities, n (%)\nDiagnosis in patients with sex \nchromosome abnormalities\nOther identified causes of DSD\nPatients with severe hypospadias and cryptorchydism\nKaefer et al. (1999)18\n33\n15 (45)\n15 (45)\n9 mixed gonadal dysgenesis\n4 ovotesticular DSD\n2 Klinefelter’s syndrome\n2 5αR deficiency\n1 bilateral vanishing testes\n3 incomplete testicular feminization\nMcAleer and Kaplan \n(2001)19\n29\n4 (14)\n2 (7)\n1 mixed gonadal dysgenesis\n1 ovotesticular DSD\n2 testicular dysgenesis\nCox et al. (2008)20\n19\n6 (32)\n3 (16)\n3 mixed gonadal dysgenesis\nNR\nPatients undergoing masculinizing genitoplasty for DSD\nChertin et al. (2005)16\n39\n4 (10)\n4 (10)\n2 mixed gonadal dysgenesis\n1 ovotesticular DSD\n1 Klinefelter’s syndrome\n8 5αR deficiency\n8 17β-HSD deficiency\n2 3β-HSD2 deficiency\n1 partial androgen insensitivity syndrome\nSircili et al. (2010)21\n59\n15 (25)\n15 (25)\n8 mixed gonadal dysgenesis\n4 ovotesticular DSD\n3 congenital adrenal hyperplasia\n10 5αR deficiency\n6 partial androgen insensitivity syndrome\n4 testicular dysgenesis\n3 17β-HSD deficiency\n1 3β-HSD deficiency\n1 Frasier syndrome\nAbbreviations: 5αR, 5‑α-reductase; DSD, disorder of sex development; HSD, hydroxysteroid dehydrogenase; NR, not reported.\nbetter parental compli­ance,40,41 but there is no evidence \nto demon­strate a parental preference for one route of \nadministration over another. However, Chalapathi et al.40 \nobserved a greater variability in serum testosterone levels \nin patients receiving topical testosterone cream than those \nwho underwent parenteral administration, suggesting that \nparenteral administration might be more consistent.\nAdverse effects of preoperative hormonal stimulation \nare reportedly minimal irrespective of the administra­\ntion protocol.37–43 Behavioral changes, increased erec­\ntions, skin pigmentation, and appearance of pubic hair \nare rare. Hormonal stimulation does not appear to affect \nlinear growth or bone age. The angiogenic effect of hor­\nmones might increase the risk of intraoperative bleeding, \nTable 2 | Preoperative hormone stimulation and its effect on penile size\nStudy\nn\nHormone\nRoute of \nadministration\nDosage \nProtocol\nMean \nincrease in \npenis length \n(mm)\n% \nincrease\nMean increase \nin glanular \ncircumference \n(mm)\n% \nincrease\nSakakibara \net al. (1991)37\n15\nTestosterone\nTopical cream\nNR\nDaily for 3 weeks\nNR\nNR\nNR\nNR\nKoff and \nJayanthi \n(1999)38\n12\nHuman chorionic \ngonadotropin\nParenteral\n250 IU \n(<1 year)\n500 IU \n(1–5 years)\nTwice weekly for \n5 weeks starting \n6–8 weeks before \nsurgery\n133\n77\nNR\nNR\nLuo et al. \n(2003)39\n25\nTestosterone \nenanthate\nParenteral\n25 mg\nMonthly for 3 months \nbefore surgery\n40\n20\n104\n38\nIshii et al. \n(2010)42\n17\nTestosterone \nenanthate\nParenteral\n25 mg\nMonthly up to 3 \ntimes\n101\nNR\nNR\nNR\nChalapathi \net al. (2003)40\n13\nTestosterone \nenanthate oil\nTopical\nNR\nTwice a day for \n3 weeks before \nsurgery\n118\n59\nNR\nNR\nChalapathi \net al. (2003)40\n13\nTestosterone \nenanthate\nParenteral\n2 mg/kg\nWeekly for 3 weeks \nbefore surgery\n126\n68\nNR\nNR\nNerli et al. \n(2009)41\n10\nTestosterone\nTopical cream\nManufactured \nsachets\nDaily for 3 weeks\n38 \n18\n100\n36\nNerli et al. \n(2009)41\n11\nTestosterone \nenanthate\nParenteral\n2 mg/kg\nMonthly for 3 months \nbefore surgery\n38 \n18\n102\n37\nGorduza et al. \n(2010)43\n21\nHuman chorionic \ngonadotropin\nParenteral\n1,500 IU\n6 doses every other \nday\nNR\nNR\nNR\nNR\nGorduza et al. \n(2010)43\n25\nTestosterone \nenanthate\nParenteral\n100 mg/m2\n2–6-monthly injection\nNR\nNR\nNR\nNR\nAbbreviation: NR, not reported.\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\n202  |  APRIL 2011  |  VOLUME 8\b\nwww.nature.com/nrurol\nand therefore, a minimum period of 2–3 weeks is gener­\nally recommended between the last hormone treatment \nand surgery. A few authors, however, have reported no \nincreased bleeding during surgery, at least according to \ntheir subjective assessment.39–41\nAlthough penile measurement parameters largely \nvary among studies (with some reporting the length \nof the stretched penis, others flaccid penis length, some \nthe glanular circumference, and others the diameter), \nhormonal stimulation is consistently reported to result \nin increased penile length and glanular size (Table 2). \nIshii et al.42 found penile growth to be unrelated to age, \nbody surface, and penile length before treatment. Koff \nand Jayanthi38 observed a disproportionate growth of \nthe penile segment proximal to the hypospadic meatus \nwith subsequent advancement in meatal position and \nreduction in the degree of curvature. The enlarging \neffect of hormones is generally considered to be only \ntemporary, therefore stimulation is usually performed \nclose to surgery. Nevertheless, Chalapathi et al.40 noted \na decrease in length of approximately 10% at 3 months \nafter cessa­tion of treatment, compared to the values \nreported immediately after treatment. Likewise, Davits \net al.44 reported a mean decrease of 17% in penile length \nand 7% in shaft circumference 1 year after the last dose \nin 40 patients with hypospadias receiving parenteral \ntesto­sterone, regardless of severity.\nRegarding the influence of hormonal stimulation \nofnhypospadias repair, Koff and Jayanthi38 reported that \ntestosterone reduced the severity of hypospadias both \nin terms of meatal position and associated curvature, \nthereby making surgery easier to perform than antici­\npated. Nevertheless, some authors have hypothesized \nthat androgen treatment might have a detrimental effect \non the healing process.8,43 Gorduza et al.43 retrospectively \ncompared 30 patients with primary severe hypospadias \nwho underwent repair with prior hormonal stimulation \nto 96 boys who were not treated with hormones. They \nobserved lower complication rates, although not statisti­\ncally significant, in patients not receiving any stimula­\ntion (17.7%) versus those receiving stimulation (30%), \nand in patients completing the stimulation more than \n3 months before surgery (21.7%) versus those complet­\ning the stimulation less than 3 months before surgery \n(57%). The same group suggested that estrogens might \nenhance the healing process and proposed sequen­\ntial treatment of testosterone followed by estrogen.8 \nHowever, the retrospective nature of this study, might \nhave resulted in a selection bias. Indeed, in a prospective \nrandomized study, Kaya et al.45 observed a significantly \nlower complication rate in patients with distal hypo­\nspadias receiving preoperative hormonal stimulation \nthan in those receiving no stimulation. As expected, the \neffect was particularly evident in the glanular dehiscence \nrate. In this study, hormonal stimulation was also associ­\nated with better cosmetic outcomes, mainly owing to less \nscarring. These data, although not specific for primary \nsevere hypo­spadias, suggest that testosterone might have \na beneficial effect on the healing process rather than \ncontributing to complications.\nOverall, hormonal stimulation seems advisable in \nclinical practice, particularly in patients with micro­\npenis or a small glans. All administration routes seem \neffective, and completion of treatment a few months \nbefore surgery might be beneficial, as this does not \naffect the growth effect but might prevent possible \nassociated complica­tions, such as bleeding. Further \nresearch is neces­sary to gauge the influence of hormonal \nstimula­tion on the healing process after primary severe \nhypospadias repair.\nAge at surgery\nA comparison of age at the time of primary severe hypo­\nspadias repair shows great variability in both average and \nmedian ages, ranging from 10 months to 6.2 years.46,47 \nSeveral factors seem to account for such variability \nincluding the country where the study was performed and \nwhether the series was performed by pediatric surgeons \nand urologists, or plastic surgeons. An action committee \nof the American Academy of Pediatrcs48 recommended \nthat an age of 6–18 months is ideal for surgery, based \non expert opinion. Prerequisites for such early treatment \ninclude expertise in hypospadias repair, availability of a \npediatric anesthetist, and the use of optical magnification \nand thin suture materials. This recom­mendation is not \nspecific for severe cases, but a recent review of experts’ \nopinion pertaining only to primary severe hypospadias, \nwas consistent with this recommenda­tion.8 Some sur­\ngeons report that they have operated patients as young \nas 6 weeks old, although most of the authors agree that \nthe first 6 months of life should be avoided owing to \nanesthesia-­related risks and morbid­ity.49 Of interest, some \nsurgeons8 suggested that glans size might be the key factor \nfor choosing the appropriate time for surgery; a glans \nof at least 10 mm in diameter is considered necessary \nto create a urethra of acceptable caliber.\nThe reported advantages of early surgery include the \nlower psychological impact of surgery performed before \nthe genital phase of development, easier postoperative \nmanagement owing to the use of a double diaper, which \navoids cumbersome drainage systems, and the lower \ncomplication rate. The latter might be due to superior \nhealing in younger patients or to a greater familiar­\nity of pediatric urologists with this kind of surgery. No \ncomparative studies have been performed to test either \nhypothesis in patients with primary severe hypospadias, \nbut Hensle et al.51 reported a higher complication rate \nin adults than is generally reported in children with \ncompar­able degrees of hypospadias.\nAs far as patient preferences are concerned, in their \nseries of 45 patients undergoing masculinizing genito­\nplasty for a DSD, Sirlici et al.21 reported that the 29 boys \nwho underwent surgery under 2 years of age were sat­\nisfied, while the 16 patients who underwent a delayed \nrepair (median age 18.5 years) expressed the desire \nto have undergone the procedure earlier. Two recent \nstudies have addressed this issue with a structured \napproach evaluating long-term outcomes with stan­\ndardized instruments and formal psychological assess­\nment.52,53 Unfortunately, less than 10% of the patients \nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\nNATURE REVIEWS | UROLOGY \nVOLUME 8  |  APRIL 2011  |  203\nin both studies had severe hypospadias and no analysis \nwas performed for this specific subgroup. One study \nconcluded that patients operated on before the age of \n5 years have a better psychological outcome and no peri­\noperative memories,52 whereas the other study found no \ndifference in outcome between patients operated before \nand after the age of 18 months.53\nThese data suggest that an early repair is recom­\nmended. However, a comparative series is necessary \nto determine the most appropriate age. Unfortunately, \na randomized study is not feasible in current clinical \npractice.\nIntraoperative factor\nUrethroplasty coverage\nOf the 52 surgical series identified in our systematic \nsearch, 25 included details of additional coverage for \nurethroplasty, namely using a second layer of tissue. \nSubcutaneous tissue elevated from the dorsum or iso­\nlated laterally to the neo-urethra is the most commonly \nused tissue. Tunica vaginalis or scrotal flaps are pos­\nsible alternatives (Figure 3).54 The type of flap does not \nseem to be relevant as long as it is well-­vascularized \nand wide enough to cover the whole segment of \nreconstructed urethra.\nAnalysis of the literature did not reveal any specific \nrecommendation regarding the role of second-layer \ncoverage in primary severe hypospadias repair. Two \nstudies compared the complication rates in patients \nwith proximal hypospadias undergoing the same type \nof repair with and without second-layer coverage of the \nurethroplasty.55,56 Both found that using an additional \nlayer reduced the complication rate of surgery. In the \nseries of staged repairs by Telfer et al.,55 a layer of vascu­\nlarized preputial areolar tissue resulted in a fistula rate of \n4.5%, compared to 63% in patients for whom no addi­\ntional coverage was interposed between urethroplasty \nand skin. Similarly, Chuang and Shieh56 reported fistula \nrates of 15% and 41%, and overall complication rates of \n19% and 59% in a series of 103 patients who underwent \ntubularized preputial flap urethroplasty with and without \nsecond-layer coverage using subcutaneous tissue, respec­\ntively. Snodgrass and Yucel32 also emphasized the impor­\ntance of double-layer subepithelial closure compared to \nsingle-layer closure for urethroplasty. The two tech­\nniques had overall complication rates and fistula rates of \n25% versus 53%, and 10% versus 33%, respectively. In a \nrandom­ized study of 120 boys with proximal hypo­spadias \nwho underwent tubularized preputial flap urethroplasty, \nGopal et al.57 also observed lower complica­tion (20% \nversus 56%) and fistula rates (10% versus 32%), as well \nas smaller fistulas in patients who were given a layer of \nfibrin glue after skin closure, compared to those who \ndid not.\nThese data are consistent with randomized trials in \npatients with distal hypospadias, which is much more \ncommon,58 and show that multilayer coverage of the \nurethroplasty is one of the key factors for a successful \nrepair. Randomized trials in primary severe hypospadias \nare awaited.\nPostoperative factors\nAntibiotic prophylaxis\nAntibiotic prophylaxis after hypospadias repair has two \npotential benefits; it can prevent both infection of the \ntissues used for urethroplasty and urinary tract infec­\ntions, particularly if a catheter is used. Of the 52 series \non primary severe hypospadias repair, 14 mention the \nuse of antibiotic prophylaxis, of which 6 specify the type \nof antibiotic used—a cephalosporin in three studies24,26,59 \nand co-trimoxazole in the remaining three.32,34,60 We \ncould not identify any specific recommendation regard­\ning the role of prophylaxis in repair of primary severe \nhypo­spadias repair.\nSugar and Firlit61 recommend use of prophylactic \nantibiotics in all boys after hypospadias repair, based \non the observation that less than 15% of their patients \nwho received antibiotics presented with positive urine \ncultures. However, this study was observational and \nthe authors also emphasized the use of a closed drain­\nage system to prevent infections. Montagnin et al.,62 \nhowever, subsequently reported a comparable prevalence \nof urinary tract infections in their series of patients who \nreceived either open drainage in double diapers or closed \ndrainage systems, thus refuting the possible influence \nof the type of drainage. Ben Meir and Livne63 prospec­\ntively compared complication rates of patients receiv­\ning cefalexin three times daily after tubularized incised \nplate urethroplasty, with those who did not. They did \nnot observe any statistically significant difference in sur­\ngical complication rates between groups, but a signifi­\ncantly lower prevalence of febrile urinary tract infections \nwas found in boys who took antibiotics, regardless of \nhypo­spadias severity.\nThese data suggest that antibiotic prophylaxis does not \naffect the complication rate of surgery, although it might \nreduce the risk of postoperative urinary tract infection \nas long as the catheter is indwelling. However, it is worth \nmentioning that these studies largely included distal \nhypospadias treated by tubularization of the urethral \nplate. The role of antibiotic prophylaxis might indeed be \nmore relevant in flap or graft procedures. The latter are \nstill largely used in primary severe hypospadias repairs \na\nb\nU\nT\nT\n*\n*\nFigure 3 | Second-layer coverage of the urethroplasty. a | A layer of tissue elevated \nfrom the vaginalis (*) of the left testicle (T) is b | rotated to provide additional \ncoverage of the urethroplasty (U).\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\n204  |  APRIL 2011  |  VOLUME 8\b\nwww.nature.com/nrurol\nand entail a much more complex healing process. The \nrole of antibiotic prophylaxis in this particular subset of \npatients is still to be assessed. Further research is also \nnecessary to identify the best antibiotic and protocol.\nUrinary drainage\nWe are not aware of any studies that report the possibility \nof primary severe hypospadias repair without urinary \ndiversion, as keeping the suture lines dry in the early \npostoperative period is generally considered a key factor \nfor appropriate healing. The easiest way to achieve drain­\nage of bladder urine is the insertion of a catheter. Bladder \ncatheters can be inserted transurethrally or percutane­\nously in the suprapubic region. In order to reduce the \npainful bladder spasms that catheter insertion can trigger, \nsome clinicians prefer to place a tube with its proximal \nend in the urethra (also known as a urethral stent), the \nlatter should allow for spontaneous micturitions while \nkeeping the suture dry. Of the 52 studies on urethro­\nplasty for primary severe hypospadias, 42 detailed the \ntype of urinary drainage used. A trans­urethral catheter \nalone was the most common option, used in 29 studies, \nwith 11 additional studies reporting the combined use \nof transurethral and suprapubic catheters. Two studies \ndocumented the use of a suprapubic tube alone. The size \nof the urethral catheter ranged between 5 and 10 French \n(1.35–3.30 mm in diameter) The duration of stenting was \nbetween 7 and 14 days.\nTwo case-control studies have been published \nthat specifi­cally assess the role of urinary drainage \nafter primary severe hypospadias repair. Demirbilek \nand Atayurt64 reported a lower incidence of fistulas and \nmeatal stenoses in 11 patients receiving suprapubic diver­\nsion than in 10 who received a urethral stent. Chuang \nand Shieh56 compared the complication rates between \npatients who received a suprapubic cystostomy and those \nwho received a Foley silicon catheter. They also com­\npared patients who underwent drainage for more than \nand less than 7 days. Neither drainage type nor duration \nseemed to influence the complication rate of surgery.\nBased on this evidence, urinary diversion after \nprimary severe hypospadias repair seems advisable. \nComparative studies should aim to define the ideal \nmethod and duration.\nWound dressing\nA number of types of dressing have been proposed after \nhypospadias repair. The most common is a compressive \ndressing made with elastic tape to wrap around the penis \n(Figure 4). Compression is thought to enhance homeo­\nstasis. Others, however, have suggested simpler and \nless cumbersome dressing, such as wrapping the penis \nwith a transparent adhesive biomembrane. At the other \nextreme, Cilento et al.65 described a modified pantaloon \nspica cast—a rigid cast extending from the umbilicus \nto the knee, thus immobilizing the lower limbs—for \npatients undergoing free graft repair, in order to enhance \ngraft integration. Of the 52 surgical series identified in \nthe systematic search on primary severe hypospadias \nrepair, 22 mentioned the use of a dressing, 13 of which \nspecified the use of a compressive dressing. We could not \nfind any experts’ recommendation on this point.\nMcLorie et al.66 randomized 60 patients with proxi­\nmal hypospadias to receive an adhesive biomembrane \ndressing, a compressive wrap dressing or no dressing at \nall. The authors found no statistically significant differ­\nences in complication rate or types of complication \nobserved among the three groups. However, not apply­\ning a dressing was associated with lower parental anxiety \nand simpli­fied postoperative care. Similar results were \nreported by Van Savage et al.,67 although they did not \nconsider hypospadias severity. Of note, the type of repair \nwas not specified in the study by McLorie et al.,66 whereas \nthe cohort reported by Van Savage et al.67 was largely \ncomposed of tubularized incised plate urethroplasties. \nThis limits the possibility to extend these conclusions \nalso to flap and graft urethroplasties, which are still \ncommonly used in primary severe hypospadias repair.\nThe evidence accumulated so far suggests the choice \nof dressing after hypospadias repair has a limited \neffect on outcome. Given that dressing removal is one \nof the most stressful aspects of urethroplasty for both \nthe child and parents, efforts should be made to use the \nmost easily removable dressing. The role of dressing in \ncases involving flap or graft urethroplasties deserves \nfurther investiga­tion, as under these circumstances a \ndressing capable of stabilizing the urethroplasty might \nbe beneficial.65\n\nConclusions\nCurrent perioperative management of primary severe \nhypospadias is extremely variable and largely based on \nweak evidence, such as the results of small observational \nstudies. The influence on final outcome of most of the \ninterventions and variables described here remains ill-\ndefined. However, the existing evidence is worth noting \nand might help clinicians to standardize peri­operative \nmanagement in the future. Systematic evalua­tion of the \nupper urinary tract and search for enlarged prostatic utri­\ncles seem unnecessary in patients with isolated primary \nsevere hypospadias. Investigation should be limited to \nsevere cases that present with associ­ated extraurinary \nFigure 4 | Compressive dressing after hyposapdias repair. \nThe penis is wrapped with multiple layers of gauze to \nachieve uniform compression along the shaft.\nREVIEWS\n© 2011 Macmillan Publishers Limited. All rights reserved\n\nNATURE REVIEWS | UROLOGY \nVOLUME 8  |  APRIL 2011  |  205\nmalformations. The detection of a DSD is key for gender \nassignment and prognosis, but identifica­tion of cases \nwarranting a full work-up and the influence of diagnosis \non the success of surgery are controversial. Preoperative \nhormonal stimulation allows for penile growth irrespec­\ntive of administration route, but although associated \nmorbidity is minimal, its influence on the success of \nsurgery is still unknown. An age of 6–18 months is gen­\nerally recommended for surgery, but no trial data support \nthis policy. Second-layer coverage of the urethroplasty \nand post­operative urinary drainage seem to reduce the \ncomplications of surgery, while postoperative antibiotic \nprophylaxis and type of dressing seem to have minimal \nimpact on surgical success. We hope the issues outlined \nhere will prompt researchers to design new studies to \naddress the clinically relevant questions. We empha­\nsize, however, that since primary severe hypospadias is \na relatively rare condition and is not often encountered \n(even in busy pediatric urology departments) if we want to \nprogress in clinical research and improve patient manage­\nment, efforts should be made to design collaborative, \nmulticentric, randomized prospective studies.\nReview criteria\nA systematic review of the literature was performed in \nJuly 2010. Four databases, namely MEDLINE/PubMed, \nEMBASE, Web of Science, and the Cochrane Library, were \nsearched using a single term, “hypospadias”. “English” \nand “Publication date from 1990” were used as limits, \nwhen applicable. Subsequently, the queries were pooled \nwithout applying any limit. Only series of primary repairs of \nsevere hypospadias were considered, whereas duplicated \npublications and congress abstracts were excluded.\n1. \nBaskin, L. S. & Ebbers, M. B. Hypospadias: \nanatomy, etiology, and technique. J. Pediatr. \nSurg. 41, 463–472 (2006).\n2. \nCastagnetti, M. & El-Ghoneimi, A. Surgical \nmanagement of primary severe hypospadias in \nchildren: systematic 20-year review. J. Urol. 184, \n1469–1474 (2010).\n3. \nValla, J. S. et al. Single-stage correction of \nposterior hypospadias (178 cases). Comparison \nof three techniques: free skin graft, free bladder \nmucosal graft, transverse pedicle preputial graft. \nEur. J. Pediatr. Surg. 1, 287–290 (1991).\n4. \nFlack, C. E. & Walker, R. D. 3rd. Onlay‑tube‑onlay \nurethroplasty technique in primary perineal \nhypospadias surgery. J. Urol. 154, 837–839 \n(1995).\n5. \nFossum, M., Svensson, J., Kratz, G. & \nNordenskjöld, A. Autologous in vitro cultured \nurothelium in hypospadias repair. J. Pediatr. Urol. \n3, 10–18 (2007).\n6. \nHayashi, Y. et al. Neo-modified Koyanagi \ntechnique for the single-stage repair of proximal \nhypospadias. J. Pediatr. Urol. 3, 239–242 \n(2007).\n7. \nKajbafzadeh, A. M. et al. Proximal hypospadias \nwith severe chordee: single stage repair using \ncorporeal tunica vaginalis free graft. J. Urol. 178, \n1036–1042 (2007).\n8. \nManzoni, G. A. & El-Ghoneimi, A. Posterior \nhypospadias. Dial. Pediatr. Urol. 29, 1–11 \n(2008).\n9. \nCerasaro, T. S., Brock, W. A. & Kaplan, G. W. \nUpper urinary tract anomalies associated with \ncongenital hypospadias: is screening \nnecessary? J. Urol. 135, 537–538 (1986).\n10. Davenport, M. & MacKinnon, A. E. The value of \nultrasound screening of the upper urinary tract
