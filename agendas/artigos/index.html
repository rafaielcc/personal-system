n of clinical and molecular data of 148 cases of \nesophageal atresia. Am J Med Genet A 2023;191(1):77—83.\n[24] de Jong EM, Felix JF, Deurloo JA, van Dooren MF, Aronson DC, Torfs CP, et al.\nNon-VACTERL-type anomalies are frequent in patients with esophageal \natresia/tracheo-esophageal fistula and full or partial VACTERL association. \nBirth Defects Res A Clin Mol Teratol 2008;82(2):92—7.\n[25] Sistonen SJ, Helenius I, Peltonen J, Sarna S, Rintala RJ, Pakarinen MP. Natural \nhistory of spinal anomalies and scoliosis associated with esophageal atresia. \nPediatrics 2009;124(6):e1198—204.\n[26] Okuyama H, Tazuke Y, Uenoa T, Yamanaka H, Takama Y, Saka R, et al. Long-\nterm morbidity in adolescents and young adults with surgically treated \nesophageal atresia. Surg Today 2017;47(7):872—6.\nR.B. Schwarz, A.G.H. Pijpers, C.M.C. De Beaufort et al. / Journal of Pediatric Surgery 61 (2026) 163103\n6"}, {"message_id": "1869872061689763622", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f31ebbac721726", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-05T07:55:42", "subject": "há nuances....", "original_title": "Intraoperative ultrasound in nephron-sparing surgery for paediatric renal tumours: A single-centre cohort study", "smart_title": "Estudo de coorte unicêntrico — ultrassom intraoperatório em cirurgia poupadora de néfrons para tumor de Wilms · Great Ormond Street Hospital, Londres, 2026", "email_summary": "Lisieux partilhou este artigo no grupo Uroped com o assunto \"há nuances....\", sem desenvolver o comentário no corpo da mensagem — sugerindo que via nuances importantes no estudo, sem as detalhar por escrito.", "abstract_text": "", "bullets_summary": "Coorte unicêntrica (Great Ormond Street Hospital, Londres), comparando cirurgia poupadora de néfrons (NSS) com e sem ultrassom intraoperatório (EIOUS) feito por radiologista consultor dedicado\n71 doentes: 51 (72%) sem EIOUS (coorte histórica, 2000-2016) vs 20 (28%) com EIOUS (2016-2025) — 103 unidades renais, 167 espécimes de resseção no total\nAchado central: margens cirúrgicas positivas em lesões malignas caíram de 36% (sem EIOUS) para 0% (com EIOUS), p<0,001 — sem sacrificar parênquima preservado (84,6% vs 90,7%, sem diferença estatística)\nModelo distintivo: radiologista consultor dedicado a operar em conjunto com o cirurgião (não o próprio cirurgião a manusear a sonda, como na maioria dos estudos prévios em adultos)\nUso de sonda linear \"hockey stick\" de 24MHz colocada diretamente na cápsula renal, com soro fisiológico para otimizar o acoplamento acústico; permite delinear o tumor, verificar a resseção proposta e confirmar excisão completa em tempo real\nTambém reduziu resseções adicionais desnecessárias de margem renal \"de segurança\" (17 casos na coorte histórica vs 2 na coorte com EIOUS) — nenhuma continha tumor, logo eram perda de tecido saudável evitável", "long_summary": "Este estudo de coorte unicêntrico do Great Ormond Street Hospital (Londres) avalia o impacto de uma colaboração intraoperatória incomum — um radiologista consultor a fazer ecografia diretamente na cápsula renal, ao lado do cirurgião, durante toda a cirurgia poupadora de néfrons (nephron-sparing surgery, NSS) para tumores renais pediátricos, principalmente tumor de Wilms.\n\nO contexto clínico é bem definido: a NSS procura excisão completa do tumor preservando o máximo de parênquima renal saudável, mas é tecnicamente mais exigente do que a nefrectomia total e carrega maior risco de margens cirúrgicas positivas (historicamente 20-30%), o que classifica o doente em estádio local III e implica escalada terapêutica — quimioterapia intensificada, radioterapia e, nalguns casos, nefrectomia de finalização — com impacto direto na função renal a longo prazo, particularmente crítico em tumor de Wilms bilateral, onde preservar tecido renal é essencial para evitar hipertensão, doença renal terminal e morbilidade cardiovascular futuras.\n\nA equipa de Londres estabeleceu, há uma década, uma colaboração intraoperatória entre o cirurgião consultor e um radiologista consultor dedicado, que se junta ao campo estéril e realiza ecografia em tempo real diretamente sobre a cápsula renal (sonda linear \"hockey stick\" de 24MHz, com soro fisiológico para melhorar o acoplamento acústico). Isto distingue este estudo de praticamente toda a literatura prévia sobre ultrassom intraoperatório (IOUS) em cirurgia renal — que é maioritariamente de adultos, e onde tipicamente é o próprio cirurgião a manusear a sonda, não um radiologista dedicado. A ecografia é usada em três momentos: para delinear a lesão antes da incisão, para verificar a proposta de resseção do cirurgião durante a dissecação, e para confirmar a excisão completa depois de removido o tumor (inclusivamente escaneando o espécime numa cuba de soro, quando possível).\n\nO estudo compara uma coorte histórica de 2000-2016 sem esta técnica (51 doentes, 77 unidades renais, 128 espécimes de resseção) com uma coorte prospetiva de 2016-2025 com a técnica (EIOUS — 20 doentes, 26 unidades renais, 39 espécimes). Note-se que a coorte com EIOUS tinha diagnósticos mais heterogéneos (incluindo carcinoma de células renais e um caso associado a síndrome de Beckwith-Wiedemann), refletindo critérios de elegibilidade para NSS que se expandiram ao longo do tempo.\n\nO resultado central é notável: margens histologicamente positivas em lesões malignas ocorreram em 36% (27/75) dos casos na coorte sem EIOUS, e em 0% (0/18) na coorte com EIOUS (p<0,001) — uma eliminação completa das margens positivas. Crucialmente, isto não foi conseguido à custa de remover mais tecido saudável: a percentagem de parênquima preservado foi semelhante entre os grupos (84,6% sem EIOUS vs. 90,7% com EIOUS, sem diferença estatística significativa), e o número de resseções adicionais de \"margem de segurança\" (tecido extra removido por precaução, para além do espécime principal) caiu de 17 casos na coorte histórica para apenas 2 na coorte com EIOUS — sendo que, em nenhum dos casos, essas margens adicionais continham realmente tumor, confirmando que eram perda desnecessária de tecido saudável, agora evitável com maior confiança intraoperatória guiada por imagem.\n\nOs autores comparam o seu modelo com outros relatos de IOUS em cirurgia renal pediátrica (nomeadamente Aldrink et al., com 22,5% de margens positivas apesar de usar IOUS, mas maioritariamente manuseado pelo próprio cirurgião), argumentando que a perícia subespecializada de um radiologista dedicado — em identificar os limites subtis do tumor (sobretudo quando embutido em restos nefrogénicos, um cenário particularmente complexo no tumor de Wilms bilateral), avaliar proximidade a vasos e sistema pielocalicial, e confirmar excisão completa em tempo real — ultrapassa a capacidade do cirurgião a operar sozinho a sonda.\n\nAs limitações reconhecidas são relevantes: desenho retrospetivo e não-randomizado (a coorte \"controlo\" é histórica, não contemporânea), ausência de dados de função renal a longo prazo (não é possível confirmar se margens negativas se traduzem diretamente em melhores desfechos renais/oncológicos a longo prazo), e tratar-se de experiência de um único centro altamente especializado — os próprios autores pedem estudos multi-institucionais para validar estes achados antes de recomendar adoção mais ampla desta configuração específica (radiologista dedicado, não o cirurgião a operar a própria sonda).", "full_text_formatted": "Clinical Research Paper\nIntraoperative ultrasound in nephron-sparing surgery for paediatric \nrenal tumours: A single-centre cohort study\nCarolina Bebi a, * , Tom Watson b , Alberto Mantovani a , Jesper Brok c , Riwa Meshaka b,\nEmily Ashworth b , Tanzina Chowdhury c , Catriona Duncan c , Neil Sebire d ,\nJ. Ciaran Hutchinson d , Abraham Cherian a , Imran Mushtaq a , Alexander Cho a ,\nNaima Smeulders a\na Department of Paediatric Urology, Great Ormond Street Hospital for Children, London, United Kingdom\nb Department of Paediatric Radiology, Great Ormond Street Hospital for Children, London, United Kingdom\nc Department of Paediatric Oncology, Great Ormond Street Hospital for Children, London, United Kingdom\nd Department of Paediatric Histopathology, Great Ormond Street Hospital for Children, London, United Kingdom\na r t i c l e i n f o\nArticle history: \nReceived 14 April 2026 \nAccepted 20 April 2026\n\nKeywords:\nPaediatric\nRenal tumours\nNephron-sparing surgery (NSS) \nIntraoperative ultrasound (IOUS)\na b s t r a c t\nBackground: Nephron-sparing surgery (NSS) for paediatric renal tumours seeks maximal parenchymal \npreservation. However, incomplete tumour excision often requires additional therapy impacting renal \nfunction. We evaluate the impact of intraoperative ultrasound on histological margins during NSS (US-\nNNS).\nMethods: All patients offered US-NSS (2016—2025) were recorded prospectively and compared to all \nhistorical NSS cases (2000—2016) undertaken without ultrasound (non-US-NSS). On-table US was \nperformed by a consultant radiologist using a linear-array transducer on the renal capsule. NSS sought a \nrim of normal parenchyma and was used for multiple lesions when needed. Data included de-\nmographics, histology, surgical margins, and kidney/specimen volumes. Using the formula \nd1 × d2 × d3 × 0.523, pathological specimen volumes were subtracted from the pre-operative MRI \nrenal unit volumes to determine the percentage of preserved parenchyma. Fisher's exact test compared \nmargin positivity for malignant lesions.\nResults: The cohorts comprised 128 non-US-NSS in 51 patients (median age 28 months) and 39 US-NSS \nin 20 patients (median age 15.5 months). Histology for the 128 non-US-NSS were 64 Wilms tumours \n(WT), 13 equivocal WT, 51 non-malignant lesions, and for the 39 US-NSS 14 WT, 1 equivocal WT, 3 renal \ncell carcinoma (RCC), and 21 non-malignant lesions. The median specimen volumes per renal unit was \n12.00 cm 3 (IQR 4.01—28.5 cm 3 ) vs 8.93 cm 3 (IQR 3.34—17.89 cm 3 ), and median preserved parenchyma \nper renal unit was 84.56% (IQR 62.71%—97.17%) vs 90.74% (IQR 74.20%—96.67%) in non-US-NSS vs US-\nNSS. Positive margins for malignant lesions occurred in 27/75 (36%) non-US-NSS, and in 0/18 US-NSS \n(p < 0.001).\nConclusion: Intraoperative ultrasound for NSS eliminated positive margins for malignant lesions while \nmaintaining high parenchymal preservation.\n© 2026 Published by Elsevier Inc.\nh i g h l i g h t s\n• Positive surgical margins after nephron-sparing surgery resulted in an increased burden of therapy for children with malignant renal tumours.\n• Intraoperative ultrasound by a consultant radiologist significantly improved the accuracy of nephron-sparing surgery.\n• Histologically positive surgical resection margins were eliminated while preserving high levels of normal renal parenchyma.\n1. Introduction\nRenal tumours in children are a heterogeneous entity, though \nWilms tumours (WT) account for almost 90% of cases [1]. Rising \nsurvival rates are spurring greater consideration of the long-term\n* Corresponding author. Great Ormond Street Hospital for Children, Guilford St, \nLondon, WC1N 3BH, United Kingdom.\nE-mail address: carolina.bebi@gosh.nhs.uk (C. Bebi).\nContents lists available at ScienceDirect\nJournal of Pediatric Surgery\njournal homepage: www.sciencedirect.com/journal/ \njournal-of-pediatric-surgery\nhttps://doi.org/10.1016/j.jpedsurg.2026.163163 \n0022-3468/© 2026 Published by Elsevier Inc.\nJournal of Pediatric Surgery 61 (2026) 163163\n\ntreatment-related side effects [2]. Cozzi et al. observed 42% of \npatients, who underwent a unilateral nephrectomy in childhood, \nto show signs of mild to moderate renal dysfunction by early \nadulthood, increasing to 78% of those followed up into their fifth \ndecade of life [3]. Hypertension, another important long-term \ncomplication, affected 66.7% of patients with bilateral Wilms \ntumour who underwent a total nephrectomy on one side, \ncompared to 20% of those offered bilateral nephron-sparing sur-\ngery (NSS) [4]. In this context, the accepted eligibility criteria for \nNSS have been expanding [5].\nIn NSS, the surgeon seeks to achieve a complete tumour exci-\nsion while maximising the preservation of healthy renal paren-\nchyma. NSS is technically more challenging than nephrectomy and \ncarries a higher risk of surgical complications [5]. The major \nconcern for NSS is the risk of incomplete tumour resection, with \nthe reported incidence of a histological positive margin typically at \naround 20%—30% [6—8]. This classifies the patient as local stage III \nand leads to additional post-operative treatment or completion \nnephrectomy [9], with implications for the patient's quality of life \nand renal function. With a view to reducing incomplete surgical \nresections, referral to highly-specialised centres experienced in \nNSS is recommended [5]. However, positive margins still occa-\nsionally occur even in a nationalised service [10].\nIntraoperative ultrasound (IOUS) has long been a feature of \nadult renal tumour surgery, particularly in the context of robotic-\nassisted partial nephrectomy [11,12]. While the use of IOUS has \nbeen reported in paediatric NSS, outcome data remains ambivalent \n[13]. We established an intraoperative collaboration between the \nconsultant surgeon undertaking NSS and the consultant radiolo-\ngist scanning directly on the renal capsule a decade ago [14]. This \nstudy evaluates the impact of expert IOUS (EIOUS) on the accuracy \nof surgical margins at NSS.\n2. Materials and methods\nWith institutional approval, all NSS procedures carried out \nbetween January 2000 and April 2025 were reviewed (retrospec-\ntive cohort 2000—2016, prospective cohort 2016—2025). Patients \nwere treated according the SIOP/CCLG guidelines [5] and their \neligibility for NSS approved by the multi-disciplinary team for \nPaediatric renal tumours at the Hospital's weekly Paediatric Solid \nTumour meeting. Patient demographics, clinical features, imaging \ndata, perioperative characteristics, histological diagnoses and \nmargin status were collected.\n2.1. NSS technique\nAll NSS were performed by surgeons expert in uro-oncology at \nour tertiary/quaternary referral centre using a standardised \napproach. Where tumour characteristics precluded NSS for one \nrenal unit, necessitating a unilateral total radical nephrectomy, \nNSS for the contra-lateral renal unit was offered synchronously, \nunless additional pre-operative chemotherapy was considered \nimportant ahead of NSS. Patients received broad-spectrum anti-\nbiotic on induction of general anaesthesia. The patient was placed \nsupine and a balloon catheter placed per urethra. A transverse \nabdominal incision afforded access to the retroperitoneum. The \nlength of the incision was adjusted to the size of the renal tu-\nmour(s) and its/their extent; malignancies with tumour thrombus \nreaching to the proximal inferior vena cava were managed through \na combined thoraco-abdominal incision.\nThe renal unit for NSS was mobilised. Where feasible, Gerota's \nfascia was maintained over the surface of the lesion(s). Depending \non the size and locations of the tumours, vessel loops were loosely \nplaced around the vascular pedicle in case of haemorrhage.\nHowever, most NSS could be performed without occlusion of the \nvessels at the hilum, with bleeding controlled by direct compres-\nsion of the kidney around the site of the resection by the surgical \nassistant.\nOnce the site and depth of the tumour was determined, \nresection by cutting diathermy was undertaken swiftly to mini-\nmise thermal injury to the resection margin. Feeding interpolar/ \nsegmental vessels were oversewn and bipolar haemostasis applied \nto the edge of the resection bed. Breaches into the pelvicalyceal \nsystem were sought and repaired with dissolvable sutures. Place-\nment of nephro-stents and/or a peri-nephric drain was at the \ndiscretion of the operating surgeon. Absorbable haemostatic \nagents were placed onto/into the tumour bed. Lymph node sam-\npling was performed as per protocol.\n2.2. EIOUS technique\nAs previously described [14], the surgeon and radiologist jointly \nreviewed the imaging ahead of the procedure to formulate the \noperative plan. The radiology team for EIOUS consisted of the \nconsultant radiologist and an assistant to optimise and capture \nimages on the GE Logiq E10® (Boston, MA, USA) machine with a \n24 MHz ‘hockey stick’ probe (GE L6-24-D®). Once the surgeon had \nexposed the kidney, the consultant radiologist scrubbed to join the \nsterile field. The ultrasound probe, covered by a sterile drape, was \nplaced directly onto the renal capsule/Gerota's. To enhance \nacoustic coupling, sterile saline was applied to the renal surface. \nContinuous real-time imaging and communication allowed the \nexact superficial and deep anatomy of the tumour to be clarified. \nProximity to vessels and the pelvicalyceal system was determined. \nUsing monopolar diathermy on the renal capsule, incisions for the \nresection(s) could be proposed by the surgeon and checked by the \nconsultant radiologist, aiming to maximise parenchymal preser-\nvation while ensuring complete excision. For large tumours, EIOUS \nalso guided the deep resection during the excision.\nThe radiologist must be aware of the appearance of diathermy \nburn on ultrasound, which appears as areas of linear echogenicity \nsimilar to the appearance of gas, because the tissues are burned \nthe artefact can be more extensive than a thin linear line. The \nbenefit of a small footplate transducer such as the ‘hockey-stick’ \nprobe is the ability to get the end of the probe into small spaces \nsuch as a dissection plane where appropriate and as guided by the \noperating surgeon. This can be used to assess the current depth of \nthe dissection relative to the tumour. If feasible, sterile saline can \nbe used to fill the dissection space to optimise acoustic coupling \nand improve image quality. Alternatively, the radiologist can use \nthe tumour itself as the acoustic window and the depth of \ndissection can be defined using a metal probe as a marker at the \nlimit of dissection margin. We have not tried smaller probes such \nas endoscopic probes or laparoscopic probes which have a smaller \nfootplate but are capable of much lower frequency imaging \n(typically 3—15 MHz) and therefore cannot achieve the image \nresolution of a conventional diagnostic probe. Complete macro-\nscopic resection can be confirmed by scanning the specimen in a \nsaline bath ex vivo if this does not affect the preparation necessary \nfor transport to histopathology. Once the targeted lesion was \nremoved, the surgical bed and/or specimen were scanned to \nconfirm complete radiological excision. Finally, EIOUS on the \ntumour bed facilitated identification of breaches into the pelvi-\ncalyceal system. Fig. 1 depicts the key steps of the EIOUS technique. \nFor the intricacy of the imaging technique, please refer to Apple-\nyard et al. [14].\nFor the purposes of this study, no distinction was made be-\ntween NSS by enucleation or partial nephrectomy [15]. NSS was for \none or more lesions within the kidney(s), as clinically indicated. A\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163\n2 \n\nlesion was defined as any tissue submitted in a distinct container \nfor histopathological evaluation. Except where the surgeon \nexplicitly recorded a deliberate intra-lesional biopsy for purely \ndiagnostic purposes alone, all tissue resections were considered to \nhave been undertaken with the intent of achieving a negative \nmargin, i.e. to remove the lesion with a rim of normal parenchyma. \nWhere additional parenchyma (e.g. “cut edge” or “tissue from \npreserved kidney”) was sampled, this was recorded as ‘renal \nmargin’ and included in the total volume of resection.\nRenal unit volumes were determined from the preoperative \nMRI scan and specimen volumes from the histopathology mea-\nsurements using the ellipsoid formula d1×d2×d3× 0.523. As not \nall histopathology reports included all three dimensions, missing \nvalues were estimated as follows: if one diameter was missing, it \nwas calculated as the mean of the other two measurements; if only \none diameter was available, it was cubed to approximate volume. \nIf more than one NSS was performed on the same renal unit, the \ntotal specimen's volume was calculated by summing all resected \nspecimens for that unit, including those labelled as ‘biopsy’ or \n‘margin,’ as this also represented removal of renal parenchyma. \nThe total specimen volume was subtracted from the correspond-\ning preoperative MRI renal unit volume to calculate the percentage \nof preserved renal parenchyma for each renal unit.\n2.3. Statistical analysis\nData were collected following the principles outlined in the \nDeclaration of Helsinki. Data are presented as medians (range) or \nfrequencies (proportions). Cases were grouped according to the \nuse of intraoperative ultrasound (EIOUS) performed by the \nconsultant radiologist, resulting in two cohorts: NSS guided by \nEIOUS (US-NSS) and without (non-US-NSS). Variables between the \ntwo groups were compared by the Mann—Whitney and Fisher's \nexact tests. Time of surgery and tumour features are presented \ndescriptively. Due to the multi-focal and bilateral nature of many \npaediatric renal tumours offered NSS, multiple resections could be \nperformed during a single operation. Each NSS was defined as a \ndiscrete tumour resection specimen and was labelled individually \nin the pathology report. Margin status was assessed exclusively for \nmalignant lesions. Specimens diagnosed as nephrogenic rests (NR) \nor described as renal tissue, scarring, or necrotic tissue were \nexcluded from the analysis. All statistical analyses were performed \nusing R version 4.3.2 (R Core Team, 2023) within RStudio version \n2025.05.1 Build 513® (RStudio, PBC, Boston, MA, USA). All tests \nwere two-sided and statistical significance level was considered at \np < 0.05 [16].\n3. Results\nDuring the study period 71 patients (35 males, 36 females) \nwere offered NSS. Patients received neo-adjuvant chemotherapy\nas per the SIOP/CCLG protocols. Pre-operative characteristics of \npatients undergoing nephron-sparing surgery (NSS) are summa-\nrized in Table 1, stratified by the application of EIOUS for NSS: 51 \n(72%) underwent non-US-NSS, while 20 (28%) were performed \nwith EIOUS (US-NSS). The non-US-NSS group represents a histor-\nical cohort, with EIOUS introduced to NSS in 2016. The two groups \nwere comparable in terms of age at surgery (median 28 months vs. \n15.5 months, p= 0.502) and gender distribution, with an equal \nmale-to-female ratio in both groups (50% each, p= 1.0). However, \nin view of the expanded eligibility criteria for NSS over time, the \ndistribution of diagnoses differed significantly (p = 0.005). While \nall patients in the non-US-NSS group had bilateral WT (88% syn-\nchronous, 12% metachronous), the US-NSS group included a \nbroader diagnostic spectrum: 16 (80%) bilateral WT (94% syn-\nchronous, 6% metachronous), one unilateral WT associated with \nBeckwith-Wiedemann syndrome, two renal cell carcinoma (RCC), \nand one equivocal partly cystic, partly solid lesion.\nThe surgical characteristics of NSS for the 71 patients is sum-\nmarised in Table 2. Overall, 103 renal units received NSS: 77 (74.8%) \nnon-US-NSS and 26 (25.2%) US-NSS. As many patients presented \nwith bilateral or multifocal disease, multiple lesions were resected \nduring a single surgery. Each lesion submitted separately to pa-\nthology was considered a distinct NSS. Malignant diag-\nnoses―including Wilms tumour (WT), equivocal WT (when \ndistinction between nephrogenic rests or nephroblastoma was not \npossible with absolute certainty), and renal cell carcinoma \n(RCC)―accounted for 77 (60.2%) resections in the non-US-NSS\nFig. 1. Expert Intraoperative US (EIOUS) steps. Expert Intraoperative US (EIOUS) is used to delineate the lesion (A), check the proposed resection (B) and check completeness of \nexcision following tumour removal (C).\nTable 1\nPatients’ pre-operative characteristics, stratified by use of intraoperative US for \nNSS (n = 71).\nNon-US-guided\nUS-guided\np value a\nNo. of patients [n (%)] \n51 (72%)\n20 (28%)\nAge at first surgery \n(months)\nMedian (range) \n28 (5—128)\n15.5 (5—141)\n0.502\nGender [n (%)]\n1\nMales\n25 (49%)\n10 (50%)\nFemales\n26 (51%)\n10 (50%)\nDiagnosis [n (%)] \n0.005\nBilateral WT \n51 (100%)\n16 (80%)\nSynchronous \n45 (88%)\n15 (94%)\nMetachronous\n6 (12%)\n1 (6%)\nUnilateral WT associated\nwith syndrome \n0\n1 (5%)\nRCC\n0 \n2 (10%)\nPart cystic, part solid\nlesion\n0 \n1 (5%)\nAbbreviations: NSS = Nephron-sparing surgery; WT = Wilms tumour; RCC = \nRenal cell carcinoma.\na P value according to unpaired Mann—Whitney U test for continuous data \nand Fisher's Exact test for categorical variables.\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163 \n3\n\ngroup and 18 (46.2%) in the US-NSS group (p= 0.142). The \nremaining resections included nephrogenic rests (NR), cystic le-\nsions, and non-neoplastic parenchymal changes such as scarring \nor necrosis. No statistically significant differences were observed \nbetween groups in terms of type of resection specimen submitted \nto pathology (p= 0.167) or histological diagnosis (p= 0.142), \ndespite the broader diagnostic heterogeneity in the US-NSS group.\nTable 3 presents the histological characteristics of malignant \nresection specimens. Two biopsies in the non-US-NSS group were \nconfirmed as Wilms tumour (WT) but were excluded from the \nmargin analysis, as they were performed as a purely diagnostic \nincision biopsy without the intent to achieve a negative margin. \nThe remaining 75 resections of malignant lesions in the non-US-\nNSS group and 18 in the US-NSS group were all undertaken with \ncurative intent. Histological positive surgical margins were \nobserved in 27 of the 75 non-US-NSS resections (36%), whereas no \npositive surgical margins were reported in the US-NSS group \n(p< 0.001). The 27 positive surgical margins occurred in 11 pa-\ntients, all of whom received an escalation of chemotherapy, five \nreceived radiotherapy and one patient, with anaplastic histology, \nboth radiotherapy and completion nephrectomy. Additionally, one \npatient (non-US-NSS) showed extension of the tumour (interme-\ndiate-risk) to the renal capsule and was considered local stage 3. In \nthe US-NSS group, one patient with a high-risk blastemal tumour \nshowed extension through the renal capsule, making him local \nstage 3, although the margins to the renal parenchyma were free of \ntumour. While the former received escalated chemotherapy alone,\nthe latter received high-risk chemotherapy as well as flank \nradiotherapy and subsequently a completion nephrectomy for \nacute loss of renal function after radiotherapy. Six patients in the \nnon-USS-NSS died.\nImportantly, no significant difference was observed in the pre-\noperative renal unit volume on pre-operative MRI (p = 0.586), the \nvolume of resected specimen (p = 0.347) or the percentage of \npreserved parenchyma, with a median volume of 84.6% (IQR \n62.7%—97.2%) preserved by non-US-NSS and 91% (IQR \n74.2%—96.7%) by USS-NSS (p = 0.424) (Table 4).\n4. Discussion\nHaving established an intraoperative collaboration between \nthe consultant surgeon undertaking NSS and the consultant radi-\nologist scanning directly on the renal capsule a decade ago, we\nTable 2\nSurgical data of NSS stratified by the use of intraoperative US.\nNon-US-guided\nUS-guided\np value a\nNumber of renal units \noffered NSS [n] \n77 (74.8%)\n26 (25.2%)\nNumber of operations [n] \n61 (73.5%) \n22 (26.5%) \nYear of NSS surgery [n] \n2000—2008 \n20\n0\n2009—2016 \n41\n1\n2017—2024\n0\n21\nNumber of resection\nspecimen (NSS) [n] \n128\n39\n0.167\nNSS\n108 (84.3%)\n35 (89.7%)\nNSS followed by a\ncompletion \nnephrectomy on same \nsitting (parenchyma \nnot viable)\n0\n1 (2.6%)\nRenal margin (“cut \nedge”/“tissue from \npreserved kidney”) \n17 (15.7%)\n2 (5.1%)\nBiopsies (i.e. no intent to \nachieve negative \nmargins)\n3 (2.3%)\n1 (2.6%)\nDiagnosis on HPR [n (%)] \nper resection \n0.142\nMalignant\n77 (60.2%) \n18 (46.2%) \nWT\n64\n14\nEquivocal WT\n13\n1\nRCC\n0 \n3\nNephrogenic rest and\nnon-malignant \nlesions\n51 (39.8%)\n21 (53.8%)\nNR\n30\n19\nCystic lesion\n0\n1\nRenal tissue/scarring/\nnecrotic tissue\n21\n1\nAbbreviations: NSS = Nephron-sparing surgery; IOUS = Intraoperative US; HPR = \nHistopathology report; WT = Wilms tumour; RCC = Renal cell carcinoma; \nNR = nephrogenic rest.\na P value according to Fisher's Exact test for categorical variables.\nTable 3\nHistology of malignant specimen, stratified by the use of intraoperative US (n = 93).\nNon-US-guided\nUS-guided\np value a\nMalignant NSS \nresections \n75\n18\nPositive surgical \nmargins [n (%)] \n27 (36%)\n0 (0%)\n<0.001\nHistological subtype \nof WT and \nequivocal Wilms \nlesions [n (%)] \n77\n15\nHigh-risk \nAnaplastic \n2 (2.6%)\n0\nBlastemal \n3 (3.9%)\n2 (13.3%)\nIntermediate-risk \nEpithelial\n9 (11.7%)\n4 (26.7%) \nStromal\n8 (10.4%)\n0\nMixed\n21 (27.3%)\n5 (33.3%)\nRegressive \n30 (38.9%)\n3 (20%)\nLow-risk\nNecrotic\n3 (3.9%)\n1 (6.7%)\nCystic partially\ndifferentiated \nnephroblastoma \n1 (1.3%)\n0\nHistological subtype \nof RCC [n (%)] \n0\n3\nEosinophilic solid \nand cystic\n0\n2\nNot otherwise \nspecified\n0\n1\nAbbreviations: RCC = Renal cell carcinoma.\na P value according to Fisher Exact test for categorical variables. Tumour features \nare presented descriptively.\nTable 4\nAmount of preserved parenchyma per renal unit after surgery stratified by use of \nintraoperative US (n = 77).\nNon-US-guided\nUS-guided\np value a\nSpecimen volume (cm 3 ) \nper renal unit\nMedian (IQR)\n12.00 (4.0—28.5) \n8.93 (3.3—17.9)\n0.347\nRange\n0.03—280.5\n0.05—252.9\nPreoperative MRI renal unit \nvolume (cm 3 )\nMedian (IQR)\n103 (75.1—127) \n93.4 (68.2—127)\n0.586\nRange\n24.4—386\n36.9—304\nAmount of preserved \nparenchyma per renal \nunit (%)\nMedian (IQR)\n84.6 (62.7—97.2) \n90.7 (74.2—96.7)\n0.424\nRange\n6—99.9\n16.81—99.9\nAbbreviations: IQR = inter quartile range.\na P value according to Mann—Whitney test for continuous data.\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163\n4 \n\nshow expert IOUS to have significantly impacted the accuracy of \nNSS. In comparison to a historical cohort of NSS without EIOUS \n(2000—2016), in which tumour was detected histologically at the \nsurgical margin in 36% of resection specimen, systematic use of \nEIOUS for NSS afforded complete surgical resections in all patients, \nwhile maintaining high levels of preserved parenchyma.\nFor this study, margin status was analysed only for malignant \nlesions, for which incomplete resection triggers an increased \nburden of post-operative therapy for patients. Nephrogenic rests \nwere excluded, firstly, because their unencapsulated nature makes \nmargin assessment unreliable, and secondly, because margin \npositivity is clinically irrelevant as it does not alter post-operative \nmanagement [9]. Differentiating WT from NR histologically relies \nheavily on the assessment of the lesion's relationship to the sur-\nrounding parenchyma [17]. Particularly after chemotherapy, which \nmay result in the appearance of a fibrous capsule to a NR, dis-\ntinguishing this from a WT may not be feasible with absolute \ncertainty [17]. Lesions with equivocal histology were included in \nthe malignant category on the basis that post-operative treatment \nwould be offered as for a WT.\nHistological positive margins in Wilms tumour classify the \npatient as stage III under the COG staging system, triggering \ntreatment escalation including prolonged and/or intensified \nchemotherapy, postoperative radiotherapy, and, in some cases, \ncompletion nephrectomy [18]. Although Kieran et al. [6] observed \nmargin status not to correlate with local recurrence, all patients \nwith positive margins were treated with radiotherapy. In our \nstudy, similarly, all patients with positive margins received an \nincreased burden of post-operative therapy. Treatment escalation \nfor positive margins can significantly impact long-term organ \nfunctions including the kidney, whether by chemotherapy, radio-\ntherapy or completion nephrectomy. These effects are particularly \nsignificant in bilateral WT, where preserving renal tissue is critical \nto avoiding long-term complications such as end-stage renal dis-\nease (ESRD), hypertension, and cardiovascular morbidity [19]. A \nreliable method to eliminate positive margins is hence a central \ngoal in NSS, thereby minimising treatment burden and protecting \nlong-term renal function. Centralising NSS to tertiary/quaternary \ncentres has reduced although not eliminated positive margins [10].\nOur surgical approach to reducing the incidence of positive \nmargins is based on two key strategies: (1) EIOUS performed by a \nconsultant radiologist within a multidisciplinary team at a high-\nvolume centre, and (2) tumour resection with a rim of normal \nparenchyma. Although Aldrink et al. [13] used IOUS for most NSS, \nmany were undertaken by the operating surgeon, and micro-\nscopically positive surgical margins occurred in 22.5% in their se-\nries. A consultant radiologist can contribute subspecialist imaging \nexpertise to the operating team. Particularly for tumours arising in \nnephrogenic rests that merge into neighbouring normal paren-\nchyma, imaging delineation is far from straightforward. The \nconsultant radiologist's skill in defining the subtleties of tumour \nboundaries, identifying optimal resection planes, assessing prox-\nimity to vessels and the collecting system, and confirming com-\nplete excision in real time, using a refined ultrasound technique \nspecifically adapted for paediatric urological surgery, surpasses \nthat of the surgeon [14]. Previous reports of IOUS in renal surgery \nhave largely focused on adult cases, where tumours are not typi-\ncally embedded in nephrogenic rests, in contrast to the complex \nlandscape usually encountered in bilateral Wilms tumours. In the \nadult settings, IOUS is typically performed by the surgeon, with \ntechniques that are not standardised, either in vivo to assess \nmargins [20] or ex vivo after tumour removal [21]. In the paediatric \npopulation, Fitski et al. [2] reported IOUS for paediatric cases \nalongside the use of 3D models for preoperative surgical planning; \nhowever, this was also performed by the surgeon. Our model,\ninvolving a dedicated radiologist working in tandem with the uro-\noncology surgeon, is distinct and offers continuous, high-level \nimaging support throughout the procedure.\nA further important factor is how resection margins are \naddressed surgically. The SIOP-RTSG [9] guidelines permit tumour \nresection either with a rim of normal parenchyma or directly along \nthe tumour capsule. However, no studies to date have compared \nnephron-sparing surgery (NSS) performed with versus without a \nparenchymal rim in paediatric renal tumours. Given our finding of \n0% positive margins when NSS was carried out with EIOUS to \nachieve a deliberate narrow rim of normal parenchyma, we \nadvocate this approach to minimise the risk of residual disease and \nburden of post-operative treatment. To ensure this reduction in \nmargin positivity was not at the expense of additional resection of \nhealthy renal tissue, we calculated the volume of parenchyma \npreserved. Importantly, the use of EIOUS did not lead to increased \nremoval of normal tissue, with a median 90% of renal parenchyma \npreserved. Finally, we recorded the number of additional renal \nmargin resections performed intraoperatively (17 in the historical \nnon-US-NSS cohort vs 2 in the US-NSS cohort). Notably, none of \nthese margin specimens contained tumour, and their removal \ntherefore represented unnecessary loss of normal renal tissue. \nSince 2016, the frequency of additional margin resections has \ndecreased notably suggesting that EIOUS can increases intra-\noperative confidence and reduce unnecessary tissue loss.\nHistorically, margin positivity rates in NSS have been around \n30%, consistent with our non-US-NSS cohort. Following the intro-\nduction of radiologist-performed EIOUS, we have achieved a sig-\nnificant reduction in margin positivity rates. The clinical \nimplications of our study are significant. This is the first study to \nevaluate margin outcomes using intraoperative ultrasound in pae-\ndiatric renal tumour resection performed by an expert radiologist \nactively guiding the surgeon during the procedure. We demonstrate \nthat this approach has the potential to eliminate positive resection \nmargins without sacrificing additional normal parenchyma. Our \nstudy has limitations. It is retrospective and non-randomised. In \naddition, long-term renal function data were not collected, hence \nwe cannot confirm whether negative margins directly translate into \nbetter long-term renal and oncological outcomes. Finally, this is a \nsingle-centre experience, and further multi-institutional studies \nwill be required to validate our findings.\n5. Conclusions\nIn summary, our findings support the integration of a consul-\ntant radiologists into the surgical team for expert intraoperative \nultrasound as a critical strategy for improving the accuracy of NSS \nfor paediatric renal tumours.\nRole of Funder/Sponsor\nNone.\nClinical trial registration\nNone.\nThis research did not receive any specific grant from funding \nagencies in the public, commercial or not-for-profit sectors.\nFunding/Support\nNo funding was secured for this study.\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163 \n5\n\nConflict of interest\nThe authors have no conflicts of interest to disclose.\n\nAcknowledgements\nAll research at Great Ormond Street Hospital NHS Foundation \nTrust and UCL Great Ormond Street Institute of Child Health is \nmade possible by the NIHR Great Ormond Street Hospital \nBiomedical Research Centre. The views expressed are those of the \nauthors and not necessarily those of the NHS, the NIHR or the \nDepartment of Health.\n\nReferences\n[1] Pastore G, Znaor A, Spreafico F, Graf N, Pritchard-Jones K, Steliarova-Foucher E.\nMalignant renal tumours incidence and survival in European children (1978-\n1997): report from the Automated Childhood Cancer Information System proj-\nect. Eur J Cancer 2006;42:2103—14. https://doi.org/10.1016/j.ejca.2006.05.010.\n[2] Fitski M, B€ \nokkerink GMJ, Van Peer SE, Hulsker CCC, Terwisscha Van\nScheltinga SEJ, Van De Ven CP, et al. Nephron-sparing surgery for pediatric \nrenal tumors after centralization of pediatric oncology care in the \nNetherlands: improved outcomes with 3D modeling. J Pediatr Surg 2025;60: \n162125. https://doi.org/10.1016/j.jpedsurg.2024.162125.\n[3] Cozzi DA, Ceccanti S, Frediani S, Mele E, Cozzi F. Renal function adaptation up \nto the fifth decade after treatment of children with unilateral renal tumor: a \ncross-sectional and longitudinal study: long-term renal function Wilms tumor. \nPediatr Blood Cancer 2013;60:1534—8. https://doi.org/10.1002/pbc.24545.\n[4] Hubertus J, Günther B, Becker K, Graf N, Furtw€ \nangler R, Ferrari R, et al.\nDevelopment of hypertension is less frequent after bilateral nephron sparing \nsurgery for bilateral Wilms tumor in a long-term survey. J Urol 2015;193: \n262—7. https://doi.org/10.1016/j.juro.2014.07.116.\n[5] Graf N, Chowdhury T, El-Saaid R, Furtw€ \nangler R, Godzinski J, Spreafico F, et al.\nThis document has been developed by: J Brok and GL Ramírez-Villar [n.d].\n[6] Kieran K, Williams MA, Dome JS, McGregor LM, Krasin MJ, Davidoff AM.\nMargin status and tumor recurrence after nephron-sparing surgery for \nbilateral Wilms tumor. J Pediatr Surg 2013;48:1481—5. https://doi.org/ \n10.1016/j.jpedsurg.2013.02.033.\n[7] Murphy AJ, Davidoff AM. Nephron-sparing surgery for Wilms tumor. Front \nPediatr 2023;11:1122390. https://doi.org/10.3389/fped.2023.1122390.\n[8] Yao W, Weng S, Li K, Shen J, Dong R, Dong K. Bilateral Wilms tumor: 10-year \nexperience from a single center in China. Transl Cancer Res 2024;13:879—87. \nhttps://doi.org/10.21037/tcr-23-1428.\n[9] On behalf of the International Society of Paediatric Oncology—Renal Tumour \nStudy Group (SIOP—RTSG), Vujani \u0014 \nc GM, Gessler M, Ooms AHAG, Collini P, \nCoulomb-l’Hermine A. The UMBRELLA SIOP—RTSG 2016 Wilms tumour pa-\nthology and molecular biology protocol. Nat Rev Urol 2018;15:693—701. \nhttps://doi.org/10.1038/s41585-018-0100-3.\n[10] van Peer SE, Hol JA, van der Steeg AFW, van Grotel M, Tytgat GAM, Mavin-\nkurve-Groothuis AMC, et al. Bilateral renal tumors in children: the first 5 \nyears' experience of national centralization in the Netherlands and a narra-\ntive review of the literature. J Clin Med 2021;10:5558. https://doi.org/ \n10.3390/jcm10235558.\n[11] Fasanella D. Intraoperative imaging techniques for robotic-assisted partial \nnephrectomy: where do we stand? Mis 2024;8:5. https://doi.org/10.20517/ \n2574-1225.2023.79.\n[12] Sun Y, Wang W, Zhang Q, Zhao X, Xu L, Guo H. Intraoperative ultrasound: \ntechnique and clinical experience in robotic-assisted renal partial nephrec-\ntomy for endophytic renal tumors. Int Urol Nephrol 2021;53:455—63. \nhttps://doi.org/10.1007/s11255-020-02664-y.\n[13] Aldrink JH, Cost NG, McLeod DJ, Bates DG, Stanek JR, Smith EA, et al. Tech-\nnical considerations for nephron-sparing surgery in children: what is needed \nto preserve renal units? J Surg Res 2018;232:614—20. https://doi.org/ \n10.1016/j.jss.2018.07.022.\n[14] Appleyard W, Meshaka R, Bebi C, Cho A, Chowdhury T, Smeulders N, et al.\nIntraoperative ultrasound-guided paediatric urological surgery: a pictorial \nreview. Pediatr Radiol 2024;54:1818—30. https://doi.org/10.1007/s00247-\n024-06035-y.\n[15] Wilde JCH, Aronson DC, Sznajder B, Van Tinteren H, Powis M, Okoye B, et al.\nNephron sparing surgery (NSS) for unilateral wilms tumor (UWT): the SIOP \n2001 experience. Pediatr Blood Cancer 2014;61:2175—9. https://doi.org/ \n10.1002/pbc.25185.\n[16] R: the R project for statistical computing n.d. https://www.r-project.org/ \n(accessed August 1, 2025).\n[17] Popov SD, Sebire NJ, Vujanic GM. Wilms' tumour — histology and differential \ndiagnosis. In: van den Heuvel-Eibrink MM, editor. Wilms tumor. Brisbane \n(AU): Codon Publications; 2016.\n[18] Vaidya DSJ, Howell DL, Chowdhury DT, Oostveen DM, Powis MM, \nOkoye MB, et al. To be used in conjunction with the Umbrella Study Pro-\ntocol. 2020.\n[19] Cozzi DA, Ceccanti S, Cozzi F. Renal function up to the 5th decade of life \nafter nephrectomy in childhood: a literature review. Nephrology 2018;23: \n397—404. https://doi.org/10.1111/nep.13202.\n[20] Mihai I, Dura H, Teodoru CA, Todor SB, Ichim C, Grigore N, et al. Intra-\noperative ultrasound: bridging the gap between laparoscopy and surgical \nprecision during 3D laparoscopic partial nephrectomies. Diagnostics \n2024;14:942. https://doi.org/10.3390/diagnostics14090942.\n[21] Alharbi F, Chahwan C, Le Gal S, Guleryuz K, Tillou X, Doerfler A. Intraoperative \nultrasound control of surgical margins during partial nephrectomy. Urol Ann \n2016;8:430. https://doi.org/10.4103/0974-7796.192107.\nC. Bebi, T. Watson, A. Mantovani et al. / Journal of Pediatric Surgery 61 (2026) 163163\n6"}]}</script>
<script>
(function(){
  const dados = JSON.parse(document.getElementById('artigos-data').textContent || '{"articles":[]}');
  const artigos = dados.articles || [];
  const batchKey = 'artigos_decisoes_' + (dados.batch_date || dados.generated_at || 'na');
  const lidoKey = 'artigos_lidos_' + (dados.batch_date || dados.generated_at || 'na');

  const decisoes = JSON.parse(localStorage.getItem(batchKey) || '{}');
  const lidos = JSON.parse(localStorage.getItem(lidoKey) || '{}');

  function salvarDecisoes(){ localStorage.setItem(batchKey, JSON.stringify(decisoes)); }
  function salvarLidos(){ localStorage.setItem(lidoKey, JSON.stringify(lidos)); }

  function escapeHtml(s){
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function bulletsHtml(texto){
    const linhas = (texto || '').split('\n').map(l => l.trim()).filter(Boolean);
    if (!linhas.length) return '<p class="muted">Sem síntese disponível.</p>';
    return '<ul>' + linhas.map(l => '<li>' + escapeHtml(l.replace(/^[-••]\s*/, '')) + '</li>').join('') + '</ul>';
  }

  function formatarCompleto(texto){
    if (!texto) return '<p>Texto completo não disponível para este artigo.</p>';
    return texto.split(/\n{2,}/).map(bloco => {
      const linha = bloco.trim();
      if (/^(introdu|introduction|metodolog|methods?|resultados?|results?|discuss|conclus|abstract|keywords|background)\b/i.test(linha)) {
        const quebra = linha.indexOf('\n');
        const titulo = quebra === -1 ? linha : linha.slice(0, quebra);
        const resto = quebra === -1 ? '' : linha.slice(quebra + 1);
        return '<h3>' + escapeHtml(titulo) + '</h3>' + (resto ? '<p>' + escapeHtml(resto) + '</p>' : '');
      }
      return '<p>' + escapeHtml(linha) + '</p>';
    }).join('');
  }

  function render(){
    const lista = document.getElementById('lista');
    if (!artigos.length){
      lista.innerHTML = '<div class="empty">Sem artigos novos nesta corrida.</div>';
      return;
    }

    lista.innerHTML = artigos.map((a, i) => {
      const status = decisoes[a.message_id] || '';
      const lido = !!lidos[a.message_id];
      return `
      <details class="card" data-msgid="${escapeHtml(a.message_id)}" data-status="${status}">
        <summary>
          <div class="smart-title"><span class="stripe"></span>${escapeHtml(a.smart_title || a.original_title)}<span class="chev">▼</span></div>
          <div class="orig-title">${escapeHtml(a.original_title || '')}</div>
          ${lido ? '<div class="read-badge">✓ já lido</div>' : ''}
        </summary>
        <div class="body">
          <p class="head-line"><b>${escapeHtml(a.sender_name || a.sender_email)}</b>${a.sender_is_owner ? ' · prioridade 1 (você)' : ''} · ${escapeHtml((a.date||'').slice(0,10))}<br>${escapeHtml(a.subject || '')}</p>

          <div class="section-label">Síntese do e-mail</div>
          <p>${escapeHtml(a.email_summary || 'Sem síntese.')}</p>

          <div class="section-label">Abstract</div>
          <div class="abstract-box"><p>${escapeHtml(a.abstract_text || 'Abstract não encontrado.')}</p></div>

          <div class="section-label">Síntese do artigo · bullet points</div>
          ${bulletsHtml(a.bullets_summary)}

          <div class="section-label">Síntese do artigo · leitura 5–10 min</div>
          <p>${escapeHtml(a.long_summary || 'Sem síntese longa.')}</p>

          <div class="actions">
            <button class="act" data-action="lido">✓ Já lido</button>
            <button class="act" data-action="guardar">💾 Guardar</button>
            <button class="act" data-action="excluir">🗑 Excluir</button>
            <a class="act" data-action="gmail" href="${escapeHtml(a.gmail_web_link || '#')}" target="_blank" rel="noopener">✉ Ver no Gmail</a>
            <button class="act" data-action="completo">📖 Abrir artigo completo</button>
          </div>
        </div>
      </details>`;
    }).join('');

    aplicarEstadoVisual();
  }

  function aplicarEstadoVisual(){
    document.querySelectorAll('details.card').forEach(card => {
      const id = card.getAttribute('data-msgid');
      card.setAttribute('data-status', decisoes[id] || '');
      card.querySelectorAll('.act').forEach(btn => {
        const acao = btn.getAttribute('data-action');
        if (acao === 'lido') btn.classList.toggle('on', !!lidos[id]);
        if (acao === 'guardar') btn.classList.toggle('on', decisoes[id] === 'guardar');
        if (acao === 'excluir') btn.classList.toggle('on', decisoes[id] === 'excluir');
      });
    });
  }

  document.getElementById('lista').addEventListener('click', function(ev){
    const btn = ev.target.closest('.act');
    if (!btn) return;
    const card = ev.target.closest('details.card');
    const id = card.getAttribute('data-msgid');
    const acao = btn.getAttribute('data-action');

    if (acao === 'gmail') return; // link normal, deixa seguir

    ev.preventDefault();

    if (acao === 'lido'){
      lidos[id] = !lidos[id];
      salvarLidos();
      render();
      return;
    }
    if (acao === 'guardar' || acao === 'excluir'){
      decisoes[id] = decisoes[id] === acao ? null : acao;
      if (!decisoes[id]) delete decisoes[id];
      salvarDecisoes();
      aplicarEstadoVisual();
      return;
    }
    if (acao === 'completo'){
      const artigo = artigos.find(a => a.message_id === id);
      abrirLeitura(artigo);
    }
  });

  function abrirLeitura(a){
    document.getElementById('reader-title').textContent = a.smart_title || a.original_title;
    document.getElementById('reader-body').innerHTML = formatarCompleto(a.full_text_formatted || a.full_text);
    document.getElementById('reader').classList.add('open');
    window.scrollTo(0,0);
  }
  document.getElementById('btn-voltar').addEventListener('click', function(){
    document.getElementById('reader').classList.remove('open');
  });

  document.getElementById('btn-exportar').addEventListener('click', function(){
    const linhas = Object.keys(decisoes)
      .filter(id => decisoes[id] === 'guardar' || decisoes[id] === 'excluir')
      .map(id => ({ message_id: id, acao: decisoes[id] }));
    const blob = new Blob([JSON.stringify(linhas, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const hoje = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'decisoes_' + hoje + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  render();
})();
</script>
