essage_id": "1871575343807330602", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f92bdbf203f92a", "sender_name": "rafael correia", "sender_email": "rcc4730@gmail.com", "sender_is_owner": false, "date": "2026-07-24T07:08:43", "subject": "Artigo", "original_title": "Hypospadias: anatomy, etiology, and technique", "smart_title": "Revisão convidada — anatomia, etiologia e técnica cirúrgica da hipospádia · UCSF, 2006", "email_summary": "Rafael enviou-se a si próprio este PDF sem qualquer comentário no corpo do e-mail — só o anexo.", "abstract_text": "Hypospadias is one of the most common congenital anomalies defined by abortive\ndevelopment of the urethral spongiosum, the ventral prepuce and in more severe cases penile chordee.\nThe etiology of hypospadias remains unknown with environmental exposure in the form of endocrine\ndisruptors the most likely explanation for the worldwide increase in incidence in the last three decades.\nThere are five sequential steps for the successful repair of hypospadias: 1) Orthoplasty or penile\nstraightening, 2) Urethroplasty, 3) Meatoplasty and Glanuloplasty, 4) Scrotoplasty, and 5) Skin\nCoverage. The major technical advances in hypospadias surgery that have improved surgical outcomes\nare 1) Preservation of the urethral plate, 2) Incision of the urethral plate, 3) Dorsal midline plication, 4)\nDeepithelized urethroplasty dartos flap coverage, and 5) Two stage alternative techniques. This article\nreviews the pertinent embryology, anatomy and the most common hypospadias reconstructive\noperations to accomplish a successful repair.\nD 2006 Elsevier Inc. All rights reserved.\nHypospadias is one of the most common congenital\nanomalies occurring in approximately 1 of 200 to 1 of\n300 live births [1]. Hypospadias is defined by an abortive\ndevelopment of the urethral spongiosum and ventral\nprepuce along with an arrest in the normal embryological\ncorrection of penile curvature (Fig. 1). Hypospadias is a\ncontinuum with the majority of cases having an aberrant\nurethral meatus at the subcoronal margin, corona, or on the\nglans penis. Moderate and severe cases of hypospadias are\ncharacterized by a more proximal urethra opening located\non the penile shaft, scrotum, or perineum, respectively. In\ngeneral, the more severe forms of hypospadias tend to be\nassociated with a higher incidence of penile curvature as\nwell as penile–scrotal skin transposition. An uncommon\nvariation of hypospadias may present with an intact foreskin\nthat is typically uncovered at the time of a neonatal\ncircumcision. These patients more often than not have a\nblunder bust or megameatus.\n1. Anatomy, embryology, and etiology\nThe anatomy of the hypospadiac penis is similar to the\nnormal penis except on the ventral aspect where the abortive\nforeskin and arrested urethra and urethral spongiosum are\ndeficient [2]. Histological analysis has shown that the\nurethral plate in hypospadias is well vascularized, with\nsinusoids of abortive urethral spongiosum, and without scar\ntissue [3]. These features may explain the successful use of\nincorporating the urethral plate or abortive spongiosum into\nhypospadias reconstruction [4,5].\nThe nerves in both the normal and hypospadiac penises\nare also similar. The dorsal nerve arises from the pudendal\nnerve and continues as 2 well-defined bundles superior and\nslightly lateral to the urethra. As the 2 crural bodies\nconverge into the corporal cavernosal bodies, the nerves\ndiverge, spreading around the cavernosal bodies up to the\n0022-3468/$ – see front matter D 2006 Elsevier Inc. All righ", "bullets_summary": "Revisão clássica (Baskin & Ebbers, UCSF) sobre anatomia, embriologia, etiologia e técnica cirúrgica da hipospádia\nHipospádia afeta 1 em 200-300 nados-vivos; etiologia desconhecida em >95% dos casos — disruptores endócrinos ambientais são a explicação mais provável para o aumento de incidência nas últimas décadas\n5 passos sequenciais de reparação bem-sucedida: ortoplastia (endireitamento peniano), uretroplastia, meatoplastia/glanuloplastia, escrotoplastia e cobertura cutânea\n5 avanços técnicos que melhoraram os resultados: preservação da placa uretral, incisão da placa uretral (técnica de Snodgrass/TIP), plicatura dorsal da linha média, cobertura com retalho de dartos desepitelizado, e alternativa em 2 tempos (incluindo a técnica bucal de Bracka para casos complexos/reoperados)\nIdade ideal para cirurgia: 6 meses, em criança saudável — evita ansiedade de separação do toddler e cirurgia genital antes do desfralde\nComplicação principal: fístula uretrocutânea; a placa uretral raramente é a causa da curvatura peniana residual (chordee), ao contrário do que se pensava antes", "long_summary": "Esta é uma revisão convidada (Journal of Pediatric Surgery, 2006) de Laurence Baskin e Michele Ebbers, da UCSF, que se tornou uma referência clássica sobre hipospádia — uma das malformações congénitas mais comuns da genitália masculina (1 em 200-300 nados-vivos), definida por desenvolvimento abortivo do corpo esponjoso uretral, prepúcio ventral e, nos casos mais graves, curvatura peniana (chordee).\n\nO artigo começa pela embriologia: antes da 7ª semana de gestação, os genitais são indiferenciados; entre as semanas 7-8, sob influência do gene SRY e produção de testosterona, ocorre a diferenciação masculina. A uretra peniana forma-se por fusão das pregas uretrais endodérmicas, com o prepúcio a desenvolver-se em paralelo — se as pregas genitais não se fundirem, falta tecido prepucial ventralmente e há excesso dorsal, exactamente o padrão observado na hipospádia.\n\nSobre etiologia, os autores são claros: menos de 5% dos casos têm explicação genética/hormonal identificável (défice de 5α-redutase tipo II, defeitos do recetor de androgénios, síndromes como mão-pé-genital por mutação HOXA13). A maioria dos casos, sobretudo as formas distais, permanece inexplicada. A hipótese mais discutida para o aumento de incidência (que duplicou desde os anos 1960) é a exposição ambiental a disruptores endócrinos — compostos estrogénicos que se acumulam na cadeia alimentar — sustentada por evidência humana (filhos de mães expostas a dietilstilbestrol têm mais anomalias uretrais) e experimental em modelos animais.\n\nA parte técnica do artigo é a mais extensa e prática. Os autores descrevem 5 fases sequenciais essenciais a qualquer reparação bem-sucedida: ortoplastia (correção da curvatura), uretroplastia, meatoplastia/glanuloplastia, escrotoplastia e cobertura cutânea. A escolha da técnica depende sobretudo da qualidade do sulco glandular e do corpo esponjoso: um sulco profundo permite tubularização primária (MAGPI, GAP, ou a modificação de Snodgrass com incisão da placa uretral — TIP, hoje a técnica mais popular); um sulco raso ou hipospádia mais proximal exige retalhos (onlay island flap do prepúcio interno) ou, em casos graves com secção da placa uretral, reparação em dois tempos (incluindo a técnica de enxerto bucal de Bracka, útil em reoperações).\n\nUm ponto histórico importante que os autores destacam: estudos anatómicos mostraram que a placa uretral raramente é a causa da curvatura peniana — ressecá-la não corrige a curvatura — o que levou à mudança de paradigma para a preservação da placa uretral (popularizada por Duckett) como padrão atual, exceto nos casos mais graves. A correção da curvatura residual é hoje feita preferencialmente por plicatura dorsal na linha média (posição das 12 horas, livre de estruturas neurovasculares), reservando a ressecção completa da placa e enxerto dérmico para curvaturas que não respondem a 2 filas de sutura de plicatura.\n\nQuanto à idade cirúrgica, os autores recomendam os 6 meses de idade como ótimo, com anestesia pediátrica e cateteres de derivação suaves, evitando tanto os riscos anestésicos dos primeiros meses de vida como a ansiedade de separação e o treino de esfíncteres mais tarde. As complicações principais são fístula uretrocutânea, estenose uretral, meato retrusivo/proximal e curvatura residual — a maioria evitável seguindo sequencialmente as 5 fases descritas.", "full_text_formatted": "Invited review\nHypospadias: anatomy, etiology, and techniqueB\nLaurence S. Baskin*, Michele B. Ebbers\nPediatric Urology, Department of Urology, UCSF Children’s Hospital, University of California–San Francisco,\nSan Francisco, CA 94143-0738, USA\nAbstract Hypospadias is one of the most common congenital anomalies defined by abortive\ndevelopment of the urethral spongiosum, the ventral prepuce and in more severe cases penile chordee.\nThe etiology of hypospadias remains unknown with environmental exposure in the form of endocrine\ndisruptors the most likely explanation for the worldwide increase in incidence in the last three decades.\nThere are five sequential steps for the successful repair of hypospadias: 1) Orthoplasty or penile\nstraightening, 2) Urethroplasty, 3) Meatoplasty and Glanuloplasty, 4) Scrotoplasty, and 5) Skin\nCoverage. The major technical advances in hypospadias surgery that have improved surgical outcomes\nare 1) Preservation of the urethral plate, 2) Incision of the urethral plate, 3) Dorsal midline plication, 4)\nDeepithelized urethroplasty dartos flap coverage, and 5) Two stage alternative techniques. This article\nreviews the pertinent embryology, anatomy and the most common hypospadias reconstructive\noperations to accomplish a successful repair.\nD 2006 Elsevier Inc. All rights reserved.\nHypospadias is one of the most common congenital\nanomalies occurring in approximately 1 of 200 to 1 of\n300 live births [1]. Hypospadias is defined by an abortive\ndevelopment of the urethral spongiosum and ventral\nprepuce along with an arrest in the normal embryological\ncorrection of penile curvature (Fig. 1). Hypospadias is a\ncontinuum with the majority of cases having an aberrant\nurethral meatus at the subcoronal margin, corona, or on the\nglans penis. Moderate and severe cases of hypospadias are\ncharacterized by a more proximal urethra opening located\non the penile shaft, scrotum, or perineum, respectively. In\ngeneral, the more severe forms of hypospadias tend to be\nassociated with a higher incidence of penile curvature as\nwell as penile–scrotal skin transposition. An uncommon\nvariation of hypospadias may present with an intact foreskin\nthat is typically uncovered at the time of a neonatal\ncircumcision. These patients more often than not have a\nblunder bust or megameatus.\n1. Anatomy, embryology, and etiology\nThe anatomy of the hypospadiac penis is similar to the\nnormal penis except on the ventral aspect where the abortive\nforeskin and arrested urethra and urethral spongiosum are\ndeficient [2]. Histological analysis has shown that the\nurethral plate in hypospadias is well vascularized, with\nsinusoids of abortive urethral spongiosum, and without scar\ntissue [3]. These features may explain the successful use of\nincorporating the urethral plate or abortive spongiosum into\nhypospadias reconstruction [4,5].\nThe nerves in both the normal and hypospadiac penises\nare also similar. The dorsal nerve arises from the pudendal\nnerve and continues as 2 well-defined bundles superior and\nslightly lateral to the urethra. As the 2 crural bodies\nconverge into the corporal cavernosal bodies, the nerves\ndiverge, spreading around the cavernosal bodies up to the\n0022-3468/$ – see front matter D 2006 Elsevier Inc. All rights reserved.\ndoi:10.1016/j.jpedsurg.2005.11.059\nB This work was supported by NIH grant DK058105.\n* Corresponding reviewer. Tel.: +1 415 476 1612; fax: +1 415 476 8849.\nE-mail address: lbaskin@urology.ucsf.edu (L.S. Baskin).\nIndex words:\nHypospadias;\nEmbryology;\nAnatomy;\nChordee;\nEndocrine disruptors;\nPediatrics\nJournal of Pediatric Surgery (2006) 41, 463–472\nwww.elsevier.com/locate/jpedsurg\n\njunction with the urethral spongiosum (Fig. 2). The\n12 o’clock position in the hypospadiac penis is spared of\nneuronal structures just as in a normal penis. At the hilum of\npenis, where the corporal bodies start to separate, the\ncavernosal nerves, which arise from the pelvic plexus, send\nneuronal nitric oxide synthase (nNOS)–positive fibers to\njoin the dorsal nerve of the penis, thereby changing the\nfunctional characteristics of the distal penile dorsal nerve\n(Fig. 2). Similarly, the nNOS-negative ventrally located\nperineal nerve originating from the pudendal nerve becomes\nnNOS-reactive at the cavernosa-spongiosal junction. The\nredundant wiring in the penis may be important in the\npreservation of erectile function [6].\nFormation of the external male genitalia is a complex\ndevelopmental process involving genetic programming, cell\ndifferentiation, hormonal signaling, enzyme activity, and\ntissue remodeling [7,8] (Fig. 3). Before the seventh week of\ngestation, the indistinguishable male and female genital\ntubercle forms. Genes from the sonic hedgehog, bone\nmorphogenetic protein, fibroblast growth factor, and Hox\nfamilies have been shown to be critical for nonandrogenic\ngenital differentiation. Between 7 and 8 weeks of gestation,\nthe male gonads differentiate under the influence of SRY\ngene products, resulting in the production of testosterone.\nOne of the first signs of masculinization is an increase in the\ndistance between the anus and the genital structures,\nFig. 1\nHypospadias. A, Glandular meatus. B, Subcoronal meatus. C, Midshaft hypospadias. D, Penoscrotal hypospadias. E, Scrotal\nhypospadias. F, Perineal hypospadias. The arrow denotes the location of the abnormal urethral meatus. Note that the more severe forms of\nhypospadias are typically associated with penile curvature (D-F).\nFig. 2\nPenile neuroanatomy. Computer-generated 3-dimensional reconstruction of normal human fetal penis. Turquoise represents the\nurethral spongiosum with the urethral lumen represented by dark blue. The skin is represented by brown. Note that the pathway of\nthe cavernosal nerves and dorsal nerves are away from the origin of the crural bodies (white), which is along the ischial tuberosity. The\ncavernosal nerves (pink) follow a more direct pathway to reach the penile hilum where they penetrate the corporal bodies under the pubic\narch (dark blue). As the cavernosal nerves (pink) travel close to the penile hilum, they send interconnecting fibers to the dorsal nerves\n(yellow) with subsequent positive immunostaining for nNOS (green). nNOS-positive dorsal nerves (green) travel on the corporal bodies\n(pink) to the glans (yellow).\nL.S. Baskin, M.B. Ebbers\n464\n\nfollowed by elongation of the phallus, formation of the\npenile urethra from the urethral groove, and development of\nthe prepuce [9,10]. The penile urethra forms as a result of\nfusion of the medial edges of the endodermal urethral folds\n[7]. Before 16 weeks of gestation, the glandular urethral\nappears. Recent evidence supports the concept of endoder-\nmal differentiation, which proposes that the epithelium of\nthe entire urethra is of urogenital sinus origin [11]. The\nentire male urethra, including the glandular urethra is\nformed by dorsal growth of the urethral plate into the\ngenital tubercle, as well as ventral growth and fusion of the\nurethral folds [12].\nThe future prepuce is forming at the same time as the\nurethra and is dependent on normal urethral development.\nAt about 8 weeks of gestation, low preputial folds appear on\nboth sides of the penile shaft, which join dorsally to form a\nflat ridge at the proximal edge of the corona. The ridge does\nnot entirely encircle the glans because it is blocked on the\nventrum by incomplete development of the urethra. If the\ngenital folds fail to fuse, the preputial tissues do not form\nventrally; consequently, preputial tissue is absent on the\nventrum and excessive dorsally, as in hypospadias.\nThe etiology of hypospadias remains unknown. Despite\nextensive efforts, less than 5% of all patients with\nhypospadias can be explained by androgen metabolism\n(5a-reductase type II deficiency) abnormalities, androgen\nreceptor defects, or genetic defects [13-17]. Genetic\nsyndromes, such hand-foot-genital syndrome, an extremely\nrare autosomal-dominant disorder characterized by a muta-\ntion in HOXA13, exhibit hypospadias of variable severity\n[18-20]. Therefore, the majority of cases of hypospadias\nare unexplained, especially the distal and penile shaft\nvarieties. In addition, the Centers for Disease Control and\nPrevention, as well as other centers around the world, has\nreported that the incidence of hypospadias has doubled since\nthe 1960s [21,22].\n2. Endocrine disruptors\nOne possible explanation for the worldwide increase in\nthe incidence of hypospadias may be environmental\ncontamination [1,23-29]. Many endocrine disruptor sub-\nFig. 3\nGenes, gonads, and genital differentiation. The urogenital ridge differentiates into the bipotential gonad under the influence of\nmultiple genes. The bipotential gonad differentiates into either a testes or ovary with subsequent male or female genital development from the\nindifferent genital stage (see text).\nTable 1\nSteps to successful hypospadias repair\n1. Orthoplasty (penile straightening)\n2. Urethroplasty\n3. Meatoplasty and glanuloplasty\n4. Scrotoplasty\n5. Skin coverage\nHypospadias: anatomy, etiology, and technique\n465\n\nstances ultimately find their way into freshwater and\nseawater in trace amounts and are therefore bioaccumulated\nand concentrated in higher organisms of the food chain. For\nthis reason, predators at the top of the food chain (large fish,\nbirds, sea mammals, and humans) accumulate and store high\nlevels of environmental contaminants in the adipose tissue.\nIn the past, environmental factors had generally been ruled\nout as causes for hypospadias. For example, familial\nclustering of hypospadias among first-degree relatives has\nbeen perceived as under the influence of a strong genetic\nand heritable component. In light of the growing number of\nendocrine disruptors reported in human tissue [30,31],\nenvironmental influences are now being considered as well,\ntaking into consideration families sharing similar exposure.\nThe increasing incidence over the past 30 years of male\nreproductive tract abnormalities co-occurring with the\nincreasing production and use of synthetic chemicals has\nraised concerns that environmental factors may play a role\nin the etiology of these problems (hypospadias, undescend-\ned testes, decreasing sperm count) [32,33].\nThe human males exposed in utero to diethylstilbestrol\n(DES) experience a broad range of reproductive tract\nproblems, including hypospadias [34,35]. The incidence of\nabnormalities of the urethra (4.4% vs 0%; P = .017) and\nproblems passing urine (12.9% vs 1.8%; P = .0003) were\nsignificantly higher in DES sons than controls [34]. The\nDES effects are probably not the result of genetic damage,\nbut instead the result of interrupted gene expression by\nxenobiotic compounds in utero. A thorough review of\nhuman exposure to endocrine disruptors resulting in genital\nabnormalities such as hypospadias has recently been\npublished [1]. Experimental data in animal models support\nthe hypothesis that maternal exposure to endocrine dis-\nruptors (estrogenic compounds) causes hypospadias in the\nfetus [36]. Activating transcription factor 3 has been shown\nto be elevated in humans with hypospadias and to be\nregulated by estrogenic compounds. It may be that\nenvironmental endocrine disruptors act at the genetic level\nto disrupt activating transcription factor 3, resulting in\nhypospadias [37].\n3. Treatment\nThe only treatment of hypospadias is surgical repair of\nthe anatomical defect [38-42]. The fact that more than 300\ndifferent operations are described in the literature is a\ntestament that treatment has not been perfected or standard-\nized [43,44]. Successful initial repair can be performed in\nthe majority of patients. However, this leaves a small\nnumber of patients with poor surgical outcomes. These\nunfortunate patients not only experience physical scarring\nwith abnormal genitalia from repeat surgeries, but have\ntrouble voiding normally (may need to sit down to urinate)\nand may have a poor cosmetic result [45,46]. Patients with\nhypospadias may also have difficulty with sexuality and\ndeveloping normal relationships [47].\nThe object of surgical treatment is to reconstruct a\nstraight penis with a slitlike meatus on the ventrum of the\nterminal aspect of the glans and to allow a forward-directed\nstream and normal coitus. There are 5 basic phases for a\nsuccessful hypospadias outcome (Table 1). These various\nelements of surgical technique can be applied either\nFig. 4\nAlgorithm for the repair of hypospadias.\nFig. 5\nA, The location of the hypospadiac urethral meatus is\ndistal, yet the quality of the supporting urethral spongiosum and\nskin is poor. Reconstruction will require cutting back the urethral\nmeatus to healthy tissue, thus changing the hypospadias from distal\nto proximal. B, Chordee without hypospadias is the occurrence of a\nnormal glans and urethral opening, but abnormal urethra along the\npenile shaft with poorly developed spongiosum.\nL.S. Baskin, M.B. Ebbers\n466\n\nsequentially or in various combinations to achieve a\nsurgical success.\nThe optimum timing for hypospadias surgery is at\n6 months old in an otherwise healthy newborn [48]. With\na pediatric anesthesiologist, caudal nerve blocks, and soft\ndiversion catheters, safe outpatient surgery is presently the\nstandard of care. In severe cases requiring 2 stages (or if a\nfistula develops), the second stage can be performed after\ncomplete wound healing, 6 months from the initial repair at\napproximately 1 year old. Early surgery avoids the\nseparation anxiety of the toddler and avoids genital surgery\nbefore potty training and ambulation.\nThe technique chosen for hypospadias repair is depen-\ndent on the finding at the time of surgery (Fig. 4). Key\ndecision points are the quality of skin and spongiosum of\nthe abnormal urethral meatus (Fig. 5). For example, a\nglandular or distal hypospadias may have poor-quality\nurethral spongiosum and skin, and reconstruction would\nrequire cutting back the healthy urethra, in essence,\nchanging the hypospadias from distal to proximal\n(Fig. 5A). The urethra may alternatively have a normal\nglans and urethral opening, but be abnormal along the penile\nshaft with poorly developed spongiosum, the so-called\nchordee without hypospadias (Fig. 5B). This would require\na penile urethroplasty with a flap or tubularization tech-\nnique. The configuration of the glans is also an important\nfactor in hypospadias surgery. A deep glanular groove is\nconducive to primary tubularization (Figs. 1A,B and 6B),\nwhereas a flattened glans will require a flap or incision\nprocedure (Fig. 1C-F).\n4. Anterior hypospadias\nThe treatment of anterior hypospadias is dependent on\nthe cultural preference of the child’s family. Many patients\nwith anterior hypospadias do not have a functional defect of\nsignificant penile curvature and will be able to stand and\nvoid with a straight stream. Therefore, the goal of placing\nthe meatus in its normal position within the glans is\nessentially cosmetic. The outcome needs to be as close to\nperfect as possible. The present standard is outpatient\nsurgery, typically without the need for urethral stents. The\ntechnique chosen will depend on the anatomy of the\nhypospadiac penis. The most common accepted procedures\nare the meatal advancement glansplasty (MAGPI), the glans\napproximation procedure (GAP), the Mathieu or flip-flap,\nand the Snodgrass modification or tubularized incised plate\nurethroplasty [4,49-53]. The MAGPI technique has been\ndescribed in detail and withstood the test of time (Fig. 6A\nand B) [54].\nThe GAP procedure is applicable in a small subset of\npatients with anterior hypospadias who have a wide and\ndeep glandular groove (Fig. 6C and D) [51]. These patients\ndo not have a bridge of glandular tissue that typically\ndeflects the urinary stream, as seen in those patients who\nwould be more appropriately treated with the MAGPI\nFig. 7\nTubularized incised plate urethroplasty. A, Incision in the\nurethral plate down to corporal tissue. B, Tubularization of the\nneourethral with subsequent glansplasty.\nFig. 6\nHypospadias variations, surgical choices, and outcomes. A, MAGPI procedure with coronal meatus and glandular web of tissue.\nB, Postoperative result after MAGPI. C, GAP procedure with deep glanular groove and wide urethral plate. D, Postoperative GAP result.\nE, Onlay island flap procedure for penoscrotal hypospadias with narrow and thin urethral plate. F, Postoperative onlay flap result. G, Chordee\nwithout hypospadias treated with urethral augmentation with an onlay island preputial flap. H, Postoperative onlay flap result. I, Severe\nhypospadias with penile curvature and penoscrotal transposition. J, Attached foreskin (arrowheads) to the penoscrotal transposition.\nThe forceps is pointing to the longitudinal blood supply in the prepuce. Long arrows denote location of hypospadiac urethral meatus A, C, E,\nG, and I.\nHypospadias: anatomy, etiology, and technique\n467\n\nprocedure. In the GAP procedure, the wide mouth urethra is\nprimarily tabularized, followed by a formal glansplasty.\n5. Primary tubularization and\nSnodgrass modification\nPrimary tubularization, also known as the Thiersch-\nDuplay procedure, can be applied to patients with a deep\nglandular groove and wide urethral plate for both distal and\nproximal penile shaft hypospadias [55,56]. Historically, if\nthe urethral groove was not wide enough for tubularization\nin situ, then alternative approaches such as the Mathieu or a\nvascularized pedicle flap were performed [52]. Recently,\nthe concept of the incision in the urethral plate with\nsubsequent tubularization and secondary healing introduced\nby Snodgrass has revolutionized hypospadias surgery\n(Fig. 7) [4]. Short-term results have been excellent, and\nthis procedure is enjoying extensive popularity [50]. One\nappealing aspect is the slitlike meatus, which is created\nwith the dorsal midline incision. More recently, this\ntechnique has been applied to more posterior forms of\nhypospadias [57]. Theoretically, there is concern about the\npossibility of meatal stenosis from scarring, which occurs\nin patients with urethral stricture disease where direct\nvision internal urethrotomy often leads to recurrent\nstricture. However, reports of meatal stenosis have been\nrare [5,58]. In hypospadias, the native virgin tissue with\nexcellent blood supply and large vascular sinuses seems to\nrespond to primary incision and secondary healing without\nscar [2,3]. The tubularized incised plate urethroplasty in\npatients without penile curvature is also conducive to\npreservation of the foreskin.\n6. Treatment of posterior hypospadias\n6.1. The urethral plate\nDuckett has popularized the concept of preservation of\nthe urethral plate, which is now standard practice for all but\nthe most severe hypospadias [38,40]. The urethral plate\nserves as the dorsal urethral wall and a vascular onlay flap\nof tissue from the inner prepuce creates the ventral urethra.\nExtensive experience has shown that the urethral plate is\nrarely the cause of penile curvature (Fig. 8). This knowledge\nwas gained by repetitive resection of the urethral plate with\nsubsequent repeat artificial erection showing that there was\nno gain in correction of penile curvature [59]. Further efforts\nand experience showed that the urethral plate is supple and\npliable and ancillary penile strengthening procedures with\nFig. 9\nOnlay preputial island flap. A, The split prepuce in situ\ntechnique for dissection of a short vascularized onlay island flap\nwith the remaining prepuce for a second layer. B, Horseshoe\nvascularized onlay island flap to bridge long urethral deficit.\nC, Buttonhole technique to transfer an onlay flap from the dorsal\nto ventral aspect of the penis preventing penile torsion. D, De-\nepithelized flap being secured to the ventral urethroplasty for\nsecondary coverage to prevent fistula.\nFig. 8\nEvidence for preservation of the urethral plate. A, Penile\ncurvature with preservation of the urethral plate. B, Resection of\nthe urethral plate with continued severe curvature. C, Penile\ncurvature with preservation of the urethral plate. D, Resection of\nthe urethral plate with continued severe curvature. Extensive\nexperience as illustrated by these examples has shown that the\nurethral plate is rarely the cause of penile curvature.\nL.S. Baskin, M.B. Ebbers\n468\n\npreservation of the urethral plate lead to decreased\ncomplications, such as fistula and stenosis at the proximal\nanastomosis [38]. The concept of preserving the urethral\nplate, yet undermining the plate, thus exposing the corporal\nbodies with the idea that chordee tissue could be released\nhas not held true [60,61]. In fact, careful anatomical studies\nhave shown that there are an extensive network of blood\nvessels supplying the urethral plate in the hypospadiac penis\nand that lifting of the urethral plate defeats the purpose of\npreservation by violating this intricate blood supply [2,3].\nHistorically, posterior hypospadias was approached by\ncomplete resection of the abnormal urethra and all tissue\ndown to normal corporal bodies. The urethra was replaced\nby a tubularized vascular preputial flap, from either the\ninner prepuce or outer prepuce [62-64]. At present, in the\nmajority of posterior hypospadias, including perineal\nhypospadias, the urethral plate can be preserved and a\nvascularized flap used in an onlay fashion or a Snodgrass\nmodification with tubularization. In the rare case when the\nurethral plate needs to be resected, a 2-stage technique can\nbe used (see below).\n7. Onlay island flap\nThe blood supply to the hypospadias preputial tissue is\nreliable and easily delineated (Fig. 9) [65,66]. The\nabundance of cutaneous preputial tissue on the dorsum of\nthe penis is vascularized in a longitudinal fashion (Fig. 6J)\n[67]. This tissue may be dissected from the penile skin,\ncreating an island flap from the inner layer of the prepuce.\nFor shorter repairs, the vascularized onlay island flap may\nbe created from one half of the prepuce leaving the\nFig. 10\nSchematic 2-stage Bracka buccal hypospadias Repair. First stage: A, Patient with a midshaft hypospadias, scarring, and a paucity\nof available skin after multiple previous hypospadias repairs. Resection of scar tissue. B, Mobilization of glans wings. C, Buccal free graft\nquilted into the resected scar. D, Bolster dressing. Second stage: after 6 months of healing. E, Exposure of glans mesenchyme and trimming\nof buccal graft for subsequent urethroplasty. F, Urethroplasty. G, Secondary de-epithelized pedicle coverage of the urethroplasty. H, Two-\nlayer glansplasty and completed repair.\nFig. 11\nMidline dorsal plication technique. In this technique,\nparallel plication sutures are placed in the tunica albuginea in the\n12 o’clock position, which is free of both nerves and vascular\nstructures. This technique causes a minimum amount of manipu-\nlation to the penis. It is not necessary to incise into the corporeal\nbody or extensively mobilize Buck’s fascia. If the curvature is\nsevere, a maximum 2 rows of parallel plications at the 12 o’clock\nposition can be placed for correction.\nHypospadias: anatomy, etiology, and technique\n469\n\nremaining half as secondary coverage (Fig. 9A) [68].\nAlternatively, a long horseshoe shaped flap may be designed\nto bridge an extensive urethral defect (Fig. 9B). The onlay\nflap can also be used as secondary coverage to cover an\nexposed suture line [69]. A midline buttonhole technique\navoids penile torsion from bringing the flap around either\nside of the penis (Fig. 9C). The flap is de-epithelized and\nsutured over the urethroplasty to prevent fistula formation\n(Fig. 9D).\nFor posterior hypospadias, all cases are approached by\ninitially leaving the urethral plate intact. This includes\npatients with and without penile curvature. This technique\ncan be applied to penile shaft as well as scrotal and perineal\nhypospadias (Fig. 6E and F). The intact dorsal plate avoids\ncomplications of proximal stricture, and the excellent blood\nsupply has decreased the fistula rate to approximately 5% to\n10% for all cases of onlay island flap hypospadias repair\n[38]. Long-term results with the onlay island flap have been\nvery durable [60,70,71]. The onlay island flap can also be\napplied to chordee without hypospadias (Fig. 6G and H). In\nthis situation, the urethra is thin and atretic, requiring\naugmentation.\nThe technique using the transverse tubularized island flap\nwas extensively used before the concept of preservation of\nthe urethral plate. It is still successful for severe cases when\nthe urethral plate needs to be resected although long-term\nproblems with diverticulum have required a high reopera-\ntion rate [64]. Presently, a 2-stage approach is more\ncommonly used.\n8. Two-stage hypospadias repair\nAn alternative approach for severe hypospadias is to\ntransfer the dorsal prepuce to the ventrum after correction of\npenile curvature. In severe cases, the urethral plate may need\nto be resected to correct chordee (Fig. 6I). Alternatively, the\nprepuce maybe attached to the penoscrotal transposition\n(Fig. 6J), making flap dissection suboptimal for bridging a\nlong urethral defect (Fig. 9B). Dermal grafting may be\nrequired, and performing a urethroplasty on top of the\nhealing graft is not recommended [72,73]. Byars flaps can\nbe rotated from the dorsum, setting up ventral coverage for\nsubsequent urethroplasty [74]. The second stage is per-\nformed at least 6 months after the first stage. To facilitate the\nurethroplasty within the glans, during the first stage, dorsal\nskin is tucked within the glans wings. Subcutaneous\nsecondary coverage of the reconstructed urethra is per-\nformed to prevent fistula.\n9. Bracka buccal 2-stage repair\nFor patients with prior surgery or with severe hypospadias,\nBracka has described a buccal free-graft 2-stage repair\n[46,75]. In the first stage, the penis is straightened and the\nscarred urethra is discarded (Fig. 10A-D). Buccal mucosa is\nharvested from either the check or lip and grafted to the\nprepared bed [76]. During the first stage, glans wings are\nmobilized in preparation for the creation of a conical glans\nand slitlike meatus during the second stage. Extensive\nquilting of the graft is performed to prevent hematoma from\nlifting off the buccal mucosa. The graft is secured with a\nbolster. The second-stage urethroplasty is undertaken at least\n6 months after the first stage. In the second stage, excess\nbuccal mucosa is trimmed off the glans, setting up a 2-layer\nglans closure (Fig. 10E-H). The buccal mucosa is rolled into\nthe new urethra and subcutaneous tissue is used for secondary\ncoverage. Bracka has reported outstanding results for\ncomplex redo hypospadias and severe primary hypospadias\nwith the 2-stage approach [75].\n10. Penile curvature (chordee)\nCorrection of penile curvature has also evolved along with\nthe concept of preservation of the urethral plate. Artificial\nerection introduced by Gittes and McLaughlin in 1974 [77]\nhas provided a mechanism to check for penile curvature and\nthe immediate success of correction at the time of surgery.\nKaplan and Lamm [78] put forth a convincing case that\nchordee may be an arrest of normal embryological develop-\nment analogous to failure of testicular descent. In reality, all\npenises have chordee during development [7,13]. Thus, it is\nno surprise that fibrosis is conspicuously absent in the\nmajority of cases of ventral curvature.\nApproximately 5% of patients will need ancillary penile\nstraightening procedures after releasing skin chordee by\naggressive dissection to the penile scrotal junction [38,79].\nBased on anatomical studies of the human fetal penis, a\nsimpler approach placing dorsal midline plication sutures in\nthe nerve-free zone at 12 o’clock position is now advocated\n[2]. The midline dorsal plication avoids the need for\nmobilization of the neurovascular bundle [80]. The midline\nplication can be applied to mild and moderate degrees\nof curvature (Fig. 11). If more than 2 rows of plication\nsutures or more than 4 permanent sutures are necessary, then\nan alternative approach, such as complete resection of the\nurethral plate and dermal grafting, should be considered [81].\nDuring artificial erection, if the chordee cannot be corrected\nwith your finger, the midline dorsal plication is not advised.\nA glans tilt may also be removed by permanent sutures on\nthe dorsum, but care must be taken to avoid the neuro-\nvascular structures supplying the glans [2].\nTable 2\nTechnical advances in hypospadias\nPreservation of the urethral plate\nIncision of the urethral plate\nDorsal midline plication\nDe-epithelized urethroplasty coverage\nTwo-stage alternative\nL.S. Baskin, M.B. Ebbers\n470\n\n11. Complications and outcomes\nThe major complication of hypospadias surgery is fistula\nformation, urethral stricture, a retrusive or proximal meatus,\nresidual curvature, and cosmetic abnormalities. These com-\nplications can be generally be avoided by sequentially\nfollowing the 5 steps of hypospadias repair (Table 1).\nNevertheless, when complications do occur, they can be\ncorrected by adhering to the basic principles of tissue healing.\nFor example, a urethral cutaneous fistula can be closed in\nmultiple layers after checking for underlying etiologic\nfactors, such as urethral stenosis. Fistulas at the coronal\nmargin should be corrected by redoing the glansplasty and\nurethroplasty because obtaining adequate subcutaneous skin\ncoverage in this location is difficult [82,83]. Urethral stenosis\nis a more difficult problem and usually requires a redo\nurethroplasty and, in more severe cases, a 2-stage alternative\napproach that removes the scarred urethra.\nEvidence-based long-term outcomes of hypospadias\nsurgery are lacking. The few published studies report mixed\nresults [41,42,45,47,84]. Suffice it to say that longitudinal\noutcome studies are critical to evaluate the success of our\npresent technique.\n12. Conclusion\nHypospadias reconstruction remains one of the most\nchallenging fields of surgery. The modern era of hypospa-\ndias surgery has seen major technical advances (Table 2). In\nthe future, anatomical studies, basic science research and\nsurgical innovation will continue to improve the outlook for\nall patients with hypospadias.\n\nReferences\n[1] Baskin LS, Colborn T, Himes K. Hypospadias and endocrine\ndisruption: is there a connection? Environ Health Perspect 2001;\n109:1175-83.\n[2] Baskin LS, Erol A, Li YW, et al. Anatomical studies of hypospadias.\nJ Urol 1998;160(3 Pt 2):1108-15.\n[3] Erol A, Baskin LS, Li YW, et al. Anatomical studies of the urethral\nplate: why preservation of the urethral plate is important in\nhypospadias repair. BJU Int 2000;85(6):728-34.\n[4] Snodgrass W. Tubularized, incised plate urethroplasty for distal\nhypospadias. J Urol 1994;151(2):464-5.\n[5] Cheng EY, Vemulapalli SN, Kropp BP, et al. Snodgrass hypospadias\nrepair with vascularized dartos flap: the perfect repair for virgin cases\nof hypospadias? J Urol 2002;168(4 Pt 2):1723-6 [discussion 1726].\n[6] Yucel S, Baskin LS. Identification of communicating branches among\nthe dorsal, perineal and cavernous nerves of the penis. J Urol 2003;\n170(1):153-8.\n[7] Baskin LS, Erol A, Li Y, et al. Urethral seam formation and\nhypospadias. Cell Tissue Res 2001;305:379-87.\n[8] Cunha G, Baskin L. Development of the penile urethra. In: Baskin LS,\neditor. Hypospadias and genital development. Philadelphia7 Kluwer\nAcademic/Plenum; 2004. p. 87-100.\n[9] Jirasek J, Raboch J, Uher J. sease. Plast Reconstr Surg 1973;\n52:503.\n[82] Baskin LS, Canning DA, Snyder HM, et al. Surgical repair of urethral\ncircumcision injuries. J Urol 1997;158(6):2269-71.\n[83] Baskin LS, Canning DA, Snyder HM, et al. Treating complications of\ncircumcision. Pediatr Emerg Care 1996;12(1):62-8.\n[84] Mureau MA, Slijper FM, Slob AK, et al. Satisfaction with penile\nappearance after hypospadias surgery: the patient and surgeon view.\nJ Urol 1996;155(2):703-6.\nL.S. Baskin, M.B. Ebbers\n472"}, {"message_id": "1871149131939693049", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f7a838c30bc1f9", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-19T10:14:12", "subject": "how to analyse a paper?", "original_title": "How to Read a Research Paper", "smart_title": "Guia prático (Nature Careers) — leitura crítica de artigos científicos · University of Cambridge, 2026", "email_summary": "Lisieux reencaminhou este artigo da secção Careers da Nature (não é um estudo clínico) sem comentário próprio, além da assinatura habitual do grupo Uroped.", "abstract_text": "", "bullets_summary": "Não é um artigo de investigação — é um texto de opinião/orientação da secção \"Work/Careers\" da Nature, sem abstract formal (por isso o campo abstract fica vazio aqui, apesar de a extração automática ter inicialmente capturado um trecho por engano)\nAutor: Jacques Cornwell, doutorando em patologia em Cambridge, propõe um método de 7 passos em 3 fases para ler criticamente um artigo científico\nFase 1 \"vista aérea\": (1) visão geral via abstract/figuras, (2) identificar a pergunta de investigação real (normalmente no fim da introdução), (3) mapear a lacuna de conhecimento que o artigo tenta preencher\nFase 2 \"interrogatório\": (4) avaliar a metodologia — ferramentas certas, tamanho amostral/poder estatístico, controlos positivos/negativos, disponibilidade de dados brutos e código; (5) ler primeiro os resultados/figuras e formar conclusão própria ANTES de ler a discussão dos autores\nFase 3 \"veredito\": (6) confrontar a própria conclusão com a dos autores (procurando exagero de linguagem); (7) procurar explicações alternativas, variáveis confundidoras, limitações não reconhecidas e conflitos de interesse\nRecomenda 1-2h por artigo (3-4h para quem está a aprender o método) — reservado para os artigos de maior impacto, não para leitura de fundo geral; o autor evita IA especificamente nesta fase de leitura profunda, para preservar o próprio raciocínio crítico", "long_summary": "Este texto é diferente dos outros artigos desta semana: não é um estudo de investigação em cirurgia pediátrica, mas sim um artigo da secção \"Work/Careers\" da revista Nature (Vol. 654, 18 de junho de 2026), escrito por Jacques Cornwell, doutorando em patologia na Universidade de Cambridge, sobre COMO ler criticamente um artigo científico. Por não ser um estudo primário, não tem um abstract estruturado no sentido tradicional — a extração automática do PDF inicialmente capturou por engano um trecho do corpo do texto como se fosse abstract (um falso positivo da heurística de deteção), pelo que optei por deixar esse campo vazio nesta síntese, em vez de apresentar algo incorreto.\n\nCornwell propõe um método pessoal de 7 passos, organizados em 3 fases, que diz aplicar tanto à leitura para o seu próprio trabalho como à revisão formal por pares.\n\nA Fase 1, \"vista aérea\", foca-se em ganhar contexto antes de mergulhar nos detalhes: primeiro, uma visão geral rápida via abstract e figuras, para perceber que tipo de estudo é (coorte longitudinal? knockout CRISPR? modelo computacional?); segundo, identificar a verdadeira pergunta de investigação, que raramente está só no título/abstract — normalmente aparece no final da introdução, como hipótese específica testada; terceiro, mapear a lacuna de conhecimento que o artigo tenta preencher, perguntando o que já se sabia antes e porque é que preencher essa lacuna importa.\n\nA Fase 2, \"interrogatório\", é onde o autor recomenda maior rigor: avaliar se a metodologia é adequada à pergunta (ex.: uma linha celular imortalizada muito adaptada pode dar resultados muito diferentes de células primárias de doentes); verificar se a amostra tem poder estatístico suficiente (procurar o cálculo de poder na secção de métodos); confirmar a existência de controlos positivos e negativos apropriados; e verificar se os dados brutos e o código/pipeline computacional estão disponíveis publicamente (em repositórios como o Gene Expression Omnibus do NCBI) — a ausência disso, ou dados \"disponíveis a pedido\", é sinalizada como uma bandeira de alerta para a verificação por pares. Um conselho prático central: ler primeiro os resultados e as figuras, formando a própria conclusão SÓ com base nos dados, antes de ler a secção de discussão — porque os autores, tendo escrito o artigo, já chegaram inevitavelmente à sua própria interpretação.\n\nA Fase 3, \"veredito\", confronta a conclusão própria do leitor com a dos autores: será que a linguagem da discussão é mais forte do que os dados realmente sustentam? E, por fim, procurar explicações alternativas ou variáveis confundidoras não consideradas (por exemplo, estatuto socioeconómico em estudos clínicos, ou erros de calibração de equipamento em bancada), verificar se os autores reconhecem honestamente as limitações do próprio estudo, e considerar potenciais conflitos de interesse financeiros que possam enviesar a linguagem das conclusões.\n\nCornwell estima que este processo demora 1-2 horas por artigo (3-4 horas para quem está a começar a aplicá-lo), e deixa claro que o reserva para os artigos de maior impacto para a sua própria investigação — não para leitura de fundo geral, dado o volume da literatura atual. Nota interessante, dado o contexto: o autor evita deliberadamente usar inteligência artificial para esta fase de leitura profunda e crítica especificamente, para preservar a sua própria intuição científica, embora admita usá-la para navegação geral da literatura. O artigo inclui ainda uma secção paralela (aparentemente de um segundo autor, Rao Uppu, professor de toxicologia ambiental) sobre a importância de manter competências laboratoriais fundamentais (preparar tampões, cálculos de concentração) mesmo numa era de kits de ensaio padronizados.", "full_text_formatted": "R\neading a primary-research paper can \nfeel like trying to decipher an ancient \ntext, or at least it has in my career. \nFrom a foundation in biomedical sci­\nence and medicine, I am now a trainee \nin paediatrics working towards a PhD in pathol­\nogy at the University of Cambridge, UK. This \nwork involves using systems biology to inves­\ntigate mechanisms of therapy resistance in \nsome cancers in children. As I build towards \nmy goal of becoming a physician-scientist, I \nam continually reading massive amounts of \ncomplex, dense literature.\nAlthough there is no universal framework \nfor pulling apart a dense primary paper, hav­\ning a consistent method is crucial. I now apply \nthe same foundational technique whether I \nam reading an article for my own work or con­\nducting formal peer review for a journal. When \nsupervising medical students, I explain that \nyou cannot simply read a paper from start to \nfinish like a novel, regardless of what side of \nthe publication process you are on. You need \na more systematic approach if you want to \ndeconstruct the authors’ arguments, verify \ntheir data and form your own conclusions.\nTo help to bridge the gap between passively \nreading literature and actively analysing it, I’ve \ndeveloped a seven-step framework, split into \nthree phases. I usually record my thoughts \nwith pen and paper in a laboratory notebook, \nbut including the same information in the \nrelevant section of reference management \nsoftware also works.\nPhase 1: the aerial view\nBefore you get bogged down in the minutiae \nof P values and complex assays, you need to \nunderstand the landscape of the paper. This \nphase is about gathering context.\nHOW TO READ A \nRESEARCH PAPER\nUsing a clear strategy lets you get the most \nout of the literature. By Jacques Cornwell\nFIZKES / SHUTTERSTOCK\nAnalysing papers systematically allows you to critique authors’ arguments and verify data.\none about a specific equation crucial to their \nresearch, one on molarity calculations, one \non preparing a buffer and one about titra­\ntion. He was given the keys to the lab only \nafter answering. Another colleague told me \nthat his professor deliberately kept the lab’s \nkymograph (a tool for plotting data) dis­\nmantled, just to see whether students could \nreassemble and use it correctly.\nTo today’s students, these practices might \nsound eccentric or even unreasonable. But \nsuch behaviours cultivated an attentiveness \nto the mechanics of scientific enquiry. I often \nsay that the elements that most interest me \nin the lab are the basics: washing glassware \nproperly, collecting good-quality water, pipet­\nting with care and weighing accurately. The \ncraftsmanship of these simple tasks underpins \nreal science.\nI am not suggesting that scientists were \ntrained ‘better’ a few decades ago, nor that \ncontemporary approaches are deficient. \nTraining environments simply emphasized \ndistinct aspects of lab work. Previously, bio­\nmedical techniques often required students to \nengage directly with underlying calculations, \nreagent preparation and how instruments \nwork, making some forms of methodological \nreasoning more visible on a day-to-day basis. \nToday’s research culture, shaped by speed, \nspecialization and technological sophistica­\ntion, prioritizes other skills.\nFostering skills\nIt is possible to promote an understanding \nof fundamental principles without turn­\ning back the clock. In my lab, we actively \nencourage experimental practices, requir­\ning that students prepare buffers, perform \nconcentration calculations and articulate \nassay principles. We also ask trainees to \ndiscuss experiments in depth, brainstorm \nalternative approaches and, when feasible, \nconsider whether the procedures could be \nperformed using simpler reagent combi­\nnations while identifying opportunities for \nimprovement. The goal is not to replace stand­\nardized kits, but to ensure that convenience \ndoes not displace a strong understanding of \nthe chemical and biological logic underlying \nthe methods.\nAnd when a kit is used, I ask for a ‘step map’, \na short explanation of what each step accom­\nplishes and what would change if a given \ncondition were altered. Small expectations \nsuch as these reinforce experimental reasoning \nand help to maintain the interpretive habits \nthat underlie robust experimentation.\nAt a time when assay kits are becoming \nmore and more prominent, it is still possible \nto foster good experimental understanding.\nRao M. Uppu is a professor of environmental \ntoxicology and chemistry at Southern \nUniversity in Baton Rouge, Louisiana.\n828  |  Nature  |  Vol 654  |  18 June 2026\nWork / Careers\n\nStep 1: get a broad overview. Resist the urge \nto dive straight into dense methodology. \nInstead, scan the abstract and review the fig­\nures to get a high-level understanding of how \nthe research was conducted. For example, \nis this a longitudinal cohort study, a CRISPR \nknockout screen or a computational model? \nGetting a broad sense of the tools and scope \nearly on will anchor your understanding when \nyou read the rest of the paper.\nStep 2: identify the core research question. \nEvery good piece of research hinges on a sin­\ngle, definable question. Although the title and \nabstract offer hints, the true research ques­\ntion is usually found at the end of the intro­\nduction. Find out what specific hypothesis \nis being tested and make a note of it. As you \nread through the rest of the study, refer back \nto this to see whether the authors stayed on \ntrack.\nStep 3: map the existing knowledge gap. \nResearch doesn’t happen in a vacuum; it \nbuilds on previous work. A critical reader \nshould understand why the research is being \nconducted at that moment. Read the intro­\nduction to see how the authors frame the \ncurrent state of the field. I try to get some \nquestions clear in my head before reading \non: what is already known about this topic? \nWhat piece of the puzzle is this paper trying \nto fill? Why does filling this gap matter?\nPhase 2: the interrogation\nThis is when I roll up my sleeves and get into \nthe details. Now that you understand what \nthe authors are trying to achieve, you must \nevaluate how well they did it.\nStep 4: assess the methodology. This is often \nthe most challenging yet most crucial step \nof critical appraisal. You must compare the \ncore research question from step 2 against \nthe paper’s methodology and determine how \nappropriate the experimental design was.\n• Did the authors use the right tools for the \njob? For example, using a highly adapted, \nimmortalized cell line to study a specific \nmetabolic pathway might yield vastly dif­\nferent results compared with using primary \npatient-derived cells or whole model organ­\nisms.\n• Is the sample size large enough to pro­\nvide adequate statistical power? Check the \nmethods section for a power analysis. This \ncalculation uses the expected effect size \nand a significance level (usually α = 0.05) to \ndetermine the minimum sample size required \nto avoid a type two error (false negative). If a \nstudy is underpowered, the authors might \nconclude that a treatment or intervention \nhas no effect simply because there weren’t \nenough data or they might report a significant \neffect that is actually a statistical fluke.\n• Did they use appropriate positive and \nnegative controls? For instance, if establish­\ning whether a compound kills cancer cells, a \npositive control (such as a known, highly toxic \nchemotherapy) proves that their assay cor­\nrectly measures cell death. A negative control \n(such as treating the cells with only the solvent \nthat the drug was dissolved in) ensures that \nthe solvent itself isn’t responsible for the cell \ndeath.\n• Are the raw data sets (such as sequencing \nreads or patient metadata) publicly accessible \nin repositories such as NCBI’s Gene Expres­\nsion Omnibus or the European Nucleotide \nArchive? Providing raw data allows inde­\npendent researchers to verify the findings \nthrough reanalysis, which is a cornerstone \nof the scientific method and guards against \naccidental errors or data manipulation. If the \ndata are “available on request”, it often signals \na barrier to peer verification.\n• Have the authors provided the computa­\ntional pipelines or scripts used to generate \ntheir models? For example, a study involving \ncomplex bioinformatics should ideally link \nto a GitHub repository or a Docker container \ncontaining the exact R or Python scripts used. \nThis allows other researchers to replicate the \nexact digital workflow to see if they achieve \nthe same results.\nStep 5: reach your own conclusion. \nA common mistake is reading the authors’ \ndiscussion section before looking at the \ndata. The discussion is the section in which \nthe authors interpret their data and, because \nthey’ve written a paper about the results, you \ncan be fairly confident that they’ve reached \ntheir own hypothesis. Instead, skip the discus­\nsion and go straight to the results section and \nfigures. Look at the graphs, read the tables \nand check the error bars. Ask yourself: “What \ndo these data show?” Formulate your own \nconclusion solely on the basis of the num­\nbers and visual data presented. Make a note \nof that conclusion so you can compare it with \nthe authors’.\nPhase 3: the verdict\nIn the final phase, you will bring your analysis \nface-to-face with the authors’ narrative to see \nwhether their conclusions hold up.\nStep 6: reconcile the authors’ conclusion \nagainst your own. Now, read the authors’ \ndiscussion and conclusion. Compare their \ninterpretation of the data with the independ­\nent conclusion that you formed previously. \nDo their assertions align with the raw data? \nAre they overstating their findings? It is com­\nmon for researchers to use strong, definitive \nlanguage in their conclusions even when the \ndata show only a weak correlation. Your goal \nhere is to separate the factual, data-driven \nresults from the authors’ narrative.\nStep 7: consider alternative explanations \nor confounding factors. No study is perfect. \nBefore finalizing your appraisal, play devil’s \nadvocate. Even if the data are sound and the \nmethods are appropriate, could something \nelse be driving the results?\nLook for confounding variables: were there \nhidden factors (such as socio-economic sta­\ntus in clinical studies or equipment calibra­\ntion errors in bench science) that could have \nskewed the results?\nCheck the limitations: do the authors \nacknowledge the weaknesses of their own \nstudy? A trustworthy paper will be highly \ntransparent about its own limitations. If \nalternative explanations aren’t addressed, it \nweakens the validity of the paper.\nAre the authors heavily funded by the com­\npany manufacturing the assay or drug? Do they \nhold patents on the diagnostic algorithms? \nAlthough this does not automatically inval­\nidate the science, it is a crucial lens through \nwhich to view any strong, definitive language \nused in their conclusions.\nCritically analysing a research paper is a \nskill that takes practice. It is an intensive pro­\ncess that takes me about an hour or two per \npaper, and I actively encourage my students \nto take three or four hours when they first \napply this method. You might worry about \nhow to manage this time commitment given \nthe massive volume of new literature, but this \ndeep-dive approach is meant for the high-im­\npact papers that shape your specific research \nquestion, rather than for the broader back­\nground reading.\nAlthough using artificial intelligence to \nsummarize literature is becoming popular, I \navoid using it for this deep-dive process. I do \nuse AI to help navigate the literature gener­\nally, but I want to retain the ability to critically \ndissect a paper myself —maintaining my own \nscientific intuition. The goal of this exercise is \nto build your own analytical mental muscles. \nUltimately, by breaking the process down into \nthese three phases, you can approach any \npaper systematically.\nThis seven-step process can help to ensure \nthat you are not just passively absorbing \ninformation but are actively engaging with \nthe science to determine its true value and \nvalidity.\nJacques Cornwell is a PhD student in \npathology at the University of Cambridge, UK.\n“A critical reader should \nunderstand why the \nresearch is being \nconducted at that \nmoment.”\nNature  |  Vol 654  |  18 June 2026  |  829"}, {"message_id": "1871143626734848565", "gmail_web_link": "https://mail.google.com/mail/u/0/#all/19f7a336fb444a35", "sender_name": "Lisieux Eyer de Jesus", "sender_email": "lisieuxeyerdejesus@gmail.com", "sender_is_owner": false, "date": "2026-07-19T08:46:38", "subject": "Acesso via subclavia", "original_title": "Subclavian approach without ultrasound guidance is safe and effective for pediatric central venous access", "smart_title": "Estudo de coorte prospectivo — acesso venoso central subclávio sem ecoguiagem em oncologia pediátrica · MD Anderson Cancer Center, Houston, 2026", "email_summary": "Lisieux partilhou este artigo no grupo Uroped sem comentário próprio no corpo do e-mail (o comentário dela sobre os vieses do estudo está num e-mail separado, mais antigo, sobre o mesmo tema).", "abstract_text": ", a published lecture, ac-\nademic thesis or registered report\n• The article is not under consideration for publication elsewhere\n• The article's publication is approved by all authors
