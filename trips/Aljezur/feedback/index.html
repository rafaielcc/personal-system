<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Travel Log" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Travel Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #d4cfc7;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
    }
    #app {
      max-width: 480px; margin: 0 auto;
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; flex-direction: column;
    }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 16px; border-bottom: 1px solid #1a1a1a;
      position: sticky; top: 0; background: #0d0d0d; z-index: 10;
    }
    .header-title { font-size: 13px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }
    .logo-mark { font-size: 18px; color: #c8a96e; width: 32px; text-align: center; }
    .back-btn {
      background: none; border: none; color: #666; font-size: 22px;
      cursor: pointer; width: 32px; font-family: 'Georgia', serif;
      line-height: 1; padding: 0; -webkit-tap-highlight-color: transparent;
    }
    .export-btn {
      background: none; border: 1px solid #2a2a2a; border-radius: 2px;
      color: #555; font-size: 13px; cursor: pointer; padding: 6px 12px;
      font-family: 'Georgia', serif; -webkit-tap-highlight-color: transparent;
    }
    .spacer { width: 32px; }

    /* EMPTY */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 60px 40px; gap: 12px;
    }
    .empty-icon { font-size: 36px; color: #2a2a2a; }
    .empty-titulo { font-size: 17px; color: #444; }
    .empty-sub { font-size: 13px; color: #333; font-style: italic; text-align: center; line-height: 1.6; }

    /* LISTA */
    .lista { flex: 1; padding: 12px 16px 100px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: #111; border: 1px solid #1e1e1e; border-radius: 2px; padding: 16px 16px 12px; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .card-emoji { font-size: 14px; }
    .card-cat { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .card-stars { font-size: 12px; color: #c8a96e; margin-left: auto; letter-spacing: 2px; }
    .card-ts { font-size: 11px; color: #333; margin-bottom: 8px; }
    .card-titulo { font-size: 15px; color: #c8a96e; font-style: italic; margin-bottom: 6px; }
    .card-texto { font-size: 14px; color: #9a9590; line-height: 1.6; margin-bottom: 8px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .card-tag { font-size: 11px; color: #555; border: 1px solid #222; border-radius: 2px; padding: 3px 8px; }
    .card-preco {
      display: flex; gap: 16px; padding: 8px 0; margin-bottom: 8px;
      border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a;
    }
    .card-preco-item { display: flex; flex-direction: column; gap: 2px; }
    .card-preco-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }
    .card-preco-valor { font-size: 15px; color: #7a9e7e; font-family: 'Georgia', serif; }
    .card-acoes { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid #1a1a1a; }
    .acao-btn {
      background: none; border: none; color: #444; font-size: 12px;
      cursor: pointer; padding: 0; font-family: 'Georgia', serif;
      font-style: italic; -webkit-tap-highlight-color: transparent;
    }
    .acao-apagar { color: #5a3a3a !important; }
    .limpar-btn {
      background: none; border: none; color: #2e2e2e; font-size: 12px;
      cursor: pointer; padding: 8px 0; font-family: 'Georgia', serif;
      font-style: italic; text-align: center; width: 100%;
    }

    /* FAB */
    .fab {
      position: fixed; bottom: 32px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #c8a96e; border: none; color: #0d0d0d; font-size: 28px;
      cursor: pointer; z-index: 50;
      box-shadow: 0 4px 24px rgba(200,169,110,0.3);
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }

    /* FORM */
    .form-scroll {
      flex: 1; overflow-y: auto; padding: 24px 20px 0;
      display: flex; flex-direction: column; gap: 24px;
    }
    .form-section { display: flex; flex-direction: column; gap: 10px; }
    .form-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
    .opcional { color: #333; text-transform: none; letter-spacing: 0; font-style: italic; font-size: 11px; }

    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cat-btn {
      background: transparent; border: 1px solid #2a2a2a; border-radius: 2px;
      padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: border-color 0.15s, background 0.15s;
    }
    .cat-btn.ativo { background: #1a1a1a; border-color: #c8a96e; }
    .cat-emoji { font-size: 16px; }
    .cat-label { font-size: 14px; color: #888; font-family: 'Georgia', serif; }

    .estrelas-row { display: flex; gap: 4px; }
    .estrela-btn {
      background: none; border: none; font-size: 32px; cursor: pointer;
      color: #2a2a2a; line-height: 1; padding: 4px 6px;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: color 0.1s;
    }
    .estrela-btn.ativo { color: #c8a96e; }

    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-btn {
      background: transparent; border: 1px solid #2a2a2a; border-radius: 2px;
      color: #555; font-size: 13px; padding: 9px 14px; cursor: pointer;
      font-family: 'Georgia', serif;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .tag-btn.ativo { background: #1a1a1a; border-color: #7a9e7e; color: #7a9e7e; }

    /* Preço row */
    .preco-row { display: flex; gap: 12px; }
    .preco-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .preco-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .preco-calc {
      background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 2px;
      color: #7a9e7e; font-size: 15px; padding: 13px 14px;
      font-family: 'Georgia', serif; min-height: 48px;
      display: flex; align-items: center;
    }

    input[type="text"], input[type="number"], textarea {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 2px;
      color: #d4cfc7; font-size: 16px; padding: 13px 14px; outline: none;
      font-family: 'Georgia', serif; line-height: 1.6;
      -webkit-appearance: none; appearance: none;
    }
    input[type="number"] { -moz-appearance: textfield; }
    textarea { resize: none; }
    ::placeholder { color: #333; }

    .form-footer {
      padding: 16px 20px 40px; border-top: 1px solid #1a1a1a;
      background: #0d0d0d; margin-top: 24px;
    }
    .btn-primary {
      width: 100%; background: #c8a96e; border: none; border-radius: 2px;
      color: #0d0d0d; font-size: 15px; padding: 16px; cursor: pointer;
      font-family: 'Georgia', serif; letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary.danger { background: #8b3a3a; }
    .btn-secondary {
      width: 100%; background: transparent; border: 1px solid #2a2a2a; border-radius: 2px;
      color: #555; font-size: 15px; padding: 16px; cursor: pointer;
      font-family: 'Georgia', serif; -webkit-tap-highlight-color: transparent;
    }
    .btn-row { display: flex; gap: 12px; }
    .btn-row .btn-primary, .btn-row .btn-secondary { flex: 1; }

    /* EXPORT */
    .export-body { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .export-info { font-size: 13px; color: #555; font-style: italic; line-height: 1.6; }
    .export-pre {
      background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 2px;
      color: #666; font-size: 12px; padding: 16px;
      font-family: 'Courier New', monospace; line-height: 1.7;
      white-space: pre-wrap; flex: 1;
    }

    /* CONFIRM */
    .confirm-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; gap: 20px; text-align: center;
    }
    .confirm-icon { font-size: 40px; }
    .confirm-titulo { font-size: 18px; color: #f0ece4; line-height: 1.5; }
    .confirm-sub { font-size: 13px; color: #555; font-style: italic; }
  </style>
</head>
<body>
<div id="app"></div>
<script>

const CATS = [
  { id: "restaurante", label: "Restaurante", emoji: "🍽" },
  { id: "atracao",     label: "Atração",     emoji: "🗺" },
  { id: "praia",       label: "Praia",       emoji: "🏖" },
  { id: "natureza",    label: "Natureza",    emoji: "🌿" },
  { id: "museu",       label: "Museu",       emoji: "🏛" },
  { id: "hotel",       label: "Hotel",       emoji: "🏨" },
  { id: "outro",       label: "Outro",       emoji: "✎"  },
];

const TAGS = {
  restaurante: ["Boa comida", "Serviço rápido", "Boa relação qualidade/preço", "Ambiente agradável", "Voltaria"],
  atracao:     ["Vale a visita", "Muito concorrida", "Boa organização", "Excelente vista", "Ideal para famílias"],
  praia:       ["Limpa", "Pouco movimentada", "Boa para crianças", "Água agradável", "Fácil estacionamento"],
  natureza:    ["Paisagem incrível", "Trilho fácil", "Bem sinalizado", "Vale o esforço", "Tranquilo"],
  museu:       ["Bem organizado", "Muito informativo", "Vale a entrada", "Guia recomendado", "Pouco tempo de espera"],
  hotel:       ["Confortável", "Boa localização", "Bom pequeno-almoço", "Staff simpático", "Voltaria"],
  outro:       ["Recomendo", "Voltaria", "Surpreendeu", "Desiludiu", "Bom preço"],
};

const KEY = "travel_log_v4";

let S = {
  view: "log",
  entradas: [],
  editId: null,
  fCat: "restaurante", fEstrelas: 0, fTags: [],
  fTitulo: "", fTexto: "",
  fTotal: "", fPessoas: "",
};

function load() { try { const d = localStorage.getItem(KEY); return d ? JSON.parse(d) : []; } catch { return []; } }
function save() { try { localStorage.setItem(KEY, JSON.stringify(S.entradas)); } catch {} }
S.entradas = load();

function ts() {
  const n = new Date(), p = v => String(v).padStart(2,"0");
  return { display: `${p(n.getDate())}/${p(n.getMonth()+1)} · ${p(n.getHours())}:${p(n.getMinutes())}`, raw: n.toISOString() };
}

function stars(n) { return "★".repeat(n||0) + "☆".repeat(5-(n||0)); }

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function calcPP() {
  const t = parseFloat(S.fTotal);
  const p = parseInt(S.fPessoas);
  if (!t || !p || p === 0) return null;
  return (t / p).toFixed(2);
}

function resetForm() {
  S.editId = null;
  S.fCat = "restaurante"; S.fEstrelas = 0; S.fTags = [];
  S.fTitulo = ""; S.fTexto = ""; S.fTotal = ""; S.fPessoas = "";
}

function canSave() { return S.fTitulo.trim() || S.fTexto.trim(); }

function exportText() {
  if (!S.entradas.length) return "";
  const lines = ["TRAVEL LOG — RELATÓRIO DE FEEDBACK", "─".repeat(40), ""];
  [...S.entradas].reverse().forEach(e => {
    const c = CATS.find(x => x.id === e.cat);
    lines.push(`[${e.ts.display}] ${c?.emoji} ${c?.label}`);
    if (e.titulo) lines.push(`📍 ${e.titulo}`);
    lines.push(`Avaliação: ${stars(e.estrelas)} (${e.estrelas||0}/5)`);
    if (e.tags?.length) lines.push(`Tags: ${e.tags.join(" · ")}`);
    if (e.total)   lines.push(`Gasto total: ${e.total} €${e.pp ? `  |  Por pessoa: ${e.pp} €` : ""}`);
    if (e.texto)   lines.push(e.texto);
    lines.push("");
  });
  return lines.join("\n");
}

function guardar() {
  if (!canSave()) return;
  const pp = calcPP();
  const entry = {
    id: S.editId || Date.now().toString(),
    ts: S.editId ? S.entradas.find(e=>e.id===S.editId)?.ts : ts(),
    cat: S.fCat, estrelas: S.fEstrelas, tags: [...S.fTags],
    titulo: S.fTitulo.trim(), texto: S.fTexto.trim(),
    total: S.fTotal ? parseFloat(S.fTotal) : null,
    pessoas: S.fPessoas ? parseInt(S.fPessoas) : null,
    pp: pp ? parseFloat(pp) : null,
  };
  if (S.editId) {
    S.entradas = S.entradas.map(e => e.id === S.editId ? entry : e);
  } else {
    S.entradas.unshift(entry);
  }
  save(); resetForm(); S.view = "log"; render();
}

function apagar(id) { S.entradas = S.entradas.filter(e => e.id !== id); save(); render(); }

function editar(id) {
  const e = S.entradas.find(e => e.id === id);
  if (!e) return;
  S.editId = id; S.fCat = e.cat; S.fEstrelas = e.estrelas||0;
  S.fTags = [...(e.tags||[])]; S.fTitulo = e.titulo||""; S.fTexto = e.texto||"";
  S.fTotal = e.total != null ? String(e.total) : "";
  S.fPessoas = e.pessoas != null ? String(e.pessoas) : "";
  S.view = "nova"; render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if      (S.view === "nova")      app.innerHTML = viewNova();
  else if (S.view === "exportar")  app.innerHTML = viewExport();
  else if (S.view === "confirmar") app.innerHTML = viewConfirm();
  else                             app.innerHTML = viewLog();

  // Restore input values after re-render
  const fields = { "f-titulo": "fTitulo", "f-texto": "fTexto", "f-total": "fTotal", "f-pessoas": "fPessoas" };
  Object.entries(fields).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.value = S[key];
  });
}

// ── VIEW: LOG ─────────────────────────────────────────────────────
function viewLog() {
  if (!S.entradas.length) return `
    <div class="header">
      <span class="logo-mark">✦</span>
      <span class="header-title">Travel Log</span>
      <div class="spacer"></div>
    </div>
    <div class="empty-state">
      <span class="empty-icon">✎</span>
      <p class="empty-titulo">Log vazio</p>
      <p class="empty-sub">Carrega em + para registar a primeira experiência.</p>
    </div>
    <button class="fab" onclick="S.view='nova';resetForm();render()">+</button>`;

  const items = S.entradas.map(e => {
    const c = CATS.find(x => x.id === e.cat);
    const tagsHtml = e.tags?.length
      ? `<div class="card-tags">${e.tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join("")}</div>` : "";
    const precoHtml = (e.total != null) ? `
      <div class="card-preco">
        <div class="card-preco-item">
          <span class="card-preco-label">Total pago</span>
          <span class="card-preco-valor">${e.total.toFixed(2)} €</span>
        </div>
        ${e.pp != null ? `
        <div class="card-preco-item">
          <span class="card-preco-label">Por pessoa</span>
          <span class="card-preco-valor">${e.pp.toFixed(2)} €</span>
        </div>` : ""}
        ${e.pessoas != null ? `
        <div class="card-preco-item">
          <span class="card-preco-label">Pessoas</span>
          <span class="card-preco-valor">${e.pessoas}</span>
        </div>` : ""}
      </div>` : "";
    return `
      <div class="card">
        <div class="card-top">
          <span class="card-emoji">${c?.emoji||""}</span>
          <span class="card-cat">${c?.label||""}</span>
          <span class="card-stars">${stars(e.estrelas)}</span>
        </div>
        <div class="card-ts">${e.ts.display}</div>
        ${e.titulo ? `<p class="card-titulo">${esc(e.titulo)}</p>` : ""}
        ${e.texto  ? `<p class="card-texto">${esc(e.texto)}</p>`   : ""}
        ${tagsHtml}
        ${precoHtml}
        <div class="card-acoes">
          <button class="acao-btn" onclick="editar('${e.id}')">Editar</button>
          <button class="acao-btn acao-apagar" onclick="apagar('${e.id}')">Apagar</button>
        </div>
      </div>`;
  }).join("");

  const limpar = S.entradas.length > 2
    ? `<button class="limpar-btn" onclick="S.view='confirmar';render()">Limpar log</button>` : "";

  return `
    <div class="header">
      <span class="logo-mark">✦</span>
      <span class="header-title">Travel Log</span>
      <button class="export-btn" onclick="S.view='exportar';render()">↗ Relatório</button>
    </div>
    <div class="lista">${items}${limpar}</div>
    <button class="fab" onclick="S.view='nova';resetForm();render()">+</button>`;
}

// ── VIEW: NOVA ────────────────────────────────────────────────────
function viewNova() {
  const isEdit = !!S.editId;
  const tagsAvail = TAGS[S.fCat] || TAGS.outro;
  const pp = calcPP();

  const catsHtml = CATS.map(c => `
    <button class="cat-btn${S.fCat===c.id?" ativo":""}"
      onclick="S.fCat='${c.id}';S.fTags=[];render()">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-label">${c.label}</span>
    </button>`).join("");

  const starsHtml = [1,2,3,4,5].map(n => `
    <button class="estrela-btn${n<=S.fEstrelas?" ativo":""}"
      onclick="S.fEstrelas=(S.fEstrelas===${n}?0:${n});render()">★</button>`).join("");

  const tagsHtml = tagsAvail.map(t => {
    const ativo = S.fTags.includes(t);
    const te = t.replace(/'/g, "\\'");
    return `<button class="tag-btn${ativo?" ativo":""}"
      onclick="(function(){var i=S.fTags.indexOf('${te}');if(i===-1)S.fTags.push('${te}');else S.fTags.splice(i,1);render()})()">${esc(t)}</button>`;
  }).join("");

  return `
    <div class="header">
      <button class="back-btn" onclick="resetForm();S.view='log';render()">←</button>
      <span class="header-title">${isEdit?"Editar entrada":"Adicionar Feedback"}</span>
      <div class="spacer"></div>
    </div>
    <div class="form-scroll">
      <div class="form-section">
        <span class="form-label">Tipo de local</span>
        <div class="cat-grid">${catsHtml}</div>
      </div>
      <div class="form-section">
        <span class="form-label">Classificação</span>
        <div class="estrelas-row">${starsHtml}</div>
      </div>
      <div class="form-section">
        <span class="form-label">Nome / Título <span class="opcional">(opcional)</span></span>
        <input type="text" id="f-titulo" placeholder="Ex: Tasca do Chico, Praia da Comporta..."
          oninput="S.fTitulo=this.value" />
      </div>
      <div class="form-section">
        <span class="form-label">Tags rápidas <span class="opcional">(opcional)</span></span>
        <div class="tags-wrap">${tagsHtml}</div>
      </div>
      <div class="form-section">
        <span class="form-label">Valor gasto <span class="opcional">(opcional)</span></span>
        <div class="preco-row">
          <div class="preco-group">
            <span class="preco-label">Total (€)</span>
            <input type="number" id="f-total" placeholder="Ex: 45.00"
              min="0" step="0.01" oninput="S.fTotal=this.value;render()" />
          </div>
          <div class="preco-group">
            <span class="preco-label">Nº pessoas</span>
            <input type="number" id="f-pessoas" placeholder="Ex: 2"
              min="1" step="1" oninput="S.fPessoas=this.value;render()" />
          </div>
          <div class="preco-group">
            <span class="preco-label">Por pessoa</span>
            <div class="preco-calc">${pp ? pp + " €" : "—"}</div>
          </div>
        </div>
      </div>
      <div class="form-section">
        <span class="form-label">Comentário <span class="opcional">(opcional)</span></span>
        <textarea id="f-texto" rows="4" placeholder="O que aconteceu? O que achaste?"
          oninput="S.fTexto=this.value"></textarea>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-primary" onclick="guardar()" ${canSave()?"":"disabled"}>
        ${isEdit?"Guardar alterações":"Adicionar ao log"}
      </button>
    </div>`;
}

// ── VIEW: EXPORT ──────────────────────────────────────────────────
function viewExport() {
  const txt = exportText();
  return `
    <div class="header">
      <button class="back-btn" onclick="S.view='log';render()">←</button>
      <span class="header-title">Relatório de Feedback</span>
      <div class="spacer"></div>
    </div>
    <div class="export-body">
      <p class="export-info">Copia este relatório e cola no Claude para integrar no feedback final da viagem.</p>
      <pre class="export-pre">${esc(txt)}</pre>
    </div>
    <div class="form-footer">
      <button class="btn-primary" onclick="copyReport(this)">Copiar relatório</button>
    </div>`;
}

// ── VIEW: CONFIRM ─────────────────────────────────────────────────
function viewConfirm() {
  return `
    <div class="header">
      <button class="back-btn" onclick="S.view='log';render()">←</button>
      <span class="header-title">Limpar log</span>
      <div class="spacer"></div>
    </div>
    <div class="confirm-body">
      <span class="confirm-icon">⚠</span>
      <p class="confirm-titulo">Apagar todas as entradas?</p>
      <p class="confirm-sub">Esta ação não pode ser desfeita.</p>
    </div>
    <div class="form-footer">
      <div class="btn-row">
        <button class="btn-secondary" onclick="S.view='log';render()">Cancelar</button>
        <button class="btn-primary danger" onclick="S.entradas=[];save();S.view='log';render()">Apagar tudo</button>
      </div>
    </div>`;
}

function copyReport(btn) {
  const txt = exportText();
  navigator.clipboard.writeText(txt).then(() => {
    btn.textContent = "Copiado ✓";
    setTimeout(() => { btn.textContent = "Copiar relatório"; }, 2000);
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    btn.textContent = "Copiado ✓";
    setTimeout(() => { btn.textContent = "Copiar relatório"; }, 2000);
  });
}

render();
</script>
</body>
</html>
